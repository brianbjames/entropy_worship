<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@v0.171.0/build/three.module.js",

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "../build/three.module.js",
        "three/addons/": "./jsm/"
      }
    }
  </script>

  <script type="module">

    // Import necessary components from THREE.js
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'; // GLTF model loader
    import { VertexNormalsHelper } from 'three/addons/helpers/VertexNormalsHelper.js'; // Helper to visualize vertex normals
    import { VertexTangentsHelper } from 'three/addons/helpers/VertexTangentsHelper.js'; // Helper to visualize vertex tangents
    
    // Declare variables for the scene, renderer, camera, light, helpers, and dB value
    let scene, renderer;
    let camera, light;
    let vnh, vth;
    let gridHelper, polarGridHelper;
    let dBLevel = 0; // Store the current dB level
    
    // Initialize the 3D scene
    init();
    
    function init() {
        renderer = new THREE.WebGLRenderer();
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setAnimationLoop(animate);
        document.body.appendChild(renderer.domElement);
    
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 400;
    
        scene = new THREE.Scene();
    
        light = new THREE.PointLight();
        light.position.set(200, 100, 150);
        scene.add(light);
    
        scene.add(new THREE.PointLightHelper(light, 15));
    
        // Add a GridHelper
        gridHelper = new THREE.GridHelper(400, 40, 0xff0000, 0x808080);
        gridHelper.position.y = -150;
        gridHelper.position.x = -150;
        scene.add(gridHelper);
    
        // Add a PolarGridHelper
        polarGridHelper = new THREE.PolarGridHelper(200, 16, 8, 64, 0xff0000, 0x808080);
        polarGridHelper.position.y = -150;
        polarGridHelper.position.x = 200;
        scene.add(polarGridHelper);
    
        const loader = new GLTFLoader();
        loader.load('models/LeePerrySmith.glb', function (gltf) {
            const mesh = gltf.scene.children[0];
            mesh.geometry.computeTangents();
    
            const group = new THREE.Group();
            group.scale.multiplyScalar(50);
            scene.add(group);
            group.updateMatrixWorld(true);
            group.add(mesh);
    
            vnh = new VertexNormalsHelper(mesh, 5);
            scene.add(vnh);
    
            vth = new VertexTangentsHelper(mesh, 5);
            scene.add(vth);
    
            const wireframe = new THREE.WireframeGeometry(mesh.geometry);
            let line = new THREE.LineSegments(wireframe);
            line.material.depthTest = false;
            line.material.opacity = 0.25;
            line.material.transparent = true;
            line.position.x = 0.01;
            group.add(line);
    
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            line = new THREE.LineSegments(edges);
            line.material.depthTest = false;
            line.material.opacity = 0.25;
            line.material.transparent = true;
            line.position.x = -0.01;
            group.add(line);
        });
    
        window.addEventListener('resize', onWindowResize);
    }
    
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    function animate() {
        const time = -performance.now() * 0.0003;
        camera.position.x = 400 * Math.cos(time);
        camera.position.z = 400 * Math.sin(time);
        camera.lookAt(scene.position);
    
        light.position.x = Math.sin(time * 1.7) * 300;
        light.position.y = Math.cos(time * 1.5) * 400;
        light.position.z = Math.cos(time * 1.3) * 300;
    
        if (vnh) vnh.update();
        if (vth) vth.update();
    
        // Dynamically adjust grid and polar grid sizes based on dB level
        const scaleFactor = Math.max(1, dBLevel / 10); // Scale factor derived from dB level
        gridHelper.scale.set(scaleFactor, scaleFactor, scaleFactor);
        polarGridHelper.scale.set(scaleFactor, scaleFactor, scaleFactor);
        scene.traverse((child) => {
            if (child.isLine) { // Check if it's a line
                child.material.linewidth = scaleFactor; // Adjust line width
                child.scale.set(scaleFactor, scaleFactor, scaleFactor); // Adjust line length by scaling
            }
        });
    
        renderer.render(scene, camera);
    }
    
    document.getElementById("startBtn").addEventListener("click", async () => {
        const meterDisplay = document.getElementById("meter");
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
    
            analyser.fftSize = 256;
            microphone.connect(analyser);
    
            function getDecibelLevel() {
                analyser.getByteFrequencyData(dataArray);
    
                const sum = dataArray.reduce((a, b) => a + b, 0);
                const average = sum / dataArray.length;
                const dB = Math.max(0, Math.round(60 * Math.log10(average)));
    
                dBLevel = dB; // Update the global dB level
                meterDisplay.textContent = dB > 0 ? `${dB} dB` : "0 dB";
    
                requestAnimationFrame(getDecibelLevel);
            }
    
            getDecibelLevel();
            document.getElementById("startBtn").style.display = "none";
        } catch (err) {
            meterDisplay.textContent = "Denied mic access";
            console.error("Error accessing microphone:", err);
        }
    });
    
    </script>

        <div class="card text-bg-danger border-danger mb-3" style="background-color: #7b9cb76c"><!--Header card-->

        </div><!--Header panel-->

                <div class="card-body">
                    <div id="meter"></div>

                </div>

              </div>
          </div>
          
    </div><!--Main Container-->
