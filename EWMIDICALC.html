                <div class="form-group">
                    <div class="row">
                        <button class="btn btn-outline-light btn-sm button alert" id="stopAllButton" style="position: absolute; right: 20px;">Stop</button>
                        <select id="noteroot" class="form-select form-select-lg btn-outline-light btn" onchange="updateResults()">
                            <option value="C" selected>C</option>
                            <option value="C♯">C♯</option>
                            <option value="D">D</option>
                            <option value="D♯">D♯</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="F♯">F♯</option>
                            <option value="G">G</option>
                            <option value="G♯">G♯</option>
                            <option value="A">A</option>
                            <option value="A♯">A♯</option>
                            <option value="B">B</option>
                        </select>
                        <select id="mode" class="form-select form-select-lg btn-outline-light btn" onchange="updateResults()">
                            <option value="Ionian" selected>Ionian</option>
                            <option value="Dorian">Dorian</option>
                            <option value="Phrygian">Phrygian</option>
                            <option value="Lydian">Lydian</option>
                            <option value="Mixolydian">Mixolydian</option>
                            <option value="Aeolian">Aeolian</option>
                            <option value="Locrian">Locrian</option>
                        </select>
                        <input type="range" class="form-range" id="volumeSlider" min="0" max="100" value="50">
                        
                    </div>
                </div>
                <div class="results" id="results"></div>

                 <!-- Modal for MIDI note information -->
                <div class="modal fade" id="midiModal" tabindex="-1" aria-labelledby="midiModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-body">
                                <p id="midiValue"></p>
                                <p id="frequency"></p>
                                <p id="octave"></p>
                                <button class="btn btn-dark button success" id="playButton">Play</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Modal for Scale degree note information -->
                <div class="modal fade" id="rootModal" tabindex="-1" aria-labelledby="rootModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-body">
                                <p id="rootNote"></p>
                                <p id="thirdNote"></p>
                                <p id="fifthNote"></p>
                                <p id="seventhNote"></p>
                                <p id="ninthNote"></p>
