        .step {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 5%;
            cursor: pointer;
            position: relative;
            padding: 1px;
            margin: 1px;
            font-size: 1.75rem;
            transition: background-color 0.3s ease, box-shadow 0.1s ease;
        }
        .step.active {
            background-color: rgb(51, 1, 1) !important; /* Green when active */
        }
        .step.triggered {
            background-color: yellow !important; /* Yellow when triggered */
        }
        .step.flashing {
            background-color: red !important;
            animation: flash 0.1s ease-in-out;
        }
        @keyframes flash {
            0% { background-color: red; }
            50% { background-color: blue; }
            100% { background-color: red; }
        }
