<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Francisco Police Report Map</title>
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Augmented UI CSS -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css">
    <!-- SciUI CSS -->
    <link href="styles/styles.css" type="text/css" rel="stylesheet">
    <!-- Cyberpunk CSS -->
    <link href="styles/cyberpunk.css" rel="stylesheet" type="text/css">
    <!-- Override CSS -->
    <link href="styles/style_overrides.css" rel="stylesheet">
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Leaflet.js Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize the map centered on San Francisco
        const map = L.map('map').setView([37.7749, -122.4194], 13); // Latitude and Longitude for SF

        // Add a dark tile layer (Carto Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Fetch live data from SF OpenData API
        fetch("https://data.sfgov.org/resource/wg3w-h783.json?$limit=1000&$order=incident_date DESC")
            .then(response => response.json())
            .then(data => {
                data.forEach(crime => {
                    if (crime.latitude && crime.longitude) {
                        const formattedReportDate = crime.report_datetime 
                            ? new Date(crime.report_datetime).toLocaleDateString('en-US', {
                                month: '2-digit',
                                day: '2-digit',
                                year: 'numeric'
                            })
                            : 'Unknown';

                        const popupContent = `
                            <b>Category:</b> ${crime.incident_category || 'Unknown'}<br>
                            <b>Subcategory:</b> ${crime.incident_subcategory || 'Unknown'}<br>
                            <b>Description:</b> ${crime.incident_description || 'No Description'}<br>
                            <b>Time:</b> ${crime.incident_time || 'Unknown'}<br>
                            <b>Day of Week:</b> ${crime.incident_day_of_week || 'Unknown'}<br>
                            <b>Report Date:</b> ${formattedReportDate}<br>
                            <b>Incident ID:</b> ${crime.incident_id || 'Unknown'}<br>
                            <b>Incident Number:</b> ${crime.incident_number || 'Unknown'}<br>
                            <b>Report Type:</b> ${crime.report_type_description || 'Unknown'}<br>
                            <b>Filed Online:</b> ${crime.filed_online ? 'Yes' : 'No'}<br>
                            <b>Incident Code:</b> ${crime.incident_code || 'Unknown'}<br>
                            <b>Resolution:</b> ${crime.resolution || 'Unknown'}<br>
                            <b>Police District:</b> ${crime.police_district || 'Unknown'}
                        `;

                        // Create a circle marker with white outline and transparent fill
                        const marker = L.circleMarker([crime.latitude, crime.longitude], {
                            radius: 6, // Size of the circle
                            color: 'red', // Outline color
                            weight: 2, // Outline thickness
                            fillColor: 'transparent', // Fill color (can also be 'transparent')
                            fillOpacity: 0.1 // Transparency of the fill
                        }).addTo(map);
                        marker.bindPopup(popupContent);
                    }
                });
            })
            .catch(err => console.error("Error fetching crime data: ", err));


                // OPTIONAL: Add a legend to describe map categories
                const legend = L.control({ position: 'topright' });
                legend.onAdd = function () {
                    const div = L.DomUtil.create('div', 'info legend');
                    div.innerHTML = `
                        <div style="text-align: right;">
                            <h4 style="color: white">SF Police Report Map</h4>
                            <h5 style="color: white">1000 most recent from <a style="color: white" href="https://datasf.org/opendata/" target="_blank">DataSF</a></h5>
                            <br>
                        </div>
                    `;
                    return div;

                };
                legend.addTo(map);
    </script>
</body>
</html>
