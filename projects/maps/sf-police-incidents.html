<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Francisco Recent Crimes</title>
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">San Francisco Recent Crimes</h1>
    <div id="map"></div>

    <!-- Leaflet.js Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize the map centered on San Francisco
        const map = L.map('map').setView([37.7749, -122.4194], 13); // Latitude and Longitude for SF

        // Add a dark tile layer (Carto Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Fetch live data from SF OpenData API
        fetch("https://data.sfgov.org/resource/wg3w-h783.json?$limit=100&$order=incident_date DESC")
            .then(response => response.json())
            .then(data => {
                data.forEach(crime => {
                    if (crime.latitude && crime.longitude) {
                        const formattedReportDate = crime.report_datetime 
                            ? new Date(crime.report_datetime).toLocaleDateString('en-US', {
                                month: '2-digit',
                                day: '2-digit',
                                year: 'numeric'
                            })
                            : 'Unknown';

                        const popupContent = `
                            <b>Category:</b> ${crime.incident_category || 'Unknown'}<br>
                            <b>Subcategory:</b> ${crime.incident_subcategory || 'Unknown'}<br>
                            <b>Description:</b> ${crime.incident_description || 'No Description'}<br>
                            <b>Date:</b> ${crime.incident_date ? crime.incident_date.split('T')[0] : 'Unknown'}<br>
                            <b>Time:</b> ${crime.incident_time || 'Unknown'}<br>
                            <b>Day of Week:</b> ${crime.incident_day_of_week || 'Unknown'}<br>
                            <b>Year:</b> ${crime.incident_year || 'Unknown'}<br>
                            <b>Incident ID:</b> ${crime.incident_id || 'Unknown'}<br>
                            <b>Incident Number:</b> ${crime.incident_number || 'Unknown'}<br>
                            <b>Report Type:</b> ${crime.report_type_description || 'Unknown'}<br>
                            <b>Filed Online:</b> ${crime.filed_online ? 'Yes' : 'No'}<br>
                            <b>Incident Code:</b> ${crime.incident_code || 'Unknown'}<br>
                            <b>Resolution:</b> ${crime.resolution || 'Unknown'}<br>
                            <b>Police District:</b> ${crime.police_district || 'Unknown'}<br>
                            <b>Report Date/Time:</b> ${formattedReportDate}
                        `;

                        // Create a circle marker with white outline and transparent fill
                        const marker = L.circleMarker([crime.latitude, crime.longitude], {
                            radius: 8, // Size of the circle
                            color: 'white', // Outline color
                            weight: 2, // Outline thickness
                            fillColor: 'transparent', // Fill color (can also be 'transparent')
                            fillOpacity: 0.1 // Transparency of the fill
                        }).addTo(map);
                        marker.bindPopup(popupContent);
                    }
                });
            })
            .catch(err => console.error("Error fetching crime data: ", err));


                // OPTIONAL: Add a legend to describe map categories
                const legend = L.control({ position: 'bottomright' });
                legend.onAdd = function () {
                    const div = L.DomUtil.create('div', 'info legend');
                    div.innerHTML = `
                        <h4>Crime Categories</h4>
                        <ul>
                            <li>Markers show recent crime reports.</li>
                            <li>Click a marker to view details.</li>
                            <li>Data is fetched from <a href="https://datasf.org/opendata/" target="_blank">DataSF</a>.</li>
                        </ul>
                    `;
                    return div;
                };
                legend.addTo(map);
    </script>
</body>
</html>
