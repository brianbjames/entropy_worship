<!DOCTYPE html>
<html>
<head>
    <title>SF Economy & Community Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
</head>
<body>
    <h1>SF Economy & Community Map</h1>
    <div id="map" style="height: 600px; width: 100%;"></div>
    <script>
        // Initialize the map
        const map = L.map('map').setView([37.7749, -122.4194], 13); // Centered on San Francisco

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Fetch Economy & Community data from DataSF
        const dataUrl = "https://data.sfgov.org/resource/XXXXX.json"; // Replace XXXXX with the specific dataset ID

        fetch(dataUrl)
            .then(response => response.json())
            .then(data => {
                // Loop through the data and add markers to the map
                data.forEach(item => {
                    if (item.latitude && item.longitude) {
                        L.marker([item.latitude, item.longitude])
                            .addTo(map)
                            .bindPopup(`
                                <strong>${item.name || "No Name"}</strong><br>
                                ${item.description || "No Description"}<br>
                                <em>${item.category || "No Category"}</em>
                            `);
                    }
                });
            })
            .catch(error => {
                console.error("Error fetching data:", error);
            });
    </script>
</body>
</html>
