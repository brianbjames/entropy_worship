<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Chord Player</title>
        <script
            type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/webmidi@latest/dist/iife/webmidi.iife.js"
        ></script>
        <!-- <script src="https://raw.githubusercontent.com/danigb/soundfont-player/master/dist/soundfont-player.js"></script> -->
        <script
            type="text/javascript"
            src="https://surikov.github.io/webaudiofont/npm/dist/WebAudioFontPlayer.js"
        ></script>
        <script
            type="text/javascript"
            src="https://surikov.github.io/webaudiofontdata/sound/0250_SoundBlasterOld_sf2.js"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>
        <script type="text/javascript" src="./scripts/midi_request.js"></script>
        <script type="text/javascript" src="./scripts/chord_mapper.js"></script>
        <link rel="stylesheet" href="./styles/chord_maker.css" />
    </head>
    <body>
        <script>
            console.log(Object.values(notesAndScales.notes));

            let object = notesAndScales.scales;

            let currentMode = notesAndScales.scales.modes.ionian;
            let currentKey = notesAndScales.notes;
            let currentNoteIndex = 0;
            let currentChordArray = notesAndScales.chords.major;

            function updateDom() {}

            function capitalizeFirstLetter(val) {
                return (
                    String(val).charAt(0).toUpperCase() + String(val).slice(1)
                );
            }

            function modeSelectedWith(value) {
                currentMode = value;
            }

            function keySelected(value) {
                currentKey = value;
            }

            function updateTable() {
                const element = document.getElementById("scaleTable");
                if (element !== null) {
                    element.remove();
                }

                let scaleTable = document.createElement("table");
                scaleTable.setAttribute("id", "scaleTable");

                // for (var i = 0; i < 128; i++) {
                //     console.log(i);
                //     console.log(i % 12);
                // }

                Object.entries(notesAndScales.scales.modes).map(
                    ([key, value]) => {
                        let row = document.createElement("tr");
                        let rowHeader = document.createElement("th");
                        rowHeader.value = key;
                        rowHeader.innerHTML = key;
                        row.append(rowHeader);

                        let transposedNotes = value.map((note) => {
                            let newNote = Number(
                                Number(note + currentNoteIndex) % 12,
                            );
                            return newNote;
                        });

                        console.log(value);
                        console.log(transposedNotes);

                        transposedNotes.map((note) => {
                            let col = document.createElement("td");
                            let noteString = notesAndScales.notes[note];
                            col.value = note;
                            col.innerHTML = noteString;
                            row.append(col);
                        });
                        scaleTable.append(row);
                    },
                );
                document.body.appendChild(scaleTable);
            }

            // Note Tag
            let notesTag = document.createElement("select");

            Object.entries(notesAndScales.notes).map(([key, value]) => {
                let opt = document.createElement("option");
                opt.value = key;
                opt.innerHTML = value;
                notesTag.append(opt);
            });
            document.body.appendChild(notesTag);

            notesTag.addEventListener("change", (event) => {
                currentNoteIndex = notesTag.value;
                updateTable();
            });

            // Scale Tag
            let modesTag = document.createElement("select");
            Object.entries(notesAndScales.scales.modes).map(([key, value]) => {
                let opt = document.createElement("option");
                opt.value = key;
                opt.innerHTML = capitalizeFirstLetter(key);
                modesTag.append(opt);
            });
            document.body.appendChild(modesTag);

            updateTable();

            // Chord Tag
            let chordTag = document.createElement("select");
            Object.entries(notesAndScales.chords).map(([key, value]) => {
                if (value === typeof String) {
                    console.log(key);
                }
                let opt = document.createElement("option");
                opt.value = key;
                opt.innerHTML = capitalizeFirstLetter(key);
                chordTag.append(opt);
            });

            console.log(currentKey);
            console.log(currentNoteIndex);

            let transposedNotes = 48 + currentNoteIndex;
            document.body.appendChild(chordTag);
            chordTag.addEventListener("change", (event) => {
                let chordValue = notesAndScales.chords[chordTag.value];
                currentChordArray = chordValue.map((note) => {
                    return note + transposedNotes;
                });
            });

            // Inversion Tag
            let inversionTag = document.createElement("select");
            for (var i = 0; i < currentChordArray.length; i++) {
                let opt = document.createElement("option");
                opt.value = i;
                opt.innerHTML = i;
                inversionTag.append(opt);
            }
            document.body.appendChild(inversionTag);

            inversionTag.addEventListener("change", (event) => {
                console.log(event);
                for (var i = 0; i < inversionTag.value; i++) {
                    let shiftedNote = currentChordArray.shift();
                    currentChordArray.push(shiftedNote);
                }
            });
        </script>
        <button onclick="getRandomChord()">Generate Chord</button>
        <button onclick="playChord(currentChordArray)">Play Chord</button>
    </body>
</html>
