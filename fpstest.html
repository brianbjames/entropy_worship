<!DOCTYPE html>
<html lang="en">
  <head>
    <title>ENTROPY WORSHIP FP</title>
    <!-- Include Bootstrap CSS for responsive styling -->
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Include custom styles for general design -->
    <link href="styles/styles.css" type="text/css" rel="stylesheet" />
    <!-- Include custom styles for a cyberpunk theme -->
    <link href="styles/cyberpunk.css" rel="stylesheet" type="text/css" />
    <!-- Include custom overrides for additional styling adjustments -->
    <link href="styles/style_overrides.css" rel="stylesheet" />
    <style>
      /* Remove margins and hide scrollbars */
      body {
        margin: 0;
        overflow: hidden;
      }

      /* Style the canvas to cover the entire screen in the background */
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* Place canvas behind other content */
        pointer-events: true; /* Allow clicks to pass through */
      }

      /* Ensure container content stays above the canvas */
      .container {
        position: relative;
        z-index: 1;
      }
    </style>
    <!-- Import map to load specific modules from a CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@v0.171.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.171.0/examples/jsm/"
        }
      }
    </script>
    <style>
      /* Style the blocker div for fullscreen overlay effect */
      #blocker {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      /* Style the instructions inside the blocker */
      #instructions {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Fullscreen overlay with instructions to start the game -->
    <div id="blocker">
      <div id="instructions">
        <p style="font-size: 36px">Click to play</p>
        <p>
          Move: WASD<br />
          Jump: SPACE<br />
          Look: MOUSE
        </p>
      </div>
    </div>

    <!-- Define an import map for module imports -->
    <script type="importmap">
      {
        "imports": {
          "three": "../build/three.module.js",
          "three/addons/": "./jsm/"
        }
      }
    </script>

    <script type="module">
      // Import the three.js library and the PointerLockControls addon
      import * as THREE from "three";
      import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

      // Declare variables for scene setup
      let camera, scene, renderer, controls;
      const objects = []; // Store interactive objects in the scene
      let raycaster; // For detecting intersections

      // Movement controls and physics variables
      let moveForward = false;
      let moveBackward = false;
      let moveLeft = false;
      let moveRight = false;
      let canJump = false;

      let prevTime = performance.now();
      const velocity = new THREE.Vector3();
      const direction = new THREE.Vector3();
      const vertex = new THREE.Vector3();
      const color = new THREE.Color();

      init(); // Initialize the scene

      function init() {
        // Set up the camera with perspective projection
        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          1,
          1000
        );
        camera.position.y = 10; // Set initial height

        // Create a scene with a white background and fog effect
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 0, 750);

        // Add hemisphere lighting to the scene
        const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 2.5);
        light.position.set(0.5, 1, 0.75);
        scene.add(light);

        // Set up PointerLockControls for first-person navigation
        controls = new PointerLockControls(camera, document.body);

        // Reference the blocker and instructions for interaction
        const blocker = document.getElementById("blocker");
        const instructions = document.getElementById("instructions");

        // Add click event to lock pointer controls
        instructions.addEventListener("click", function () {
          controls.lock();
        });

        // Hide instructions when controls are locked
        controls.addEventListener("lock", function () {
          instructions.style.display = "none";
          blocker.style.display = "none";
        });

        // Show instructions when controls are unlocked
        controls.addEventListener("unlock", function () {
          blocker.style.display = "block";
          instructions.style.display = "";
        });

        scene.add(controls.object); // Add controls to the scene

        // Handle keyboard input for movement
        const onKeyDown = function (event) {
          switch (event.code) {
            case "ArrowUp":
            case "KeyW":
              moveForward = true;
              break;
            case "ArrowLeft":
            case "KeyA":
              moveLeft = true;
              break;
            case "ArrowDown":
            case "KeyS":
              moveBackward = true;
              break;
            case "ArrowRight":
            case "KeyD":
              moveRight = true;
              break;
            case "Space":
              if (canJump === true) velocity.y += 350;
              canJump = false;
              break;
          }
        };

        // Stop movement when keys are released
        const onKeyUp = function (event) {
          switch (event.code) {
            case "ArrowUp":
            case "KeyW":
              moveForward = false;
              break;
            case "ArrowLeft":
            case "KeyA":
              moveLeft = false;
              break;
            case "ArrowDown":
            case "KeyS":
              moveBackward = false;
              break;
            case "ArrowRight":
            case "KeyD":
              moveRight = false;
              break;
          }
        };

        // Listen for keyboard events
        document.addEventListener("keydown", onKeyDown);
        document.addEventListener("keyup", onKeyUp);

        // Set up raycaster for detecting collisions
        raycaster = new THREE.Raycaster(
          new THREE.Vector3(),
          new THREE.Vector3(0, -1, 0),
          0,
          10
        );

        // Create a floor with randomized vertex displacement
        let floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
        floorGeometry.rotateX(-Math.PI / 2);

        // Randomize vertex positions for a terrain effect
        let position = floorGeometry.attributes.position;
        for (let i = 0, l = position.count; i < l; i++) {
          vertex.fromBufferAttribute(position, i);
          vertex.x += Math.random() * 20 - 10;
          vertex.y += Math.random() * 2;
          vertex.z += Math.random() * 20 - 10;
          position.setXYZ(i, vertex.x, vertex.y, vertex.z);
        }

        floorGeometry = floorGeometry.toNonIndexed(); // Ensure unique vertices per face
        position = floorGeometry.attributes.position;

        // Assign random colors to the floor vertices
        const colorsFloor = [];
        for (let i = 0, l = position.count; i < l; i++) {
          color.setHSL(
            Math.random() * 0.3 + 0.5,
            0.75,
            Math.random() * 0.25 + 0.75,
            THREE.SRGBColorSpace
          );
          colorsFloor.push(color.r, color.g, color.b);
        }

        floorGeometry.setAttribute(
          "color",
          new THREE.Float32BufferAttribute(colorsFloor, 3)
        );

        const floorMaterial = new THREE.MeshBasicMaterial({
          vertexColors: true,
        });

        // Add the floor to the scene
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        scene.add(floor);

        // Add randomly placed boxes to the scene
        const boxGeometry = new THREE.BoxGeometry(20, 20, 20).toNonIndexed();
        position = boxGeometry.attributes.position;

        // Assign random colors to box vertices
        const colorsBox = [];
        for (let i = 0, l = position.count; i < l; i++) {
          color.setHSL(
            Math.random() * 0.3 + 0.5,
            0.75,
            Math.random() * 0.25 + 0.75,
            THREE.SRGBColorSpace
          );
          colorsBox.push(color.r, color.g, color.b);
        }

        boxGeometry.setAttribute(
          "color",
          new THREE.Float32BufferAttribute(colorsBox, 3)
        );

        for (let i = 0; i < 500; i++) {
          const boxMaterial = new THREE.MeshPhongMaterial({
            specular: 0xffffff,
            flatShading: true,
            vertexColors: true,
          });
          boxMaterial.color.setHSL(
            Math.random() * 0.2 + 0.5,
            0.75,
            Math.random() * 0.25 + 0.75,
            THREE.SRGBColorSpace
          );

          // Randomly position each box
          const box = new THREE.Mesh(boxGeometry, boxMaterial);
          box.position.x = Math.floor(Math.random() * 20 - 10) * 20;
          box.position.y = Math.floor(Math.random() * 20) * 20 + 10;
          box.position.z = Math.floor(Math.random() * 20 - 10) * 20;

          scene.add(box);
          objects.push(box);
        }

        // Initialize the WebGL renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setAnimationLoop(animate); // Link animation loop
        document.body.appendChild(renderer.domElement);

        // Adjust camera and renderer size on window resize
        window.addEventListener("resize", onWindowResize);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      // Main animation loop
      function animate() {
        const time = performance.now();

        if (controls.isLocked === true) {
          raycaster.ray.origin.copy(controls.object.position);
          raycaster.ray.origin.y -= 10;

          const intersections = raycaster.intersectObjects(objects, false);
          const onObject = intersections.length > 0;

          const delta = (time - prevTime) / 1000; // Time elapsed since last frame

          // Apply friction and gravity to velocity
          velocity.x -= velocity.x * 10.0 * delta;
          velocity.z -= velocity.z * 10.0 * delta;
          velocity.y -= 9.8 * 100.0 * delta;

          // Calculate movement direction
          direction.z = Number(moveForward) - Number(moveBackward);
          direction.x = Number(moveRight) - Number(moveLeft);
          direction.normalize();

          if (moveForward || moveBackward)
            velocity.z -= direction.z * 400.0 * delta;
          if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

          if (onObject === true) {
            velocity.y = Math.max(0, velocity.y);
            canJump = true;
          }

          // Move the camera based on calculated velocity
          controls.moveRight(-velocity.x * delta);
          controls.moveForward(-velocity.z * delta);

          controls.object.position.y += velocity.y * delta;

          if (controls.object.position.y < 10) {
            velocity.y = 0;
            controls.object.position.y = 10;
            canJump = true;
          }
        }

        prevTime = time;

        // Render the scene from the camera's perspective
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
