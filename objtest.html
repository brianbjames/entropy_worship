<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBJ Loader in Three.js</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@<version>/build/three.module.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>

  <script>
    let scene, camera, renderer, objModel, controls;

    // Initialize the scene
    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

      // Set up the renderer
      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Set up the controls (allows mouse interaction)
      controls = new THREE.OrbitControls(camera, renderer.domElement);

      // Set up a light
      const light = new THREE.AmbientLight(0x404040); // Ambient light
      scene.add(light);

      // Load the OBJ model
      const loader = new THREE.OBJLoader();
      loader.load('images/12140_Skull_v3_L2.obj', function (object) {
        objModel = object;
        scene.add(objModel);
        objModel.position.set(0, 0, 0); // Set initial position
      });

      // Set the camera position
      camera.position.z = 5;

      // Handle window resizing
      window.addEventListener('resize', onWindowResize, false);

      // Start rendering the scene
      animate();
    }

    // Handle window resizing
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update(); // Update the controls
      renderer.render(scene, camera);
    }

    // Initialize the scene
    init();
  </script>
</body>
</html>
