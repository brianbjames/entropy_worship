    <script>
// Map of notes to MIDI values
const noteToMIDI = {
    'C': 0, 'C#': 1, 'D': 2, 'D#': 3, 'E': 4, 'F': 5, 'F#': 6, 'G': 7, 'G#': 8, 'A': 9, 'A#': 10, 'B': 11
};

// All notes and limited notes (for specific octave 9)
const allNotes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const limitedNotes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G'];

// Update the note options based on the selected octave
function updateNoteOptions() {
    const octave = parseInt(document.getElementById('octave').value); // Get selected octave
    const noteSelect = document.getElementById('note'); // Get the note dropdown
    noteSelect.innerHTML = ''; // Clear existing options

    // Choose notes based on octave
    const notesToDisplay = octave === 9 ? limitedNotes : allNotes;

    // Add options to the note select dropdown
    notesToDisplay.forEach(note => {
        const option = document.createElement('option');
        option.value = note;
        option.textContent = note;
        noteSelect.appendChild(option);
    });

    // Update output when the note options are changed
    updateOutput();
}

// Calculate MIDI and frequency values
function calculateMIDIAndFrequency() {
    const octave = parseInt(document.getElementById('octave').value); // Get selected octave
    const note = document.getElementById('note').value; // Get selected note

    // Calculate the MIDI value
    const midiValueRoot = noteToMIDI[note] + (octave + 1) * 12;

    // Calculate the frequency using the formula: frequency = 440 * 2^((midiValueRoot - 69) / 12)
    const frequency = 440 * Math.pow(2, (midiValueRoot - 69) / 12);

    return { midiValueRoot, frequency };
}

// Update the output spans in the table with the new values
function updateOutput() {
    // Get the MIDI value and frequency
    const { midiValueRoot, frequency } = calculateMIDIAndFrequency();

    // Update the spans with the new values
    document.getElementById('midiValueRoot').innerText = midiValueRoot; // Update MIDI value
    document.getElementById('frequency').innerText = frequency.toFixed(10) + " Hz"; // Update Frequency with 10 decimal places
}

// Add event listeners to the pulldowns
document.getElementById('octave').addEventListener('change', updateNoteOptions);
document.getElementById('note').addEventListener('change', updateOutput);

// Initial setup: update the note options and output when the page loads
updateNoteOptions(); // Initially update the note options based on the default octave

    </script>
