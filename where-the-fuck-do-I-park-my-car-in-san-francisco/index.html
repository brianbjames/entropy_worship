    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // ── Map init ──────────────────────────────────────────────────────────
      const map = L.map("map", {
        zoomControl: false,
        attributionControl: false,
      }).setView([37.7793, -122.4193], 15);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        {
          attribution: "",
          subdomains: "abcd",
          maxZoom: 19,
        },
      ).addTo(map);

      // ── Date / time ───────────────────────────────────────────────────────
      const now = new Date();
      const DAY_NAMES = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];
      const DAY_ABBR = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const dayIndex = now.getDay();
      const todayName = DAY_NAMES[dayIndex];
      const currentHour = now.getHours() + now.getMinutes() / 60;
      const weekOfMonth = Math.ceil(now.getDate() / 7);
      const weekField = `week${weekOfMonth}`;

      const dateStr = now.toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
      });
      const timeStr = now.toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit",
      });

      // Active viewing hour — updated by the slider, used everywhere
      let activeHour = currentHour;

      // ── View state — updated when the user picks a different day ──────────
      let viewDate = new Date(now);
      let viewDayName = todayName;
      let viewWeekOfMonth = weekOfMonth;
      let viewWeekField = weekField;

      function isViewingToday() {
        return viewDate.toDateString() === now.toDateString();
      }

      // ── Status + colors ───────────────────────────────────────────────────
      const COLORS = {
        active: "#ff3333", // red   — do not park
        upcoming: "#ff9900", // orange — restriction coming up
        passed: "#2ecc71", // green  — safe to park now
      };
      const PARK_SAFE_COLOR = "#4499ff"; // blue — safe for your full window

      let parkUntilHour = 0; // set when data loads; 0 = feature inactive
      let parkUntilDayOffset = 0; // 0 = same day as viewed, 1 = next day, etc.
      let isWeekendView = false; // true on Sat/Sun — all streets shown as blue park-safe

      function getStatusAtHour(fromhour, tohour, hour) {
        const from = parseFloat(fromhour);
        const to = parseFloat(tohour);
        if (isNaN(from) || isNaN(to)) return "upcoming";
        if (hour >= from && hour < to) return "active";
        if (hour < from) return "upcoming";
        return "passed";
      }

      function getStatus(fromhour, tohour) {
        return getStatusAtHour(fromhour, tohour, activeHour);
      }

      // A block is park-safe if its cleaning window doesn't overlap [activeHour, parkUntilHour]
      function isParkSafe(fromhour, tohour) {
        if (parkUntilHour <= activeHour) return false;
        const from = parseFloat(fromhour);
        const to = parseFloat(tohour);
        if (isNaN(from) || isNaN(to)) return true;
        return to <= activeHour || from >= parkUntilHour;
      }

      function getFeatureStyle(p, isLeft) {
        // Weekends: every street is safe — show all blue
        if (isWeekendView) {
          return {
            color: PARK_SAFE_COLOR,
            weight: lineWeight(isLeft),
            opacity: 0.9,
          };
        }
        // Street has a schedule for this weekday but not this specific week —
        // show it dimly so the map looks complete without implying a restriction.
        if (!p._thisWeek) {
          return {
            color: "#444444",
            weight: lineWeight(isLeft),
            opacity: 0.35,
          };
        }
        if (isParkSafe(p.fromhour, p.tohour)) {
          return {
            color: PARK_SAFE_COLOR,
            weight: lineWeight(isLeft),
            opacity: 0.9,
          };
        }
        const status = getStatusAtHour(p.fromhour, p.tohour, activeHour);
        return {
          color: COLORS[status],
          weight: lineWeight(isLeft),
          opacity: status === "passed" ? 0.65 : 0.9,
        };
      }

      function fmtHour(h) {
        const n = parseInt(h);
        if (isNaN(n)) return String(h);
        const ampm = n < 12 ? "AM" : "PM";
        const h12 = n === 0 ? 12 : n > 12 ? n - 12 : n;
        return `${h12}:00 ${ampm}`;
      }

      function fmtSliderHour(h) {
        const hour = Math.floor(h) % 24;
        const min = Math.round((h - Math.floor(h)) * 60);
        const ampm = hour < 12 ? "AM" : "PM";
        const h12 = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
        return `${h12}:${min.toString().padStart(2, "0")} ${ampm}`;
      }

      // ── Zoom-responsive line weight ───────────────────────────────────────
      // Left-side (L) lines are slightly thicker than right-side (R) so both
      // block faces are distinguishable when they overlap at low zoom.
      function lineWeight(isLeft) {
        const z = map.getZoom();
        const base = isLeft ? 5 : 3;
        return z >= 17
          ? base + 6
          : z >= 16
            ? base + 4
            : z >= 15
              ? base + 2
              : base;
      }

      // ── Legend subtitle ───────────────────────────────────────────────────
      function updateLegendSubtitle(date) {
        const el = document.getElementById("legend-subtitle");
        if (!el) return;
        const ds = date.toLocaleDateString("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
        });
        const wom = Math.ceil(date.getDate() / 7);
        const isToday = date.toDateString() === now.toDateString();
        const timePart = isToday ? `${timeStr} &nbsp;&middot;&nbsp; ` : "";
        el.innerHTML = `${ds}, ${timePart}Week ${wom}`;
      }
      updateLegendSubtitle(now);

      // ── Feature + layer storage ───────────────────────────────────────────
      // loadedFeatures: original (un-offset) features for distance queries
      // geoLayer: the rendered L.geoJSON layer for slider updates
      let loadedFeatures = [];
      let geoLayer = null;
      let checkMarker = null;
      let lastSearchLabel = null;
      let _lastLayerClick = 0; // timestamp of last layer click, to suppress duplicate map click

      // ── Geometry: block-face offset ───────────────────────────────────────
      // Shifts a line ~6m perpendicular to street direction so left/right
      // sides of the same block are visually distinct at zoom ≥ 15.
      function offsetGeometry(geometry, cnnrightleft) {
        // cnnrightleft is "L" or "R" in this dataset (not blockside cardinal)
        if (!geometry) return geometry;
        const side = (cnnrightleft || "").toUpperCase().trim();
        if (side !== "L" && side !== "R") return geometry;

        const dir = side === "L" ? 1 : -1;
        const OFFSET = 6; // meters

        function shiftCoords(coords) {
          if (!coords || coords.length < 2) return coords;
          const [lng1, lat1] = coords[0];
          const [lng2, lat2] = coords[coords.length - 1];
          const cosLat = Math.cos((lat1 * Math.PI) / 180);
          const dx = (lng2 - lng1) * cosLat * 111320;
          const dy = (lat2 - lat1) * 111320;
          const len = Math.sqrt(dx * dx + dy * dy);
          if (len === 0) return coords;

          // Perpendicular unit vector (left = CCW rotation of travel direction)
          const px = (-dy / len) * dir;
          const py = (dx / len) * dir;

          const dLng = (px * OFFSET) / (cosLat * 111320);
          const dLat = (py * OFFSET) / 111320;
          return coords.map(([lng, lat]) => [lng + dLng, lat + dLat]);
        }

        if (geometry.type === "LineString") {
          return {
            ...geometry,
            coordinates: shiftCoords(geometry.coordinates),
          };
        }
        if (geometry.type === "MultiLineString") {
          return {
            ...geometry,
            coordinates: geometry.coordinates.map(shiftCoords),
          };
        }
        return geometry;
      }

      // ── Distance helpers (for click-to-check) ────────────────────────────
      function distPtSeg(lat, lng, a, b) {
        const ym = 111320;
        const xm = ym * Math.cos((lat * Math.PI) / 180);
        const px = lng * xm,
          py = lat * ym;
        const ax = a[0] * xm,
          ay = a[1] * ym;
        const bx = b[0] * xm,
          by = b[1] * ym;
        const dx = bx - ax,
          dy = by - ay;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) return Math.hypot(px - ax, py - ay);
        const t = Math.max(
          0,
          Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq),
        );
        return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
      }

      function distToFeature(lat, lng, feature) {
        const geom = feature.geometry;
        if (!geom) return Infinity;
        const lines =
          geom.type === "LineString"
            ? [geom.coordinates]
            : geom.type === "MultiLineString"
              ? geom.coordinates
              : [];
        let min = Infinity;
        for (const line of lines)
          for (let i = 0; i < line.length - 1; i++)
            min = Math.min(min, distPtSeg(lat, lng, line[i], line[i + 1]));
        return min;
      }

      // ── Verdict panel ─────────────────────────────────────────────────────
      function showVerdict(latlng, label) {
        lastSearchLabel = label;

        // If data hasn't loaded yet (and it's not a weekend), leave the panel in its loading state
        if (!isWeekendView && loadedFeatures.length === 0) return;

        // Weekends: all streets are safe, no data needed
        if (isWeekendView) {
          if (checkMarker) map.removeLayer(checkMarker);
          checkMarker = L.circleMarker(latlng, {
            radius: 7,
            color: PARK_SAFE_COLOR,
            weight: 3,
            fillColor: PARK_SAFE_COLOR,
            fillOpacity: 0.25,
          }).addTo(map);
          const panel = document.getElementById("result-panel");
          panel.innerHTML = `
            ${label ? `<div class="result-address">${label}</div>` : ""}
            <div class="verdict verdict-ok">&#x2713;&nbsp; Safe — no weekend cleaning</div>
            <div class="result-rows">
              <span class="r-dim">Street cleaning runs Mon – Fri.<br>${viewDayName} has no restrictions.</span>
            </div>
          `;
          panel.style.display = "block";
          return;
        }

        const RADIUS = 60;
        const nearby = loadedFeatures
          .map((f) => ({ f, d: distToFeature(latlng.lat, latlng.lng, f) }))
          .filter((x) => x.d <= RADIUS)
          .sort((a, b) => a.d - b.d)
          .slice(0, 8);

        // Split by this-week status (for the verdict badge) and other-week (shown as context)
        const nearbyThisWeek = nearby.filter((x) => x.f.properties._thisWeek);
        const nearbyOtherWeek = nearby.filter((x) => !x.f.properties._thisWeek);

        const active = nearbyThisWeek.filter(
          (x) =>
            getStatusAtHour(
              x.f.properties.fromhour,
              x.f.properties.tohour,
              activeHour,
            ) === "active",
        );
        const upcoming = nearbyThisWeek
          .filter(
            (x) =>
              getStatusAtHour(
                x.f.properties.fromhour,
                x.f.properties.tohour,
                activeHour,
              ) === "upcoming",
          )
          .sort(
            (a, b) =>
              parseFloat(a.f.properties.fromhour) -
              parseFloat(b.f.properties.fromhour),
          );
        const passed = nearbyThisWeek.filter(
          (x) =>
            getStatusAtHour(
              x.f.properties.fromhour,
              x.f.properties.tohour,
              activeHour,
            ) === "passed",
        );

        // Verdict badge shows the most actionable time info
        const dayLabel = isViewingToday() ? "today" : `this ${viewDayName}`;
        let verdict, verdictHtml;
        if (active.length > 0) {
          verdict = "active";
          const endTime = fmtHour(active[0].f.properties.tohour);
          verdictHtml = `<div class="verdict verdict-active">&#x2717;&nbsp; No Parking — until ${endTime}</div>`;
        } else if (upcoming.length > 0) {
          verdict = "upcoming";
          const p = upcoming[0].f.properties;
          verdictHtml = `<div class="verdict verdict-upcoming">&#x26A0;&nbsp; Next cleaning: ${fmtHour(p.fromhour)} – ${fmtHour(p.tohour)}</div>`;
        } else if (passed.length > 0) {
          verdict = "passed";
          verdictHtml = `<div class="verdict verdict-ok">&#x2713;&nbsp; Safe — no more cleaning ${dayLabel}</div>`;
        } else if (nearbyOtherWeek.length > 0) {
          verdict = "ok";
          verdictHtml = `<div class="verdict verdict-ok">&#x2713;&nbsp; Safe — no cleaning this week</div>`;
        } else {
          verdict = "ok";
          verdictHtml = `<div class="verdict verdict-passed">&#x2014;&nbsp; No street cleaning data here</div>`;
        }

        // Detail rows — this-week entries first (active/upcoming/passed), then other-week as context
        let rows = "";
        for (const { f, d } of [...active, ...upcoming, ...passed]) {
          const p = f.properties;
          const status = getStatusAtHour(p.fromhour, p.tohour, activeHour);
          const side = p.blockside
            ? `<span class="r-dim"> · ${p.blockside}</span>`
            : "";
          rows += `
            <div class="r-${status}">
              ${p.corridor || "—"}${side}<br>
              <span class="r-dim">${fmtHour(p.fromhour)}–${fmtHour(p.tohour)} &nbsp;·&nbsp; ${Math.round(d)}m</span>
            </div>`;
        }
        if (nearbyOtherWeek.length > 0) {
          if (rows) rows += `<div style="border-top:1px solid #1e1e1e;margin:5px 0"></div>`;
          for (const { f, d } of nearbyOtherWeek.slice(0, 4)) {
            const p = f.properties;
            const side = p.blockside
              ? `<span class="r-dim"> · ${p.blockside}</span>`
              : "";
            rows += `
              <div class="r-dim">
                ${p.corridor || "—"}${side}<br>
                <span class="r-dim">${fmtHour(p.fromhour)}–${fmtHour(p.tohour)} &nbsp;·&nbsp; ${Math.round(d)}m &nbsp;·&nbsp; not this week</span>
              </div>`;
          }
        }

        // Update pin color to match verdict
        const mColor = {
          ok: "#2ecc71",
          active: "#ff3333",
          upcoming: "#ff9900",
          passed: "#2ecc71",
        }[verdict];
        if (checkMarker) map.removeLayer(checkMarker);
        checkMarker = L.circleMarker(latlng, {
          radius: 7,
          color: mColor,
          weight: 3,
          fillColor: mColor,
          fillOpacity: 0.25,
        }).addTo(map);

        const panel = document.getElementById("result-panel");
        panel.innerHTML = `
          ${label ? `<div class="result-address">${label}</div>` : ""}
          ${verdictHtml}
          <div class="result-rows">
            ${rows || `<span class="r-dim">${label ? `${label} &nbsp;&middot;&nbsp; ` : ""}No street cleaning data within 60m.</span>`}
          </div>
        `;
        panel.style.display = "block";
      }

      // ── Legend count update ───────────────────────────────────────────────
      function updateCounts(hour) {
        const c = { active: 0, upcoming: 0, passed: 0, parksafe: 0 };
        if (geoLayer) {
          geoLayer.eachLayer((layer) => {
            const p = layer.feature && layer.feature.properties;
            if (!p) return;
            if (isWeekendView) {
              c.parksafe++;
            } else if (p._thisWeek) {
              if (isParkSafe(p.fromhour, p.tohour)) {
                c.parksafe++;
              } else {
                c[getStatusAtHour(p.fromhour, p.tohour, hour)]++;
              }
            }
          });
        }
        document.getElementById("cnt-active").textContent =
          c.active.toLocaleString();
        document.getElementById("cnt-upcoming").textContent =
          c.upcoming.toLocaleString();
        document.getElementById("cnt-passed").textContent =
          c.passed.toLocaleString();
        document.getElementById("cnt-parksafe").textContent =
          c.parksafe.toLocaleString();
      }

      // ── Render GeoJSON ────────────────────────────────────────────────────
      function isTruthy(v) {
        return v === true || v === "Y" || v === "y" || v === 1 || v === "1";
      }

      let daySelectorBuilt = false;

      function renderGeoJSON(geojson) {
        document.getElementById("loading").style.display = "none";
        loadedFeatures = [];

        if (!geojson.features || geojson.features.length === 0) {
          showNotice(
            "No Data Found",
            `No restrictions found for ${viewDayName}, week ${viewWeekOfMonth}.<br>
             Check the browser console for API field details.`,
          );
          return;
        }

        // Pre-process: tag each feature with whether it's active this week,
        // keep all features so every street shows on the map.
        const features = geojson.features
          .filter((f) => f.geometry)
          .map((f) => {
            const thisWeek = isTruthy(f.properties[viewWeekField]);
            loadedFeatures.push({ ...f, properties: { ...f.properties, _thisWeek: thisWeek } }); // include _thisWeek for verdict logic
            return {
              ...f,
              properties: { ...f.properties, _thisWeek: thisWeek },
              geometry: offsetGeometry(f.geometry, f.properties.cnnrightleft),
            };
          });

        const c = { active: 0, upcoming: 0, passed: 0, parksafe: 0 };

        geoLayer = L.geoJSON(
          { type: "FeatureCollection", features },
          {
            style: (feature) => {
              const p = feature.properties;
              if (isWeekendView) {
                c.parksafe++;
              } else if (p._thisWeek) {
                if (isParkSafe(p.fromhour, p.tohour)) {
                  c.parksafe++;
                } else {
                  c[getStatusAtHour(p.fromhour, p.tohour, activeHour)]++;
                }
              }
              const isLeft = (p.cnnrightleft || "").toUpperCase() === "L";
              return getFeatureStyle(p, isLeft);
            },
            onEachFeature: (feature, layer) => {
              const p = feature.properties;

              // Tooltip on hover
              layer.bindTooltip(
                () =>
                  `${p.corridor || "—"} &nbsp;·&nbsp; ${fmtHour(p.fromhour)}–${fmtHour(p.tohour)}`,
                { sticky: true, direction: "top" },
              );

              // Popup on click
              layer.bindPopup(() => {
                const status = getStatusAtHour(
                  p.fromhour,
                  p.tohour,
                  activeHour,
                );
                const label =
                  !p._thisWeek
                    ? "Not This Week"
                    : status === "active"
                      ? "No Parking Now"
                      : status === "upcoming"
                        ? "Upcoming Today"
                        : "Passed — Safe";
                const badgeClass = !p._thisWeek ? "badge-passed" : `badge-${status}`;
                // Determine which weeks this block is scheduled
                const weekNums = [1,2,3,4,5].filter((w) => isTruthy(p[`week${w}`])).join(", ");
                return `
                <div class="popup-street">${p.corridor || "Unknown Street"}</div>
                <span class="popup-badge ${badgeClass}">${label}</span><br>
                <b>Cross streets:</b> ${p.limits || "—"}<br>
                <b>Block side:</b>    ${p.blockside || "—"}<br>
                <b>Hours:</b>         ${fmtHour(p.fromhour)} – ${fmtHour(p.tohour)}<br>
                <b>Schedule:</b>      ${p.weekday || viewDayName}${weekNums ? `, week${weekNums.length > 1 ? "s" : ""} ${weekNums}` : ""}
              `;
              });

              // Highlight on hover
              layer.on("mouseover", () => {
                const isLeft = (p.cnnrightleft || "").toUpperCase() === "L";
                layer.setStyle({ weight: lineWeight(isLeft) + 4 });
              });
              layer.on("mouseout", () => {
                const isLeft = (p.cnnrightleft || "").toUpperCase() === "L";
                layer.setStyle({ weight: lineWeight(isLeft) });
              });

              // Update verdict panel when clicking a street
              layer.on("click", (e) => {
                _lastLayerClick = Date.now();
                showVerdict(e.latlng, p.corridor || "Unknown Street");
              });
            },
          },
        ).addTo(map);

        // Update legend
        document.getElementById("cnt-active").textContent =
          c.active.toLocaleString();
        document.getElementById("cnt-upcoming").textContent =
          c.upcoming.toLocaleString();
        document.getElementById("cnt-passed").textContent =
          c.passed.toLocaleString();
        document.getElementById("cnt-parksafe").textContent =
          c.parksafe.toLocaleString();

        // Show time slider (idempotent)
        document.getElementById("time-section").hidden = false;

        // Init park-until slider to 2 h after current view hour
        parkUntilDayOffset = 0;
        parkUntilHour = Math.min(24, activeHour + 2);
        const parkSlider = document.getElementById("park-slider");
        parkSlider.value = parkUntilHour;
        updateParkLabel(parkUntilHour);

        // Build day selector once
        if (!daySelectorBuilt) {
          buildDaySelector();
          daySelectorBuilt = true;
        } else {
          buildParkDaySelector();
        }

        // Show verdict for pinned location (or default City Hall)
        if (checkMarker) {
          showVerdict(checkMarker.getLatLng(), lastSearchLabel);
        } else {
          const cityHall = L.latLng(37.7793, -122.4193);
          showVerdict(cityHall, "SF City Hall");
        }
      }

      // ── Day selector ──────────────────────────────────────────────────────
      function buildDaySelector() {
        const container = document.getElementById("day-selector");
        if (!container) return;

        // Collect up to 7 calendar days from today, weekdays only
        const options = [];
        for (let i = 0; i < 7; i++) {
          const d = new Date(now);
          d.setDate(now.getDate() + i);
          const di = d.getDay();
          let label;
          if (i === 0) label = "Today";
          else label = DAY_NAMES[di];
          options.push({ date: d, label, offset: i });
        }

        container.innerHTML = "";
        options.forEach(({ date, label, offset }) => {
          const btn = document.createElement("button");
          btn.className =
            "day-btn" +
            (date.toDateString() === viewDate.toDateString() ? " active" : "");
          btn.textContent = label;
          btn.addEventListener("click", () => {
            document
              .querySelectorAll("#day-selector .day-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            switchToDay(date);
          });
          container.appendChild(btn);
        });

        buildParkDaySelector();
      }

      // ── Park-until day selector ───────────────────────────────────────────
      function buildParkDaySelector() {
        const container = document.getElementById("park-day-selector");
        if (!container) return;

        container.innerHTML = "";
        for (let i = 0; i < 7; i++) {
          const d = new Date(viewDate);
          d.setDate(viewDate.getDate() + i);
          const btn = document.createElement("button");
          btn.className = "day-btn" + (i === parkUntilDayOffset ? " active" : "");
          btn.textContent = DAY_NAMES[d.getDay()];
          btn.dataset.offset = i;
          btn.addEventListener("click", () => {
            document
              .querySelectorAll("#park-day-selector .day-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            parkUntilDayOffset = i;
            const sliderVal = parseFloat(
              document.getElementById("park-slider").value,
            );
            updateParkUntil(parkUntilDayOffset * 24 + sliderVal);
          });
          container.appendChild(btn);
        }
      }

      // ── Switch to a different day ─────────────────────────────────────────
      function switchToDay(date) {
        viewDate = date;
        viewDayName = DAY_NAMES[date.getDay()];
        viewWeekOfMonth = Math.ceil(date.getDate() / 7);
        viewWeekField = `week${viewWeekOfMonth}`;

        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        isWeekendView = isWeekend;

        // For weekdays, clear the layer and re-fetch.
        // For weekends, keep the existing geometry and just re-style it blue.
        if (!isWeekend) {
          if (geoLayer) {
            map.removeLayer(geoLayer);
            geoLayer = null;
          }
          loadedFeatures = [];
        }

        // Reset time to current hour (today) or 8 AM (future day)
        const targetHour = isViewingToday() ? currentHour : 8;
        activeHour = targetHour;
        const slider = document.getElementById("time-slider");
        slider.value = Math.min(24, Math.max(0, targetHour));
        setTimeLabel(targetHour);

        // Reset park-until to 2 h ahead
        parkUntilDayOffset = 0;
        parkUntilHour = Math.min(24, targetHour + 2);
        const parkSlider = document.getElementById("park-slider");
        parkSlider.value = parkUntilHour;
        updateParkLabel(parkUntilHour);
        buildParkDaySelector();

        // Update reset button label
        document.getElementById("time-reset").textContent = isViewingToday()
          ? "Reset to now"
          : "Reset to 8 AM";

        // Update legend subtitle
        updateLegendSubtitle(date);

        if (isWeekend) {
          if (geoLayer) {
            // Re-style all existing streets as blue
            geoLayer.eachLayer((layer) => {
              const p = layer.feature && layer.feature.properties;
              if (!p) return;
              const isLeft = (p.cnnrightleft || "").toUpperCase() === "L";
              layer.setStyle(getFeatureStyle(p, isLeft));
            });
            updateCounts(activeHour);
          } else {
            // No streets loaded yet — fetch any weekday's geometry for display
            const loadEl = document.getElementById("loading");
            loadEl.textContent = "Loading street data…";
            loadEl.style.display = "block";
            fetchForDay("Friday");
          }
          const latlng = checkMarker ? checkMarker.getLatLng() : L.latLng(37.7793, -122.4193);
          const lbl = checkMarker ? lastSearchLabel : "SF City Hall";
          showVerdict(latlng, lbl);
          return;
        }

        // Show loading
        const loadEl = document.getElementById("loading");
        loadEl.textContent = `Loading street cleaning data for ${viewDayName}…`;
        loadEl.style.display = "block";

        // Fetch data for the selected day
        fetchForDay(viewDayName);
      }

      // ── Time slider ───────────────────────────────────────────────────────
      function setTimeLabel(hour) {
        const isNow = isViewingToday() && Math.abs(hour - currentHour) < 0.26;
        const prefix = isNow
          ? `Now · ${timeStr}`
          : isViewingToday()
            ? `Viewing · ${fmtSliderHour(hour)}`
            : `${viewDayName} · ${fmtSliderHour(hour)}`;
        document.getElementById("time-label").textContent = prefix;
      }

      function updateForHour(hour) {
        activeHour = hour;
        setTimeLabel(hour);

        if (geoLayer) {
          geoLayer.eachLayer((layer) => {
            const p = layer.feature && layer.feature.properties;
            if (!p) return;
            const isLeft = (p.cnnrightleft || "").toUpperCase() === "L";
            layer.setStyle(getFeatureStyle(p, isLeft));
          });
        }

        updateCounts(hour);

        // Refresh verdict if a location is pinned
        if (checkMarker) showVerdict(checkMarker.getLatLng(), lastSearchLabel);
      }

      document
        .getElementById("time-slider")
        .addEventListener("input", function () {
          updateForHour(parseFloat(this.value));
        });

      document.getElementById("time-reset").addEventListener("click", () => {
        const targetHour = isViewingToday() ? currentHour : 8;
        const slider = document.getElementById("time-slider");
        slider.value = Math.min(24, Math.max(0, targetHour));
        updateForHour(targetHour);
      });

      // ── Park-until slider ─────────────────────────────────────────────────
      function updateParkLabel(sliderHour) {
        const timeStr = fmtSliderHour(sliderHour % 24);
        let label = "Park until: ";
        if (parkUntilDayOffset === 0) {
          label += timeStr;
        } else {
          const d = new Date(viewDate);
          d.setDate(d.getDate() + parkUntilDayOffset);
          label += `${DAY_ABBR[d.getDay()]} ${timeStr}`;
        }
        document.getElementById("park-label").textContent = label;
      }

      function updateParkUntil(hour) {
        parkUntilHour = hour;
        updateParkLabel(hour);
        if (geoLayer) {
          geoLayer.eachLayer((layer) => {
            const p = layer.feature && layer.feature.properties;
            if (!p) return;
            const isLeft = (p.cnnrightleft || "").toUpperCase() === "L";
            layer.setStyle(getFeatureStyle(p, isLeft));
          });
        }
        if (checkMarker) showVerdict(checkMarker.getLatLng(), lastSearchLabel);
      }

      document
        .getElementById("park-slider")
        .addEventListener("input", function () {
          const sliderVal = parseFloat(this.value);
          updateParkUntil(parkUntilDayOffset * 24 + sliderVal);
        });

      // Re-apply zoom-responsive weights whenever the user zooms in or out
      window.addEventListener("resize", () => map.invalidateSize());

      map.on("zoomend", () => {
        if (!geoLayer) return;
        geoLayer.eachLayer((layer) => {
          const p = layer.feature && layer.feature.properties;
          if (!p) return;
          const isLeft = (p.cnnrightleft || "").toUpperCase() === "L";
          layer.setStyle({ weight: lineWeight(isLeft) });
        });
      });

      // ── Map click → verdict ───────────────────────────────────────────────
      map.on("click", async (e) => {
        if (Date.now() - _lastLayerClick < 50) return; // layer already handled this
        showVerdict(e.latlng, null);
        try {
          const resp = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${e.latlng.lat}&lon=${e.latlng.lng}&format=json`,
            { headers: { "User-Agent": "SF-Street-Cleaning-Map" } },
          );
          const data = await resp.json();
          const street =
            data.address?.road ||
            data.address?.pedestrian ||
            data.address?.path ||
            null;
          if (street && checkMarker && checkMarker.getLatLng().equals(e.latlng))
            showVerdict(e.latlng, street);
        } catch {}
      });

      // ── My Location ───────────────────────────────────────────────────────
      document.getElementById("locate-btn").addEventListener("click", () => {
        if (!navigator.geolocation) {
          document.getElementById("result-panel").innerHTML =
            `<div style="color:#aa4444;font-size:11px">Geolocation not supported by this browser.</div>`;
          document.getElementById("result-panel").style.display = "block";
          return;
        }
        const btn = document.getElementById("locate-btn");
        btn.textContent = "…";
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            btn.textContent = "⊙ My Location";
            const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
            map.setView(latlng, 17);
            showVerdict(latlng, "Your Location");
          },
          (err) => {
            btn.textContent = "⊙ My Location";
            const msg =
              err.code === 1
                ? "Location access denied — check Settings > Safari > Location."
                : "Could not get location. Try again.";
            document.getElementById("result-panel").innerHTML =
              `<div style="color:#aa4444;font-size:11px">${msg}</div>`;
            document.getElementById("result-panel").style.display = "block";
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 },
        );
      });

      // ── Address search ────────────────────────────────────────────────────
      document
        .getElementById("search-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const q = document.getElementById("search-input").value.trim();
          const btn = document.getElementById("search-btn");
          if (!q) return;

          btn.textContent = "…";
          btn.disabled = true;

          try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ", San Francisco, CA")}&format=json&limit=1`;
            const resp = await fetch(url, {
              headers: { "User-Agent": "SF-Street-Cleaning-Map" },
            });
            const data = await resp.json();

            if (!data.length) {
              document.getElementById("result-panel").innerHTML =
                `<div style="color:#aa4444;font-size:11px">Address not found in SF.</div>`;
              document.getElementById("result-panel").style.display = "block";
              return;
            }

            const { lat, lon, display_name } = data[0];
            const latlng = L.latLng(parseFloat(lat), parseFloat(lon));
            map.setView(latlng, 17);
            const shortLabel = display_name.split(",").slice(0, 2).join(", ");
            showVerdict(latlng, shortLabel);
          } catch (err) {
            document.getElementById("result-panel").innerHTML =
              `<div style="color:#aa4444;font-size:11px">Geocoding error: ${err.message}</div>`;
            document.getElementById("result-panel").style.display = "block";
          } finally {
            btn.textContent = "Go";
            btn.disabled = false;
          }
        });

      // ── Helpers ───────────────────────────────────────────────────────────
      function showNotice(title, body) {
        const el = document.createElement("div");
        el.className = "notice-overlay";
        el.innerHTML = `<h2>${title}</h2><p>${body}</p>`;
        document.body.appendChild(el);
      }

      // ── API setup ─────────────────────────────────────────────────────────
      // BASE, cachedWeekdayField, and fetchForDay are declared here so they are
      // accessible from both the initial load branches AND from switchToDay.

      const BASE = "https://data.sfgov.org/resource/yhqp-riqs";
      let cachedWeekdayField = "weekday";

      function fetchForDay(dayName) {
        const where = `upper(${cachedWeekdayField})='${dayName.toUpperCase()}'`;
        console.log(`[SF Cleaning] Fetching day=${dayName}, weekField=${viewWeekField}, query: $where=${where}`);

        const pageSize = 10000;
        let offset = 0;
        let allFeatures = [];

        function fetchPage() {
          const url = `${BASE}.geojson?$where=${encodeURIComponent(where)}&$limit=${pageSize}&$offset=${offset}`;
          return fetch(url)
            .then((r) => {
              if (!r.ok) throw new Error(`Data fetch failed: HTTP ${r.status}`);
              return r.json();
            })
            .then((data) => {
              const batch = (data.features || []);
              allFeatures = allFeatures.concat(batch);
              console.log(`[SF Cleaning] Page offset=${offset}: ${batch.length} features (total so far: ${allFeatures.length})`);
              if (batch.length < pageSize) {
                const thisWeekCount = allFeatures.filter(
                  (f) => f.properties && isTruthy(f.properties[viewWeekField])
                ).length;
                console.log(`[SF Cleaning] Done. Total=${allFeatures.length}, thisWeek(${viewWeekField})=${thisWeekCount}`);
                renderGeoJSON({ type: "FeatureCollection", features: allFeatures });
              } else {
                offset += pageSize;
                return fetchPage();
              }
            });
        }

        return fetchPage().catch((err) => {
          document.getElementById("loading").textContent = `Error: ${err.message}`;
          console.error("[SF Cleaning]", err);
        });
      }

      // Run the probe to detect the weekday field name, then fetch data.
      function probeAndFetch(dayName) {
        return fetch(`${BASE}.json?$limit=10`)
          .then((r) => {
            if (!r.ok) throw new Error(`Probe failed: HTTP ${r.status}`);
            return r.json();
          })
          .then((probe) => {
            const records = Array.isArray(probe) ? probe : [];
            if (!records.length) throw new Error("Probe returned no records");

            console.log("[SF Cleaning] Fields:", Object.keys(records[0]).join(", "));
            console.log("[SF Cleaning] Sample record:", records[0]);

            const daySet = new Set([
              ...DAY_NAMES.map((d) => d.toLowerCase()),
              ...DAY_ABBR.map((d) => d.toLowerCase()),
            ]);
            outer: for (const rec of records) {
              for (const [key, val] of Object.entries(rec)) {
                if (daySet.has(String(val || "").toLowerCase().trim())) {
                  cachedWeekdayField = key;
                  break outer;
                }
              }
            }
            console.log(`[SF Cleaning] Weekday field: "${cachedWeekdayField}"`);

            return fetchForDay(dayName);
          })
          .catch((err) => {
            document.getElementById("loading").textContent = `Error: ${err.message}`;
            console.error("[SF Cleaning]", err);
          });
      }

      // Initial slider position for today
      const slider = document.getElementById("time-slider");
      slider.value = Math.min(24, Math.max(0, currentHour));
      setTimeLabel(currentHour);

      // ── Initial load ──────────────────────────────────────────────────────
      if (dayIndex === 0 || dayIndex === 6) {
        // Weekend: fetch any weekday's geometry so streets render blue on the map
        isWeekendView = true;
        const CITY_HALL = L.latLng(37.7793, -122.4193);
        lastSearchLabel = "SF City Hall";
        showVerdict(CITY_HALL, "SF City Hall"); // shows weekend panel immediately
        probeAndFetch("Friday");
      } else {
        // Weekday: place City Hall pin and load today's cleaning data
        const CITY_HALL = L.latLng(37.7793, -122.4193);
        lastSearchLabel = "SF City Hall";
        checkMarker = L.circleMarker(CITY_HALL, {
          radius: 7,
          color: "#555",
          weight: 3,
          fillColor: "#555",
          fillOpacity: 0.25,
        }).addTo(map);
        document.getElementById("result-panel").innerHTML = `
          <div class="result-address">SF City Hall</div>
          <div style="color:#ccc;font-size:11px;margin-top:4px">Loading cleaning data…</div>
        `;
        document.getElementById("result-panel").style.display = "block";

        probeAndFetch(viewDayName);
      }
    </script>
  </body>
</html>
