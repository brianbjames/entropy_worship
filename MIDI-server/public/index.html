<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDI SERVER // ENTROPY WORSHIP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="scanlines"></div>

  <!-- Browser autoplay policy: must have a user gesture before AudioContext resumes -->
  <div id="unlock-overlay">
    <div class="unlock-box">
      <h1 class="hud-title">MIDI SERVER</h1>
      <p>// COLLABORATIVE SEQUENCER // SYNCHRONIZED</p>
      <button id="unlock-btn">[ ENTER ]</button>
    </div>
  </div>

  <div id="app">
    <header>
      <h1 class="hud-title">MIDI SERVER</h1>
      <div id="meta">
        <span id="status" class="disconnected">connecting…</span>
        <span id="room-display">room: <strong id="room-name">—</strong></span>
        <span id="players">— players</span>
        <span id="latency">— ms</span>
        <span id="clock-offset" title="Server clock offset">Δ—</span>
      </div>
    </header>

    <!-- Room switcher -->
    <div id="room-bar">
      <span class="muted">room</span>
      <input id="room-input" type="text" placeholder="room name" maxlength="32" spellcheck="false">
      <button id="room-join-btn">Join</button>
    </div>

    <!-- Peers latency list -->
    <div id="peers-bar"></div>

    <div id="controls">
      <button id="play-btn">&#9654; Play</button>
      <button id="stop-btn" disabled>&#9632; Stop</button>
      <label>
        BPM
        <input type="range" id="bpm" min="60" max="200" value="120">
        <strong id="bpm-val">120</strong>
      </label>
      <div id="midi-controls">
        <div id="midi-io">
          <button id="midi-btn">MIDI</button>
          <select id="midi-input-device" style="display:none">
            <option value="">— input —</option>
          </select>
          <span class="midi-sep" id="midi-arrow" style="display:none">→</span>
          <select id="midi-output-device" style="display:none">
            <option value="">— output —</option>
          </select>
          <button id="thru-btn" style="display:none">Thru</button>
          <button id="clock-relay-btn" style="display:none">Clock ↑</button>
          <button id="panic-btn">Panic</button>
        </div>
        <div id="midi-channel-row" style="display:none">
          <label>Filter <select id="filter-ch"><option value="0">All ch</option></select></label>
          <label>Remap&#8594; <select id="remap-ch"><option value="0">ch as-is</option></select></label>
        </div>
      </div>
    </div>

    <div id="sequencer"></div>

    <!-- Virtual Keyboard -->
    <div id="vkb-section">
      <div class="section-title">Virtual Keyboard</div>
      <div id="vkb-controls">
        <label>Oct
          <select id="vkb-oct">
            <option value="2">C2</option>
            <option value="3">C3</option>
            <option value="4" selected>C4</option>
            <option value="5">C5</option>
            <option value="6">C6</option>
          </select>
        </label>
        <label>Ch <select id="vkb-ch"></select></label>
        <label>Vel
          <input type="range" id="vkb-vel" min="1" max="127" value="80">
          <strong id="vkb-vel-val">80</strong>
        </label>
      </div>
      <div id="vkb"></div>
    </div>

    <!-- CC Monitor -->
    <div id="cc-section">
      <div class="section-title">CC Monitor</div>
      <div id="cc-viz"><span class="muted" style="font-size:0.78rem">no CC received yet</span></div>
    </div>

    <!-- Recording -->
    <div id="record-section">
      <div class="section-title">Recording</div>
      <div id="record-controls">
        <button id="rec-btn">&#9679; Rec</button>
        <button id="rec-stop-btn" disabled>&#9632; Stop</button>
        <button id="rec-export-btn" disabled>&#8595; .mid</button>
        <span id="rec-status" class="muted"></span>
      </div>
    </div>

    <div id="midi-section">
      <div class="section-title">// MIDI LOG <span class="cursor-blink">▮</span></div>
      <div id="midi-log"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tone@14.8/build/Tone.js"></script>
  <script src="client.js"></script>
</body>
</html>
