<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'><rect width='1' height='1' fill='%23000'/></svg>"
    />
    <title>ENTROPY WORSHIP // THE ANSWER</title>
    <meta
      name="description"
      content="Three-dimensional interactive space created with Wolfram-fed data from the NASA API"
    />
    <link href="../styles/imported_fonts.css" rel="stylesheet" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Courier New", monospace;
      }

      #bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        display: block;
      }

      /* CRT scanlines */
      #scanlines {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 5;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 0, 0, 0.06) 3px,
          rgba(0, 0, 0, 0.06) 4px
        );
      }

      /* ── HUD base ───────────────────────────────────────────────────────────── */
      .hud-panel {
        position: fixed;
        z-index: 100;
        background: rgba(4, 4, 4, 0.82);
        border: 1px solid rgba(102, 12, 12, 0.55);
        color: #fff;
        font-family: "VT323-Regular", "Courier New", monospace;
        font-size: 22px;
        line-height: 1.4;
        padding: 12px 18px;
        filter: drop-shadow(0 0 6px rgba(102, 12, 12, 0.35))
          drop-shadow(0 0 22px rgba(102, 12, 12, 0.12));
        min-width: 240px;
      }

      .clip-br {
        clip-path: polygon(
          0 0,
          100% 0,
          100% calc(100% - 16px),
          calc(100% - 16px) 100%,
          0 100%
        );
      }
      .clip-bl {
        clip-path: polygon(
          0 0,
          100% 0,
          100% 100%,
          16px 100%,
          0 calc(100% - 16px)
        );
      }
      .clip-tr {
        clip-path: polygon(
          0 0,
          calc(100% - 16px) 0,
          100% 16px,
          100% 100%,
          0 100%
        );
      }
      .clip-tl {
        clip-path: polygon(16px 0, 100% 0, 100% 100%, 0 100%, 0 16px);
      }

      #hud-tl {
        top: 12px;
        left: 12px;
        max-width: 340px;
      }
      #hud-bl {
        bottom: 12px;
        left: 12px;
        max-width: 340px;
      }

      .hud-title {
        font-family: "Chargen", "Courier New", monospace;
        font-size: 28px;
        letter-spacing: 2px;
        color: #ff2222;
        text-shadow:
          0 0 10px rgba(255, 34, 34, 1),
          0 0 24px rgba(255, 34, 34, 0.5);
        display: block;
        text-decoration: none;
        animation: title-glitch 8s linear infinite;
      }
      @keyframes title-glitch {
        0%,
        88%,
        100% {
          transform: none;
          text-shadow:
            0 0 10px rgba(255, 34, 34, 1),
            0 0 24px rgba(255, 34, 34, 0.5);
        }
        89% {
          transform: skewX(-2deg) translateX(2px);
          text-shadow:
            2px 0 #05af90,
            -2px 0 #ff2222;
        }
        90% {
          transform: skewX(2deg) translateX(-2px);
        }
        91% {
          transform: none;
          text-shadow: 0 0 10px rgba(255, 34, 34, 1);
        }
        94% {
          transform: translateX(-3px);
          filter: brightness(1.6);
        }
        95% {
          transform: none;
          filter: none;
        }
      }

      .hud-sub {
        font-size: 16px;
        color: #ff2222;
        letter-spacing: 1px;
        text-transform: uppercase;
        display: block;
        margin-top: 1px;
      }
      .hud-sep {
        border: none;
        border-top: 1px solid rgba(102, 12, 12, 0.4);
        margin: 8px 0;
      }
      .hud-label {
        color: #660c0c;
        font-size: 16px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .hud-value {
        color: #05af90;
        font-family: "Courier New", monospace;
        font-size: 18px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 2px 0;
      }

      /* ── Console ────────────────────────────────────────────────────────────── */
      #console-body {
        max-height: 85px;
        overflow: hidden;
        display: flex;
        flex-direction: column-reverse;
      }
      .con-line {
        display: block;
        font-size: 17px;
        line-height: 1.35;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        opacity: 0;
        animation: con-fade 0.4s forwards;
      }
      @keyframes con-fade {
        to {
          opacity: 1;
        }
      }
      .con-err {
        color: #660c0c;
      }
      .con-warn {
        color: #cec823;
      }
      .con-ok {
        color: #05af90;
      }
      .con-info {
        color: #4499ff;
      }

      .cursor-blink {
        color: #660c0c;
        font-size: 20px;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* ── Object labels ──────────────────────────────────────────────────────── */
      .obj-label {
        position: fixed;
        z-index: 60;
        pointer-events: none;
        font-family: "VT323-Regular", "Courier New", monospace;
        font-size: 17px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        transform: translate(-50%, -130%);
        opacity: 0;
        transition: opacity 0.3s;
        padding: 2px 7px;
        color: rgba(102, 12, 12, 0.9);
        text-shadow: 0 0 5px rgba(102, 12, 12, 0.7);
        border-left: 1px solid rgba(102, 12, 12, 0.5);
        border-bottom: 1px solid rgba(102, 12, 12, 0.3);
      }
      .lbl-cyan {
        color: rgba(5, 175, 144, 0.9);
        text-shadow: 0 0 5px rgba(5, 175, 144, 0.6);
        border-left-color: rgba(5, 175, 144, 0.5);
        border-bottom-color: rgba(5, 175, 144, 0.3);
      }
      .lbl-yellow {
        color: rgba(206, 200, 35, 0.9);
        text-shadow: 0 0 5px rgba(206, 200, 35, 0.6);
        border-left-color: rgba(206, 200, 35, 0.5);
        border-bottom-color: rgba(206, 200, 35, 0.3);
      }

      /* ── Wolfram data sub-line under labels ─────────────────────────────────── */
      .lbl-data {
        display: block;
        font-size: 13px;
        font-family: "Courier New", monospace;
        color: rgba(255, 30, 30, 0.9);
        margin-top: 3px;
        max-width: 240px;
        white-space: normal;
        line-height: 1.25;
        letter-spacing: 0.3px;
        font-style: normal;
      }
      .lbl-name {
        font-family: "Xirod", "VT323-Regular", monospace;
        letter-spacing: 2px;
        color: rgba(68, 153, 255, 1);
        text-shadow:
          0 0 4px rgba(68, 153, 255, 1),
          0 0 12px rgba(68, 153, 255, 0.85),
          0 0 28px rgba(68, 153, 255, 0.45),
          0 0 54px rgba(68, 153, 255, 0.2);
      }
      .lbl-data.querying {
        animation: lbl-blink 0.6s step-end infinite;
        color: rgba(206, 200, 35, 0.7);
      }
      @keyframes lbl-blink {
        50% {
          opacity: 0;
        }
      }

      /* ── Equation chain ─────────────────────────────────────────────────────── */
      #eq-chain {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 30;
        pointer-events: none;
        text-align: center;
        width: 720px;
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 22%,
          black 78%,
          transparent 100%
        );
        mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 22%,
          black 78%,
          transparent 100%
        );
      }
      .eq-line {
        font-family: "VT323-Regular", "Courier New", monospace;
        font-size: 24px;
        letter-spacing: 1px;
        white-space: nowrap;
        padding: 3px 0;
        color: rgba(255, 30, 30, 0.5);
        text-shadow: 0 0 8px rgba(255, 30, 30, 0.4);
        transition:
          opacity 0.5s,
          font-size 0.5s,
          color 0.5s;
      }
      .eq-line.eq-active {
        font-size: 38px;
        color: rgba(255, 60, 60, 1);
        text-shadow:
          0 0 6px rgba(255, 80, 80, 1),
          0 0 18px rgba(255, 30, 30, 1),
          0 0 40px rgba(255, 0, 0, 0.85),
          0 0 80px rgba(200, 0, 0, 0.5),
          0 0 140px rgba(160, 0, 0, 0.25);
      }
      .eq-line.eq-near {
        font-size: 30px;
        color: rgba(255, 40, 40, 0.85);
        text-shadow:
          0 0 8px rgba(255, 30, 30, 0.8),
          0 0 24px rgba(255, 0, 0, 0.5),
          0 0 50px rgba(200, 0, 0, 0.25);
      }

      /* ── Crosshair ──────────────────────────────────────────────────────────── */
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 50;
        pointer-events: none;
        opacity: 0.35;
      }

      @media (max-width: 600px) {
        #hud-tl,
        #hud-bl {
          max-width: 300px;
        }
        .hud-panel {
          font-size: 18px;
          padding: 10px 14px;
        }
      }
    </style>

    <!-- ── Three.js ──────────────────────────────────────────────────────────── -->
    <script type="module">
      import * as THREE from "three";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { OBJLoader } from "three/addons/loaders/OBJLoader.js";

      // ── Renderer ────────────────────────────────────────────────────────────
      const canvas = document.getElementById("bg");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.85;

      // ── Scene / Camera ───────────────────────────────────────────────────────
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      scene.fog = new THREE.FogExp2(0x000000, 0.007);

      const camera = new THREE.PerspectiveCamera(
        68,
        window.innerWidth / window.innerHeight,
        0.1,
        600,
      );
      camera.position.set(0, 3, 35);

      // ── Orbit Controls ───────────────────────────────────────────────────────
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.04;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.2;
      controls.maxDistance = 110;
      controls.minDistance = 3;
      controls.target.set(0, 0, 0);

      // ── Post-processing ──────────────────────────────────────────────────────
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      composer.addPass(
        new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          1.1,
          0.55,
          0.04,
        ),
      );

      // ── Material helpers ─────────────────────────────────────────────────────
      const mkWire = (hex, op = 1) =>
        new THREE.MeshBasicMaterial({
          color: hex,
          wireframe: true,
          transparent: op < 1,
          opacity: op,
        });

      function evolveQuery(queryText, resultText) {
        // Blend Wolfram result + APOD context for a richer token pool
        const combined =
          (resultText || queryText) +
          (apodContext ? " " + apodContext.slice(0, 600) : "");
        const tokens = combined
          .split(/[\s,;:()\[\]\/]+/)
          .map((t) => t.replace(/^["']+|["']+$/g, "").trim())
          .filter(Boolean);

        // Score each token — prefer capitalised proper nouns, numbers+units, longer terms
        const scored = tokens
          .map((t) => ({
            t,
            score:
              (/^[A-Z][a-z]/.test(t) ? 4 : 0) + // proper noun
              (/[0-9]/.test(t) ? 3 : 0) + // contains number
              (t.length > 7 ? 2 : 0) + // long
              (t.length > 4 ? 1 : 0) - // medium
              (STOP_WORDS.has(t.toLowerCase()) ? 10 : 0),
          }))
          .filter(
            ({ t, score }) =>
              score > 0 && t.length > 3 && !chainHistory.includes(t),
          )
          .sort((a, b) => b.score - a.score);

        // Build 2-word phrases from top-scoring tokens
        const top = scored.slice(0, 6).map((s) => s.t);
        const phrases = [];
        for (let i = 0; i < tokens.length - 1; i++) {
          if (top.includes(tokens[i]) && tokens[i + 1].length > 3) {
            const p = tokens[i] + " " + tokens[i + 1];
            if (!chainHistory.includes(p)) phrases.push(p);
          }
        }

        const candidates = [...phrases, ...scored.map((s) => s.t)];
        if (!candidates.length) return null;
        return candidates[
          Math.floor(Math.random() * Math.min(candidates.length, 5))
        ];
      }

      async function runChain(queryText, stepIdx) {

        if (dataEl) {
          dataEl.textContent = "QUERYING\u2026";
          dataEl.classList.add("querying");
        }

        let next = queryText;
        try {
          // Wikipedia Summary API — native CORS, no proxy needed
          const wikiSummary = async (title) => {
            const r = await fetch(
              `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`,
              { signal: AbortSignal.timeout(9000) },
            );
            if (!r.ok) throw new Error("wiki " + r.status);
            return r.json();
          };

          let data = null;
          try {
            data = await wikiSummary(queryText);
          } catch (e) {
            if (!e.message.startsWith("wiki 404")) throw e;
            // 404 — search for the best matching article title
            const sr = await fetch(
              `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(queryText)}&limit=1&format=json&origin=*`,
              { signal: AbortSignal.timeout(9000) },
            );
            if (!sr.ok) throw new Error("opensearch failed");
            const sd = await sr.json();
            const hit = sd[1][0];
            if (!hit) throw new Error("no search results");
            data = await wikiSummary(hit);
          }

          const txt = (data.extract || "").trim();
          if (!txt) throw new Error("no extract");

          if (dataEl)
            dataEl.textContent =
              txt.length > 120 ? txt.slice(0, 117) + "\u2026" : txt;
          addLog(`>WIKI [${key.toUpperCase()}]: ${txt.slice(0, 50)}`, "ok");

          const nextKey = CHAIN_ORDER[(stepIdx + 1) % CHAIN_ORDER.length];
          morphShape(nextKey, extractDigit(txt));

          const derived =
            evolveQuery(queryText, txt) ||
            CHAIN_FALLBACKS[fallbackIdx++ % CHAIN_FALLBACKS.length];
          chainHistory.push(derived);
          if (chainHistory.length > 50) chainHistory.shift();
          next = derived;
          addLog(`>\u2192 ${derived}`, "info");
        } catch (err) {
          console.warn("chain step failed:", key, err.message);
          if (dataEl) {

          // Silent retry — pick a new query and try again immediately

          chainHistory.push(derived);
          if (chainHistory.length > 50) chainHistory.shift();
          setTimeout(() => runChain(derived, stepIdx), 600);
          return;
        } finally {
          if (dataEl) dataEl.classList.remove("querying");
        }
        const isNewRound = (stepIdx + 1) % CHAIN_ORDER.length === 0;
        setTimeout(
          () => runChain(next, stepIdx + 1),
          isNewRound ? 12000 : 3500,

          setModelOpacity(f.model, f.progress * 0.45);
          if (f.progress <= 0) {
            scene.remove(f.model);
            fadingOut.splice(i, 1);
          }
        }

        controls.update();

        if (tick % 3 === 0) {
          elTick.textContent = tick;
          ePhase += 0.04;
          elEntropy.textContent =
            (
              (Math.sin(ePhase) * 0.5 + 0.5) * 0.8 +
              Math.random() * 0.04 +
              0.08
            ).toFixed(4) + " J/K";
        }

        labelDefs.forEach(({ mesh, el }) => {
          const sc = projectToScreen(mesh.position);
          if (sc.behind || sc.x < 0 || sc.x > window.innerWidth) {
            el.style.opacity = "0";
          } else {
            el.style.opacity = "1";
            el.style.left = sc.x + "px";
            el.style.top = sc.y + "px";
          }
        });

        composer.render();
      }

      animate();

      // ── Random title glyphs ───────────────────────────────────────────────────
      const GLYPHS =
        "∅╬∇⌘⊗◈░Ξ∆⌁⊕☿▒ΨΩΛΣΦΓθ╫╪╩╦╣╠═▓◉◊▲▼●○±∞≈≠∫∑∏∂√⌂⌖⌗⌬⍟⎔⎕⏣ℵℶℏℓ℃℉℧℩℮ℜℑ℃ΑΒΔΕΖΗΘΙΚΜΝΞΟΠΡΤΥΧαβγδεζηιλμνξπρστυφχψ⟨⟩⟪⟫⟬⟭⊂⊃⊄⊆⊇⊕⊗⊘⊙⊚⊛⊜⊝⊞⊟⊠⊡⊢⊣⊤⊥⊦⊧⊨⊩⊪⊫∀∃∄∇∈∉∋∌∍∎∏∐∑∓∔∕∖∗∘∙√∛∜∝∞∟∠∡∢∣∤∥∦∧∨∩∪∫∬∭∮∯∰∱∲∳∴∵∶∷∸∹∺∻∼∽∾∿≀≁≂≃≄≅≆≇≈≉≊≋≌≍≎≏≐≑≒≓≔≕≖≗≘≙≚≛≜≝≞≟≠≡≢≣≤≥≦≧⌀⌁⌂⌃⌄⌅⌆⌇⌈⌉⌊⌋⌌⌍⌎⌏⌐⌑⌒⌓⌔⌕⌖⌗⍀⍁⍂⍃⍄⍅⍆⍇⍈⍉⍊⍋⍌⍍⍎⍏⍐⍑⍒⍓⍔⍕⍖⍗⍘⍙⍚⍛⍜⍝⍞⍠⍡⍢⍣⍤⍥⍦⍧⍨⍩⍪⍫⍬⍭⍮⍯⍰⍱⍲⍳⍴⍵⍶⍷⍸⍹⍺";
      const titleEl = document.getElementById("hud-title-text");
      if (titleEl) {
        const len = 12 + Math.floor(Math.random() * 5);
        titleEl.textContent = Array.from(
          { length: len },
          () => GLYPHS[Math.floor(Math.random() * GLYPHS.length)],
        ).join("");
      }

      // ── Infinite equation chain ───────────────────────────────────────────────
      const EQ_OPS = [
        "+",
        "-",
        "×",
        "÷",
        "=",
        "≈",
        "≠",
        "≡",
        "∝",
        "→",
        "⊕",
        "∧",
      ];
      const EQ_SYMS = [
        "π",
        "e",
        "φ",
        "γ",
        "ℏ",
        "c",
        "G",
        "k",
        "α",
        "β",
        "λ",
        "μ",
        "σ",
        "ρ",
        "ω",
        "τ",
        "ε",
        "η",
        "ξ",
        "ζ",
        "Ψ",
        "Ω",
        "Λ",
        "Σ",
        "Φ",
        "Γ",
        "θ",
        "Δ",
        "Π",
        "ℓ",
      ];
      const EQ_FUNCS = [
        "sin",
        "cos",
        "tan",
        "ln",
        "log",
        "exp",
        "∫",
        "∑",
        "∇",
        "∂",
        "∆",
        "lim",
        "det",
        "tr",
      ];

      function randNum() {
        const n = (Math.random() * 9999) | 0;
        return Math.random() < 0.35 ? (n / 100).toFixed(2) : String(n);
      }
      function randSym() {
        return EQ_SYMS[Math.floor(Math.random() * EQ_SYMS.length)];
      }
      function randOp() {
        return EQ_OPS[Math.floor(Math.random() * EQ_OPS.length)];
      }
      function randTerm() {
        const r = Math.random();
        if (r < 0.2) return randNum();
        if (r < 0.4) return randSym();
        if (r < 0.55)
          return (
            EQ_FUNCS[Math.floor(Math.random() * EQ_FUNCS.length)] +
            "(" +
            randSym() +
            ")"
          );
        if (r < 0.7)
          return (
            randSym() + ["²", "³", "⁴", "ⁿ"][Math.floor(Math.random() * 4)]
          );
        if (r < 0.82) return randSym() + randOp() + randSym();
        return randNum() + randSym();
      }
      function genEqLine() {
        const terms = 2 + Math.floor(Math.random() * 3);
        const parts = [];
        for (let i = 0; i < terms; i++) {
          parts.push(randTerm());
          if (i < terms - 1) parts.push(randOp());
        }
        parts.push("=", randTerm());
        return parts.join(" ");
      }

      const EQ_VISIBLE = 9;
      const EQ_BUF_SIZE = EQ_VISIBLE * 5;
      const eqBuffer = Array.from({ length: EQ_BUF_SIZE }, genEqLine);
      let eqHead = 0;
      const eqDisplay = document.getElementById("eq-display");

      function renderEqChain() {
        const mid = Math.floor(EQ_VISIBLE / 2);
        const frag = document.createDocumentFragment();
        for (let i = 0; i < EQ_VISIBLE; i++) {
          const idx = (eqHead + i) % eqBuffer.length;
          const div = document.createElement("div");
          const dist = Math.abs(i - mid);
          div.className =
            "eq-line" +
            (dist === 0 ? " eq-active" : dist === 1 ? " eq-near" : "");
          div.textContent = eqBuffer[idx];
          frag.appendChild(div);
        }
        eqDisplay.innerHTML = "";
        eqDisplay.appendChild(frag);
      }

      renderEqChain();
      setInterval(() => {
        eqHead = (eqHead + 1) % eqBuffer.length;
        // Refresh lines a few steps ahead to keep variety
        eqBuffer[(eqHead + EQ_VISIBLE + 1) % eqBuffer.length] = genEqLine();
        renderEqChain();
      }, 180);

      // ── Start chain: seed from NASA APOD, fall back to CHAIN_SEED ────────────
      (async () => {
        await new Promise((r) => setTimeout(r, 1800));
        const apodSeed = await fetchAPOD().catch((e) => {
          console.warn("APOD init failed:", e);
          return null;
        });
        runChain(apodSeed || CHAIN_SEED, 0);
      })().catch((e) => console.warn("startup error:", e));

      // ── Resize ────────────────────────────────────────────────────────────────
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
