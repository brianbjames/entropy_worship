<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYNTH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
      /* ── Synth-specific styles ──────────────────────────────── */
      #synth-scope {
        display: block;
        width: 100%;
        height: 120px;
        background: #0e0400;
      }

      .param-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .param-row .control-label {
        min-width: 80px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      #power-toggle .toggle-track.on .toggle-thumb {
        left: 22px;
      }
      #meta .toggle-wrap {
        align-self: center;
      }
      #meta .toggle-track {
        margin: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
      }
      .param-row .range-val {
        min-width: 72px;
        text-align: right;
      }
      .room-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        margin-bottom: 6px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        transition: border-color 0.14s, background 0.14s;
        cursor: pointer;
      }
      .room-entry:hover {
        border-color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
      }
      .room-entry-name {
        color: var(--accent);
      }
      .room-entry-info {
        font-size: 0.68rem;
        color: var(--dim);
        letter-spacing: 0.08em;
      }

      .section-panel {
        border: 1px solid var(--border);
        padding: 12px 14px;
        margin-bottom: 14px;
        position: relative;
      }
      .section-panel .section-label {
        position: absolute;
        top: -8px;
        left: 12px;
        background: var(--html-bg);
        padding: 0 6px;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        color: var(--accent);
      }

      #note-display {
        text-align: center;
        padding: 10px;
        margin-bottom: 14px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.3);
      }
      #note-display .note-freq {
        font-size: 1.8rem;
        color: var(--accent);
        letter-spacing: 0.08em;
      }
      #note-display .note-name {
        font-size: 1.1rem;
        color: var(--dim);
        letter-spacing: 0.14em;
      }

      #trigger-btn {
        width: 100%;
        padding: 14px;
        font-size: 1.1rem;
        letter-spacing: 0.18em;
        cursor: pointer;
        transition: all 0.1s;
        border: 2px solid var(--accent);
        background: rgba(var(--accent-rgb), 0.08);
        color: var(--accent);
      }
      #trigger-btn:active,
      #trigger-btn.active {
        background: rgba(var(--accent-rgb), 0.3);
        box-shadow: 0 0 18px rgba(var(--accent-rgb), 0.5);
      }
    </style>
  </head>
  <body>
    <!-- ── Grid overlay ── -->
    <div id="grid-bg"></div>
    <!-- ── Scanline overlay ── -->
    <div id="scanlines"></div>

    <!-- ── App ─────────────────────────────────────────────────── -->
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "SYN-1",
        objectType: "synth",
        roomPrefix: "syn",
        inputs: [
          {
            port: "trigger",
            type: "number",
            unit: "bipolar",
            min: -1,
            max: 1,
            default: 0,
          },
          {
            port: "frequency",
            type: "number",
            unit: "hz",
            min: 20,
            max: 20000,
            default: 440,
          },
          {
            port: "cutoff",
            type: "number",
            unit: "bipolar",
            min: -1,
            max: 1,
            default: 0,
          },
          {
            port: "gain",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 0.7,
          },
        ],
        outputs: [
          { port: "signal", type: "number", unit: "bipolar" },
          { port: "frequency", type: "number", unit: "hz" },
          { port: "waveform", type: "string" },
          { port: "cutoff", type: "number", unit: "hz" },
          { port: "gain", type: "number" },
          { port: "playing", type: "boolean" },
          { port: "outputMode", type: "string" },
        ],
      });

      // ── Synth state ────────────────────────────────────────────

      let currentFrequency = 440;
      let octaveShift = 0;
      let detuneAmount = 0;
      let baseCutoff = 2000;
      let masterGain = 0.7;
      let outputMode = "audio"; // "audio" | "control" | "both"
      let noteIsPlaying = false;
      let triggerHeld = false; // tracks trigger state for edge detection
      let audioReady = false;
      let powerOn = false;

      // Tone.js nodes
      let synth = null;
      let masterGainNode = null;
      let analyser = null;

      // ── Note names ─────────────────────────────────────────────

      const NOTE_NAMES = [
        "C", "C#", "D", "D#", "E", "F",
        "F#", "G", "G#", "A", "A#", "B",
      ];

      function freqToNoteName(freq) {
        if (freq <= 0) return "---";
        const midi = 12 * (Math.log2(freq / 440)) + 69;
        const rounded = Math.round(midi);
        const note = NOTE_NAMES[((rounded % 12) + 12) % 12];
        const octave = Math.floor(rounded / 12) - 1;
        return `${note}${octave}`;
      }

      // ── Logarithmic frequency mapping ──────────────────────────

      const FREQ_MIN = 20;
      const FREQ_MAX = 20000;
      const LOG_MIN = Math.log(FREQ_MIN);
      const LOG_MAX = Math.log(FREQ_MAX);

      function sliderToFreq(val) {
        const t = val / 1000;
        return Math.exp(LOG_MIN + t * (LOG_MAX - LOG_MIN));
      }

      function freqToSlider(freq) {
        const t = (Math.log(freq) - LOG_MIN) / (LOG_MAX - LOG_MIN);
        return Math.round(t * 1000);
      }

      function formatFreq(freq) {
        return freq >= 1000
          ? (freq / 1000).toFixed(2) + " kHz"
          : freq.toFixed(1) + " Hz";
      }

      // ── Tone.js audio ──────────────────────────────────────────

      async function ensureAudio() {
        if (audioReady) return;
        await Tone.start();

        synth = new Tone.MonoSynth({
          oscillator: { type: "sawtooth" },
          filter: {
            type: "lowpass",
            frequency: 2000,
            Q: 1,
          },
          filterEnvelope: {
            attack: 0.01,
            decay: 0.3,
            sustain: 0.2,
            release: 0.5,
            baseFrequency: 200,
            octaves: 3,
          },
          envelope: {
            attack: 0.01,
            decay: 0.3,
            sustain: 0.7,
            release: 0.5,
          },
        });

        masterGainNode = new Tone.Gain(masterGain);
        analyser = new Tone.Analyser("waveform", 256);

        synth.connect(masterGainNode);
        masterGainNode.connect(analyser);
        applyOutputRouting();

        audioReady = true;
      }

      function applyOutputRouting() {
        if (!masterGainNode) return;
        masterGainNode.disconnect();
        masterGainNode.connect(analyser);
        if (outputMode === "audio" || outputMode === "both") {
          masterGainNode.toDestination();
        }
      }

      function getEffectiveFrequency() {
        return currentFrequency * Math.pow(2, octaveShift);
      }

      function triggerAttack() {
        if (!synth || !powerOn) return;
        const freq = getEffectiveFrequency();
        try {
          synth.triggerAttack(freq);
          noteIsPlaying = true;
          startSignalOutput();
          ewObj.setOutput("playing", true, { immediate: true });
          updateNoteDisplay();
        } catch (e) {
          console.error("[SYNTH] triggerAttack error:", e);
        }
      }

      function triggerRelease() {
        if (!synth || !noteIsPlaying) return;
        try {
          synth.triggerRelease();
          noteIsPlaying = false;
          // Keep signal output running briefly for release tail
          setTimeout(() => {
            if (!noteIsPlaying) {
              stopSignalOutput();
              ewObj.setOutput("playing", false, { immediate: true });
            }
          }, (synth.envelope.release * 1000) + 100);
        } catch (e) {
          console.error("[SYNTH] triggerRelease error:", e);
        }
      }

      // ── Signal output loop ─────────────────────────────────────

      let signalWorker = null;

      function startSignalOutput() {
        if (signalWorker) return;
        const blob = new Blob([`
          let id = setInterval(() => postMessage("tick"), 10);
          onmessage = () => { clearInterval(id); close(); };
        `], { type: "application/javascript" });
        signalWorker = new Worker(URL.createObjectURL(blob));
        signalWorker.onmessage = () => {
          if (!analyser) return;
          const data = analyser.getValue();
          if (!data || data.length === 0) return;
          // Sample the midpoint of the waveform buffer
          const mid = Math.floor(data.length / 2);
          const value = Math.round(data[mid] * 1000) / 1000;
          ewObj.setOutput("signal", value, { unit: "bipolar" });
        };
      }

      function stopSignalOutput() {
        if (signalWorker) {
          signalWorker.postMessage("stop");
          signalWorker = null;
        }
        ewObj.setOutput("signal", 0, { unit: "bipolar", immediate: true });
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      // Header
      buildHeaderBar(ewObj, "SYNTH", app);

      // Add power, output mode, and theme to header controls row
      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <select id="synth-output-mode" style="width:auto; padding:3px 24px 3px 8px">
          <option value="audio">AUDIO</option>
          <option value="control">CONTROL</option>
          <option value="both">BOTH</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // ── Oscillator section ─────────────────────────────────────

      const oscSection = document.createElement("div");
      oscSection.className = "hud-panel clip-tr";
      oscSection.innerHTML = `
        <div class="section-panel">
          <div class="section-label">OSCILLATOR</div>

          <div class="control-group" style="margin-top:6px">
            <div class="control-label">WAVEFORM</div>
            <select id="synth-waveform">
              <option value="sine">SINE</option>
              <option value="triangle">TRIANGLE</option>
              <option value="sawtooth" selected>SAWTOOTH</option>
              <option value="square">SQUARE</option>
              <option value="fatsawtooth">FAT SAW</option>
              <option value="fatsquare">FAT SQUARE</option>
              <option value="fattriangle">FAT TRI</option>
              <option value="pwm">PWM</option>
              <option value="pulse">PULSE</option>
            </select>
          </div>

          <div class="param-row">
            <div class="control-label">OCTAVE</div>
            <input type="range" id="synth-octave" min="-2" max="2" value="0" step="1" />
            <span class="range-val" id="synth-octave-val">0</span>
          </div>

          <div class="param-row">
            <div class="control-label">DETUNE</div>
            <input type="range" id="synth-detune" min="-100" max="100" value="0" />
            <span class="range-val" id="synth-detune-val">0 ct</span>
          </div>
        </div>
      `;
      app.appendChild(oscSection);

      // ── Filter section ─────────────────────────────────────────

      const filterSection = document.createElement("div");
      filterSection.className = "hud-panel";
      filterSection.innerHTML = `
        <div class="section-panel">
          <div class="section-label">FILTER</div>

          <div class="control-group" style="margin-top:6px">
            <div class="control-label">TYPE</div>
            <select id="synth-filter-type">
              <option value="lowpass" selected>LOWPASS</option>
              <option value="highpass">HIGHPASS</option>
              <option value="bandpass">BANDPASS</option>
            </select>
          </div>

          <div class="param-row">
            <div class="control-label">CUTOFF</div>
            <input type="range" id="synth-cutoff" min="0" max="1000" value="${freqToSlider(2000)}" />
            <span class="range-val" id="synth-cutoff-val">${formatFreq(2000)}</span>
          </div>

          <div class="param-row">
            <div class="control-label">Q</div>
            <input type="range" id="synth-q" min="1" max="200" value="10" />
            <span class="range-val" id="synth-q-val">1.0</span>
          </div>

          <div style="border-top:1px solid var(--border); margin-top:6px; padding-top:10px">
            <div class="control-label" style="margin-bottom:8px; color:var(--dim); font-size:0.72rem; letter-spacing:0.18em">FILTER ENVELOPE</div>

            <div class="param-row">
              <div class="control-label">OCTAVES</div>
              <input type="range" id="synth-fenv-octaves" min="0" max="80" value="30" />
              <span class="range-val" id="synth-fenv-octaves-val">3.0</span>
            </div>

            <div class="param-row">
              <div class="control-label">ATTACK</div>
              <input type="range" id="synth-fenv-a" min="1" max="2000" value="10" />
              <span class="range-val" id="synth-fenv-a-val">0.010 s</span>
            </div>

            <div class="param-row">
              <div class="control-label">DECAY</div>
              <input type="range" id="synth-fenv-d" min="10" max="4000" value="300" />
              <span class="range-val" id="synth-fenv-d-val">0.300 s</span>
            </div>

            <div class="param-row">
              <div class="control-label">SUSTAIN</div>
              <input type="range" id="synth-fenv-s" min="0" max="100" value="20" />
              <span class="range-val" id="synth-fenv-s-val">0.20</span>
            </div>

            <div class="param-row">
              <div class="control-label">RELEASE</div>
              <input type="range" id="synth-fenv-r" min="10" max="8000" value="500" />
              <span class="range-val" id="synth-fenv-r-val">0.500 s</span>
            </div>
          </div>
        </div>
      `;
      app.appendChild(filterSection);

      // ── Amplitude envelope section ─────────────────────────────

      const ampSection = document.createElement("div");
      ampSection.className = "hud-panel";
      ampSection.innerHTML = `
        <div class="section-panel">
          <div class="section-label">AMP ENVELOPE</div>

          <div class="param-row" style="margin-top:6px">
            <div class="control-label">ATTACK</div>
            <input type="range" id="synth-env-a" min="1" max="2000" value="10" />
            <span class="range-val" id="synth-env-a-val">0.010 s</span>
          </div>

          <div class="param-row">
            <div class="control-label">DECAY</div>
            <input type="range" id="synth-env-d" min="10" max="4000" value="300" />
            <span class="range-val" id="synth-env-d-val">0.300 s</span>
          </div>

          <div class="param-row">
            <div class="control-label">SUSTAIN</div>
            <input type="range" id="synth-env-s" min="0" max="100" value="70" />
            <span class="range-val" id="synth-env-s-val">0.70</span>
          </div>

          <div class="param-row">
            <div class="control-label">RELEASE</div>
            <input type="range" id="synth-env-r" min="10" max="8000" value="500" />
            <span class="range-val" id="synth-env-r-val">0.500 s</span>
          </div>
        </div>
      `;
      app.appendChild(ampSection);

      // ── Note display + trigger ─────────────────────────────────

      const notePanel = document.createElement("div");
      notePanel.className = "hud-panel";
      notePanel.innerHTML = `
        <div id="note-display">
          <div class="note-freq" id="note-freq-display">${formatFreq(440)}</div>
          <div class="note-name" id="note-name-display">${freqToNoteName(440)}</div>
        </div>

        <div class="param-row">
          <div class="control-label">FREQ</div>
          <input type="range" id="synth-freq" min="0" max="1000" value="${freqToSlider(440)}" />
          <span class="range-val" id="synth-freq-val">${formatFreq(440)}</span>
        </div>

        <button id="trigger-btn">TRIGGER</button>

        <div class="param-row" style="margin-top:14px">
          <div class="control-label">GAIN</div>
          <input type="range" id="synth-gain" min="0" max="100" value="70" />
          <span class="range-val" id="synth-gain-val">0.70</span>
        </div>
      `;
      app.appendChild(notePanel);

      // ── Scope ──────────────────────────────────────────────────

      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="synth-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms panel
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE SYNTHS //</div>
        <div id="rooms-list">
          <span class="type-dim">NO OTHER SYNTHS AVAILABLE</span>
        </div>
      `;
      app.appendChild(roomsPanel);

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value
          .trim()
          .replace(/[^a-zA-Z0-9_-]/g, "")
          .slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      // Privacy toggle
      let roomPrivate = false;

      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }

      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        ewObj.setPrivate(roomPrivate);
        updatePrivacyBtn();
      });

      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false;
        updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });

      ewObj.on("roomPrivate", (msg) => {
        roomPrivate = msg.private;
        updatePrivacyBtn();
      });

      // Render available rooms
      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) {
          el.innerHTML = '<span class="type-dim">NO OTHER SYNTHS AVAILABLE</span>';
          return;
        }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length
            ? r.objects.join(", ").toUpperCase()
            : "";
          a.innerHTML =
            `<span class="room-entry-name">${r.name}</span>` +
            `<span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText =
        "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML =
        '<a href="../../index.html" style="color:var(--dim); text-decoration:none">ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Theme selector ─────────────────────────────────────────

      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // ── Wire controls ──────────────────────────────────────────

      // Power toggle
      function updatePowerUI() {
        const track = document.getElementById("power-track");
        if (powerOn) {
          track.classList.add("on");
        } else {
          track.classList.remove("on");
        }
      }

      document.getElementById("power-toggle").addEventListener("click", async () => {
        powerOn = !powerOn;
        if (powerOn) {
          await ensureAudio();
        } else {
          // Power off: release any playing note
          if (noteIsPlaying) triggerRelease();
        }
        updatePowerUI();
      });

      // Output mode select
      document
        .getElementById("synth-output-mode")
        .addEventListener("change", (e) => {
          outputMode = e.target.value;
          applyOutputRouting();
          ewObj.setOutput("outputMode", outputMode, { immediate: true });
        });

      // ── Oscillator controls ────────────────────────────────────

      // Waveform select
      document.getElementById("synth-waveform").addEventListener("change", (e) => {
        const type = e.target.value;
        if (synth) {
          try { synth.oscillator.type = type; } catch (_) {}
        }
        ewObj.setOutput("waveform", type, { immediate: true });
        refreshStats();
      });

      // Octave
      wireRange("synth-octave", "synth-octave-val", (v) => (v > 0 ? "+" + v : "" + v));
      document.getElementById("synth-octave").addEventListener("input", (e) => {
        octaveShift = +e.target.value;
        updateNoteDisplay();
      });

      // Detune
      wireRange("synth-detune", "synth-detune-val", (v) => v + " ct");
      document.getElementById("synth-detune").addEventListener("input", (e) => {
        detuneAmount = +e.target.value;
        if (synth) synth.detune.rampTo(detuneAmount, 0.01);
      });

      // ── Filter controls ────────────────────────────────────────

      // Filter type
      document.getElementById("synth-filter-type").addEventListener("change", (e) => {
        if (synth) {
          try { synth.filter.type = e.target.value; } catch (_) {}
        }
      });

      // Cutoff (logarithmic)
      const cutoffSlider = document.getElementById("synth-cutoff");
      const cutoffVal = document.getElementById("synth-cutoff-val");

      cutoffSlider.addEventListener("input", () => {
        const freq = sliderToFreq(+cutoffSlider.value);
        baseCutoff = freq;
        cutoffVal.textContent = formatFreq(freq);
        const pct = (+cutoffSlider.value / 1000) * 100;
        cutoffSlider.style.setProperty("--val", pct + "%");
        if (synth) synth.filter.frequency.rampTo(freq, 0.01);
        ewObj.setOutput("cutoff", Math.round(freq * 10) / 10, { unit: "hz" });
        refreshStats();
      });
      // Initialize cutoff slider fill
      (() => {
        const pct = (+cutoffSlider.value / 1000) * 100;
        cutoffSlider.style.setProperty("--val", pct + "%");
      })();

      // Q (resonance) — slider 1..200 maps to 0.1..20
      wireRange("synth-q", "synth-q-val", (v) => (v / 10).toFixed(1));
      document.getElementById("synth-q").addEventListener("input", (e) => {
        const q = +e.target.value / 10;
        if (synth) synth.filter.Q.rampTo(q, 0.01);
      });

      // Filter envelope octaves — slider 0..80 maps to 0..8
      wireRange("synth-fenv-octaves", "synth-fenv-octaves-val", (v) => (v / 10).toFixed(1));
      document.getElementById("synth-fenv-octaves").addEventListener("input", (e) => {
        const oct = +e.target.value / 10;
        if (synth) synth.filterEnvelope.octaves = oct;
      });

      // Filter envelope attack — slider 1..2000 maps to 0.001..2s
      wireRange("synth-fenv-a", "synth-fenv-a-val", (v) => (v / 1000).toFixed(3) + " s");
      document.getElementById("synth-fenv-a").addEventListener("input", (e) => {
        if (synth) synth.filterEnvelope.attack = +e.target.value / 1000;
      });

      // Filter envelope decay — slider 10..4000 maps to 0.01..4s
      wireRange("synth-fenv-d", "synth-fenv-d-val", (v) => (v / 1000).toFixed(3) + " s");
      document.getElementById("synth-fenv-d").addEventListener("input", (e) => {
        if (synth) synth.filterEnvelope.decay = +e.target.value / 1000;
      });

      // Filter envelope sustain — slider 0..100 maps to 0..1
      wireRange("synth-fenv-s", "synth-fenv-s-val", (v) => (v / 100).toFixed(2));
      document.getElementById("synth-fenv-s").addEventListener("input", (e) => {
        if (synth) synth.filterEnvelope.sustain = +e.target.value / 100;
      });

      // Filter envelope release — slider 10..8000 maps to 0.01..8s
      wireRange("synth-fenv-r", "synth-fenv-r-val", (v) => (v / 1000).toFixed(3) + " s");
      document.getElementById("synth-fenv-r").addEventListener("input", (e) => {
        if (synth) synth.filterEnvelope.release = +e.target.value / 1000;
      });

      // ── Amplitude envelope controls ────────────────────────────

      // Attack — slider 1..2000 maps to 0.001..2s
      wireRange("synth-env-a", "synth-env-a-val", (v) => (v / 1000).toFixed(3) + " s");
      document.getElementById("synth-env-a").addEventListener("input", (e) => {
        if (synth) synth.envelope.attack = +e.target.value / 1000;
      });

      // Decay — slider 10..4000 maps to 0.01..4s
      wireRange("synth-env-d", "synth-env-d-val", (v) => (v / 1000).toFixed(3) + " s");
      document.getElementById("synth-env-d").addEventListener("input", (e) => {
        if (synth) synth.envelope.decay = +e.target.value / 1000;
      });

      // Sustain — slider 0..100 maps to 0..1
      wireRange("synth-env-s", "synth-env-s-val", (v) => (v / 100).toFixed(2));
      document.getElementById("synth-env-s").addEventListener("input", (e) => {
        if (synth) synth.envelope.sustain = +e.target.value / 100;
      });

      // Release — slider 10..8000 maps to 0.01..8s
      wireRange("synth-env-r", "synth-env-r-val", (v) => (v / 1000).toFixed(3) + " s");
      document.getElementById("synth-env-r").addEventListener("input", (e) => {
        if (synth) synth.envelope.release = +e.target.value / 1000;
      });

      // ── Frequency slider ───────────────────────────────────────

      const freqSlider = document.getElementById("synth-freq");
      const freqVal = document.getElementById("synth-freq-val");

      freqSlider.addEventListener("input", () => {
        const freq = sliderToFreq(+freqSlider.value);
        currentFrequency = freq;
        freqVal.textContent = formatFreq(freq);
        const pct = (+freqSlider.value / 1000) * 100;
        freqSlider.style.setProperty("--val", pct + "%");
        ewObj.setOutput("frequency", Math.round(freq * 10) / 10, { unit: "hz" });
        updateNoteDisplay();
        // If currently playing, update the pitch live
        if (noteIsPlaying && synth) {
          synth.frequency.rampTo(getEffectiveFrequency(), 0.01);
        }
        refreshStats();
      });
      // Initialize slider fill
      (() => {
        const pct = (+freqSlider.value / 1000) * 100;
        freqSlider.style.setProperty("--val", pct + "%");
      })();

      // ── Manual trigger button ──────────────────────────────────

      const triggerBtn = document.getElementById("trigger-btn");

      triggerBtn.addEventListener("mousedown", async (e) => {
        e.preventDefault();
        if (!powerOn) {
          powerOn = true;
          updatePowerUI();
        }
        await ensureAudio();
        triggerAttack();
        triggerBtn.classList.add("active");
      });

      triggerBtn.addEventListener("mouseup", () => {
        triggerRelease();
        triggerBtn.classList.remove("active");
      });

      triggerBtn.addEventListener("mouseleave", () => {
        if (noteIsPlaying && triggerBtn.classList.contains("active")) {
          triggerRelease();
          triggerBtn.classList.remove("active");
        }
      });

      // Touch support for trigger
      triggerBtn.addEventListener("touchstart", async (e) => {
        e.preventDefault();
        if (!powerOn) {
          powerOn = true;
          updatePowerUI();
        }
        await ensureAudio();
        triggerAttack();
        triggerBtn.classList.add("active");
      }, { passive: false });

      triggerBtn.addEventListener("touchend", (e) => {
        e.preventDefault();
        triggerRelease();
        triggerBtn.classList.remove("active");
      }, { passive: false });

      // ── Gain slider ────────────────────────────────────────────

      wireRange("synth-gain", "synth-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("synth-gain").addEventListener("input", (e) => {
        masterGain = +e.target.value / 100;
        if (masterGainNode) masterGainNode.gain.rampTo(masterGain, 0.01);
        ewObj.setOutput("gain", Math.round(masterGain * 100) / 100);
        refreshStats();
      });

      // ── Note display ───────────────────────────────────────────

      function updateNoteDisplay() {
        const effFreq = getEffectiveFrequency();
        document.getElementById("note-freq-display").textContent = formatFreq(effFreq);
        document.getElementById("note-name-display").textContent = freqToNoteName(effFreq);
      }

      // ── Input signal handling ──────────────────────────────────

      ewObj.onInput("trigger", async (value, meta) => {
        if (typeof value !== "number") return;

        // Edge detection: positive edge = note on, negative edge = note off
        if (value > 0 && !triggerHeld) {
          // Positive edge — trigger attack
          triggerHeld = true;
          if (!powerOn) {
            powerOn = true;
            updatePowerUI();
          }
          await ensureAudio();
          triggerAttack();
          triggerBtn.classList.add("active");
        } else if (value <= 0 && triggerHeld) {
          // Negative edge — trigger release
          triggerHeld = false;
          triggerRelease();
          triggerBtn.classList.remove("active");
        }
      });

      ewObj.onInput("frequency", async (value, meta) => {
        if (typeof value !== "number") return;

        // Bipolar signal — modulate around current frequency
        if (meta && meta.unit === "bipolar" && value >= -1 && value <= 1) {
          // LFO/control-rate modulation of frequency (vibrato)
          const modulated = currentFrequency + value * 200; // 200Hz modulation depth
          const clamped = Math.max(20, Math.min(20000, modulated));
          if (synth && noteIsPlaying) synth.frequency.rampTo(clamped * Math.pow(2, octaveShift), 0.012);
          return;
        }

        // Raw Hz value (from arpeggiator, sequencer, quantizer)
        // Values > 1 are likely Hz, not bipolar
        if (value > 1 && value >= 20 && value <= 20000) {
          currentFrequency = value;
          // Update slider and display
          freqSlider.value = freqToSlider(value);
          freqVal.textContent = formatFreq(value);
          const pct = (freqSlider.value / 1000) * 100;
          freqSlider.style.setProperty("--val", pct + "%");
          updateNoteDisplay();
          ewObj.setOutput("frequency", Math.round(value * 10) / 10, { unit: "hz" });

          // If currently playing, update the pitch
          if (synth && noteIsPlaying) {
            synth.frequency.rampTo(getEffectiveFrequency(), 0.01);
          }
          refreshStats();
        }
      });

      ewObj.onInput("cutoff", (value, meta) => {
        if (typeof value !== "number") return;

        // Bipolar signal — modulate around base cutoff (logarithmic scale)
        if (meta && meta.unit === "bipolar") {
          // Modulate cutoff in octaves: value * 4 octaves range
          const modOctaves = value * 4;
          const modulated = baseCutoff * Math.pow(2, modOctaves);
          const clamped = Math.max(20, Math.min(20000, modulated));
          if (synth) synth.filter.frequency.rampTo(clamped, 0.012);
          return;
        }

        // Direct Hz value
        if (value >= 20 && value <= 20000) {
          baseCutoff = value;
          if (synth) synth.filter.frequency.rampTo(value, 0.01);
          cutoffSlider.value = freqToSlider(value);
          cutoffVal.textContent = formatFreq(value);
          const pct = (cutoffSlider.value / 1000) * 100;
          cutoffSlider.style.setProperty("--val", pct + "%");
          ewObj.setOutput("cutoff", Math.round(value * 10) / 10, { unit: "hz" });
          refreshStats();
        }
      });

      ewObj.onInput("gain", (value, meta) => {
        if (typeof value !== "number") return;

        if (meta && meta.unit === "bipolar") {
          const modulated = masterGain + value * 0.5;
          const clamped = Math.max(0, Math.min(1, modulated));
          if (masterGainNode) masterGainNode.gain.rampTo(clamped, 0.012);
          return;
        }

        if (value >= 0 && value <= 1) {
          masterGain = value;
          if (masterGainNode) masterGainNode.gain.rampTo(value, 0.01);
          document.getElementById("synth-gain").value = Math.round(value * 100);
          document.getElementById("synth-gain-val").textContent = value.toFixed(2);
          ewObj.setOutput("gain", Math.round(value * 100) / 100);
          refreshStats();
        }
      });

      // ── Room state sync ────────────────────────────────────────

      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !noteIsPlaying) {
          await ensureAudio();
          triggerAttack();
        } else if (!value && noteIsPlaying) {
          triggerRelease();
        }
      });

      ewObj.onInput("outputMode", (value) => {
        if (typeof value !== "string") return;
        if (["audio", "control", "both"].includes(value)) {
          outputMode = value;
          document.getElementById("synth-output-mode").value = value;
          applyOutputRouting();
        }
      });

      // ── Output stats ───────────────────────────────────────────

      function refreshStats() {
        updateOutputStats(ewObj, [
          {
            port: "signal",
            label: "SIGNAL",
            formatter: (v) => (v !== undefined ? v.toFixed(3) : "0.000"),
          },
          {
            port: "frequency",
            label: "FREQ",
            unit: " Hz",
            formatter: (v) => (v ? v.toFixed(1) : "---"),
          },
          { port: "waveform", label: "WAVE", formatter: (v) => v || "---" },
          {
            port: "cutoff",
            label: "CUTOFF",
            unit: " Hz",
            formatter: (v) => (v ? v.toFixed(0) : "---"),
          },
          {
            port: "gain",
            label: "GAIN",
            formatter: (v) => (v !== undefined ? v.toFixed(2) : "---"),
          },
        ]);
      }

      // ── Waveform scope ─────────────────────────────────────────

      const scopeCanvas = document.getElementById("synth-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);

        const w = scopeCanvas.width;
        const h = scopeCanvas.height;
        scopeCtx.fillStyle = "#0e0400";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid lines
        scopeCtx.strokeStyle = "rgba(160, 72, 0, 0.12)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) {
          scopeCtx.beginPath();
          scopeCtx.moveTo(0, y);
          scopeCtx.lineTo(w, y);
          scopeCtx.stroke();
        }
        for (let x = 0; x < w; x += 20) {
          scopeCtx.beginPath();
          scopeCtx.moveTo(x, 0);
          scopeCtx.lineTo(x, h);
          scopeCtx.stroke();
        }

        // Center line
        scopeCtx.strokeStyle = "rgba(160, 72, 0, 0.3)";
        scopeCtx.beginPath();
        scopeCtx.moveTo(0, h / 2);
        scopeCtx.lineTo(w, h / 2);
        scopeCtx.stroke();

        if (!analyser) return;

        const data = analyser.getValue();
        // Check if there's any actual signal
        let hasSignal = false;
        for (let i = 0; i < data.length; i++) {
          if (Math.abs(data[i]) > 0.001) { hasSignal = true; break; }
        }
        if (!hasSignal) return;

        scopeCtx.strokeStyle = getComputedStyle(
          document.documentElement
        ).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(255, 170, 0, 0.6)";
        scopeCtx.shadowBlur = 8;
        scopeCtx.beginPath();

        for (let i = 0; i < data.length; i++) {
          const x = (i / data.length) * w;
          const y = ((1 - data[i]) / 2) * h;
          if (i === 0) {
            scopeCtx.moveTo(x, y);
          } else {
            scopeCtx.lineTo(x, y);
          }
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      // ── Initialize ──────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);

        // Set local defaults
        ewObj._outputValues["frequency"] = 440;
        ewObj._outputValues["waveform"] = "sawtooth";
        ewObj._outputValues["cutoff"] = 2000;
        ewObj._outputValues["gain"] = 0.7;
        ewObj._outputValues["playing"] = false;
        ewObj._outputValues["outputMode"] = "audio";

        refreshStats();
        resizeScope();
        drawScope();
      })();

      window.addEventListener("resize", resizeScope);
    </script>
  </body>
</html>
