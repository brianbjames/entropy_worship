<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RNG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css" />
    <link rel="stylesheet" href="../lib/ewuilib.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
      #rng-scope {
        display: block; width: 100%; height: 120px; background: #080808;
      }
      #rng-histogram {
        display: block; width: 100%; height: 80px; background: #080808;
      }
      .param-row {
        display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
      }
      .param-row .control-label { min-width: 80px; margin-bottom: 0; flex-shrink: 0; }
      .param-row input[type="range"] { flex: 1; }
      .param-row .range-val { min-width: 72px; text-align: right; }
      .room-entry {
        display: flex; justify-content: space-between; align-items: center;
        padding: 6px 10px; border: 1px solid var(--border); margin-bottom: 6px;
        text-decoration: none; color: var(--text); font-size: 0.82rem;
        letter-spacing: 0.1em; transition: border-color 0.14s, background 0.14s; cursor: pointer;
      }
      .room-entry:hover { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.06); }
      .room-entry-name { color: var(--accent); }
      .room-entry-info { font-size: 0.68rem; color: var(--dim); letter-spacing: 0.08em; }
      .value-display {
        font-size: 3rem; text-align: center; padding: 12px 0 4px;
        color: var(--accent); letter-spacing: 0.15em; font-family: 'VT323', monospace;
      }
      .dist-label {
        font-size: 0.72rem; text-align: center; color: var(--dim);
        letter-spacing: 0.18em; margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "RNG-1",
        objectType: "rng",
        roomPrefix: "rnd",
        inputs: [
          { port: "trigger", type: "number", unit: "bipolar", min: -1, max: 1, default: 0 },
          { port: "rate", type: "number", unit: "hz", min: 0.1, max: 100, default: 10 },
          { port: "min", type: "number", unit: "bipolar", min: -1, max: 1, default: -1 },
          { port: "max", type: "number", unit: "bipolar", min: -1, max: 1, default: 1 },
        ],
        outputs: [
          { port: "signal", type: "number", unit: "bipolar" },
          { port: "rate", type: "number", unit: "hz" },
          { port: "distribution", type: "string" },
        ],
      });

      // ── RNG state ──────────────────────────────────────────────

      let mode = "FREE";           // TRIGGER or FREE
      let distribution = "UNIFORM";
      let rate = 10;               // Hz (FREE mode)
      let rangeMin = -1;
      let rangeMax = 1;
      let stepSize = 0.05;         // WALK mode
      let spread = 0.3;            // GAUSSIAN mode
      let currentValue = 0;
      let walkValue = 0;           // persistent walk state

      // Trigger edge detection
      let prevTriggerValue = 0;

      // Histogram
      const HIST_SIZE = 100;
      let histBuffer = [];

      // ── Random generators ──────────────────────────────────────

      function gaussianRandom() {
        // Box-Muller transform
        let u1 = Math.random();
        let u2 = Math.random();
        while (u1 === 0) u1 = Math.random();
        return Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
      }

      function generateValue() {
        let val;
        switch (distribution) {
          case "UNIFORM":
            val = rangeMin + Math.random() * (rangeMax - rangeMin);
            break;
          case "GAUSSIAN":
            val = gaussianRandom() * spread;
            val = Math.max(-1, Math.min(1, val));
            break;
          case "BIPOLAR":
            val = Math.random() * 2 - 1;
            break;
          case "BINARY":
            val = Math.random() < 0.5 ? -1 : 1;
            break;
          case "WALK":
            walkValue += (Math.random() * 2 - 1) * stepSize;
            walkValue = Math.max(rangeMin, Math.min(rangeMax, walkValue));
            val = walkValue;
            break;
          default:
            val = Math.random() * 2 - 1;
        }
        return Math.round(val * 1000) / 1000;
      }

      function fireNewValue() {
        currentValue = generateValue();
        ewObj.setOutput("signal", currentValue, { unit: "bipolar" });
        pushScopeValue(currentValue);
        pushHistValue(currentValue);
        updateValueDisplay();
      }

      function updateValueDisplay() {
        const el = document.getElementById("value-display");
        if (el) el.textContent = currentValue >= 0 ? "+" + currentValue.toFixed(3) : currentValue.toFixed(3);
      }

      // ── Web Worker (FREE mode) ────────────────────────────────

      let signalWorker = null;
      let workerInterval = 1000 / rate; // ms

      function startWorker() {
        if (signalWorker) return;
        workerInterval = 1000 / rate;
        const blob = new Blob([`
          let ms = ${workerInterval};
          let id = setInterval(() => postMessage("tick"), ms);
          onmessage = (e) => {
            if (e.data === "stop") { clearInterval(id); close(); return; }
            if (typeof e.data === "number") {
              clearInterval(id);
              ms = e.data;
              id = setInterval(() => postMessage("tick"), ms);
            }
          };
        `], { type: "application/javascript" });
        signalWorker = new Worker(URL.createObjectURL(blob));
        signalWorker.onmessage = () => {
          if (mode !== "FREE") return;
          fireNewValue();
        };
      }

      function stopWorker() {
        if (signalWorker) {
          signalWorker.postMessage("stop");
          signalWorker = null;
        }
      }

      function updateWorkerRate() {
        if (signalWorker) {
          signalWorker.postMessage(1000 / rate);
        }
      }

      // ── Scope ──────────────────────────────────────────────────

      const SCOPE_SAMPLES = 200;
      let scopeHistory = new Float32Array(SCOPE_SAMPLES);
      let scopeWriteIdx = 0;

      function pushScopeValue(val) {
        scopeHistory[scopeWriteIdx] = val;
        scopeWriteIdx = (scopeWriteIdx + 1) % SCOPE_SAMPLES;
      }

      // ── Histogram ──────────────────────────────────────────────

      function pushHistValue(val) {
        histBuffer.push(val);
        if (histBuffer.length > HIST_SIZE) histBuffer.shift();
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "RNG", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
      `;

      // Value display
      const displayPanel = document.createElement("div");
      displayPanel.className = "hud-panel clip-tr";
      displayPanel.innerHTML = `
        <div class="value-display" id="value-display">+0.000</div>
        <div class="dist-label" id="dist-label">UNIFORM // FREE @ 10.0 Hz</div>
      `;
      app.appendChild(displayPanel);

      // Histogram
      const histPanel = document.createElement("div");
      histPanel.className = "hud-panel";
      histPanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="rng-histogram"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(histPanel);

      // Controls
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel";
      controlsPanel.innerHTML = `
        <div class="control-group" style="margin-bottom:14px">
          <div class="control-label">MODE</div>
          <select id="rng-mode">
            <option value="FREE">FREE</option>
            <option value="TRIGGER">TRIGGER</option>
          </select>
        </div>

        <div class="control-group" style="margin-bottom:14px">
          <div class="control-label">DISTRIBUTION</div>
          <select id="rng-dist">
            <option value="UNIFORM">UNIFORM</option>
            <option value="GAUSSIAN">GAUSSIAN</option>
            <option value="BIPOLAR">BIPOLAR</option>
            <option value="BINARY">BINARY</option>
            <option value="WALK">WALK</option>
          </select>
        </div>

        <div class="param-row" id="rate-row">
          <div class="control-label">RATE</div>
          <input type="range" id="rng-rate" min="1" max="1000" value="500" />
          <span class="range-val" id="rng-rate-val">10.0 Hz</span>
        </div>

        <div class="param-row" id="min-row">
          <div class="control-label">MIN</div>
          <input type="range" id="rng-min" min="-100" max="100" value="-100" />
          <span class="range-val" id="rng-min-val">-1.00</span>
        </div>

        <div class="param-row" id="max-row">
          <div class="control-label">MAX</div>
          <input type="range" id="rng-max" min="-100" max="100" value="100" />
          <span class="range-val" id="rng-max-val">+1.00</span>
        </div>

        <div class="param-row" id="step-row" style="display:none">
          <div class="control-label">STEP</div>
          <input type="range" id="rng-step" min="1" max="500" value="50" />
          <span class="range-val" id="rng-step-val">0.050</span>
        </div>

        <div class="param-row" id="spread-row" style="display:none">
          <div class="control-label">SPREAD</div>
          <input type="range" id="rng-spread" min="1" max="100" value="30" />
          <span class="range-val" id="rng-spread-val">0.30</span>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="rng-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE OBJECTS //</div>
        <div id="rooms-list"><span class="type-dim">NO OTHER OBJECTS AVAILABLE</span></div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">&copy; 2026 ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Wire controls ──────────────────────────────────────────

      function updateDistLabel() {
        const el = document.getElementById("dist-label");
        if (!el) return;
        if (mode === "FREE") {
          el.textContent = `${distribution} // FREE @ ${rate >= 10 ? rate.toFixed(1) : rate.toFixed(2)} Hz`;
        } else {
          el.textContent = `${distribution} // TRIGGER`;
        }
      }

      function updateVisibleControls() {
        document.getElementById("rate-row").style.display = mode === "FREE" ? "flex" : "none";
        document.getElementById("min-row").style.display = (distribution === "UNIFORM" || distribution === "WALK") ? "flex" : "none";
        document.getElementById("max-row").style.display = (distribution === "UNIFORM" || distribution === "WALK") ? "flex" : "none";
        document.getElementById("step-row").style.display = distribution === "WALK" ? "flex" : "none";
        document.getElementById("spread-row").style.display = distribution === "GAUSSIAN" ? "flex" : "none";
      }

      // Mode
      document.getElementById("rng-mode").addEventListener("change", (e) => {
        mode = e.target.value;
        if (mode === "FREE") {
          startWorker();
        } else {
          stopWorker();
        }
        updateVisibleControls();
        updateDistLabel();
      });

      // Distribution
      document.getElementById("rng-dist").addEventListener("change", (e) => {
        distribution = e.target.value;
        walkValue = 0; // reset walk
        histBuffer = []; // clear histogram
        updateVisibleControls();
        updateDistLabel();
        ewObj.setOutput("distribution", distribution, { immediate: true });
      });

      // Rate — logarithmic 0.1 to 100 Hz mapped from slider 1-1000
      const RATE_MIN = Math.log(0.1);
      const RATE_MAX = Math.log(100);

      function sliderToRate(val) {
        return Math.exp(RATE_MIN + (val / 1000) * (RATE_MAX - RATE_MIN));
      }
      function rateToSlider(r) {
        return Math.round(((Math.log(r) - RATE_MIN) / (RATE_MAX - RATE_MIN)) * 1000);
      }

      const rateSlider = document.getElementById("rng-rate");
      const rateValEl = document.getElementById("rng-rate-val");

      rateSlider.addEventListener("input", () => {
        rate = sliderToRate(+rateSlider.value);
        rateValEl.textContent = rate >= 10 ? rate.toFixed(1) + " Hz" : rate.toFixed(2) + " Hz";
        const pct = (+rateSlider.value / 1000) * 100;
        rateSlider.style.setProperty("--val", pct + "%");
        updateWorkerRate();
        updateDistLabel();
        ewObj.setOutput("rate", Math.round(rate * 100) / 100, { unit: "hz" });
      });
      // Init slider fill
      (() => {
        const pct = (+rateSlider.value / 1000) * 100;
        rateSlider.style.setProperty("--val", pct + "%");
      })();

      // Min
      wireRange("rng-min", "rng-min-val", (v) => {
        const val = v / 100;
        return (val >= 0 ? "+" : "") + val.toFixed(2);
      });
      document.getElementById("rng-min").addEventListener("input", (e) => {
        rangeMin = +e.target.value / 100;
      });

      // Max
      wireRange("rng-max", "rng-max-val", (v) => {
        const val = v / 100;
        return (val >= 0 ? "+" : "") + val.toFixed(2);
      });
      document.getElementById("rng-max").addEventListener("input", (e) => {
        rangeMax = +e.target.value / 100;
      });

      // Step size — 0.001 to 0.5 mapped from 1-500
      wireRange("rng-step", "rng-step-val", (v) => (v / 1000).toFixed(3));
      document.getElementById("rng-step").addEventListener("input", (e) => {
        stepSize = +e.target.value / 1000;
      });

      // Spread — 0.01 to 1 mapped from 1-100
      wireRange("rng-spread", "rng-spread-val", (v) => (v / 100).toFixed(2));
      document.getElementById("rng-spread").addEventListener("input", (e) => {
        spread = +e.target.value / 100;
      });

      // ── Input handlers ─────────────────────────────────────────

      ewObj.onInput("trigger", (value, meta) => {
        if (typeof value !== "number") return;
        // Positive edge detection
        if (prevTriggerValue <= 0 && value > 0) {
          fireNewValue();
        }
        prevTriggerValue = value;
      });

      ewObj.onInput("rate", (value, meta) => {
        if (typeof value !== "number") return;
        if (value >= 0.1 && value <= 100) {
          rate = value;
          rateSlider.value = rateToSlider(value);
          rateValEl.textContent = rate >= 10 ? rate.toFixed(1) + " Hz" : rate.toFixed(2) + " Hz";
          rateSlider.style.setProperty("--val", (+rateSlider.value / 1000) * 100 + "%");
          updateWorkerRate();
          updateDistLabel();
          ewObj.setOutput("rate", Math.round(rate * 100) / 100, { unit: "hz" });
        }
      });

      ewObj.onInput("min", (value, meta) => {
        if (typeof value !== "number") return;
        const clamped = Math.max(-1, Math.min(1, value));
        rangeMin = clamped;
        document.getElementById("rng-min").value = Math.round(clamped * 100);
        document.getElementById("rng-min-val").textContent = (clamped >= 0 ? "+" : "") + clamped.toFixed(2);
      });

      ewObj.onInput("max", (value, meta) => {
        if (typeof value !== "number") return;
        const clamped = Math.max(-1, Math.min(1, value));
        rangeMax = clamped;
        document.getElementById("rng-max").value = Math.round(clamped * 100);
        document.getElementById("rng-max-val").textContent = (clamped >= 0 ? "+" : "") + clamped.toFixed(2);
      });

      // ── Scope drawing ──────────────────────────────────────────

      const scopeCanvas = document.getElementById("rng-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      // ── Histogram drawing ──────────────────────────────────────

      const histCanvas = document.getElementById("rng-histogram");
      const histCtx = histCanvas.getContext("2d");

      function resizeHist() {
        const rect = histCanvas.parentElement.getBoundingClientRect();
        histCanvas.width = rect.width;
        histCanvas.height = 80;
      }

      function drawAll() {
        requestAnimationFrame(drawAll);
        drawScope();
        drawHistogram();
      }

      function drawScope() {
        const w = scopeCanvas.width, h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid
        scopeCtx.strokeStyle = "rgba(128,128,128,0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }
        scopeCtx.strokeStyle = "rgba(128,128,128,0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        // Draw history
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210,210,210,0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < SCOPE_SAMPLES; i++) {
          const idx = (scopeWriteIdx + i) % SCOPE_SAMPLES;
          const x = (i / SCOPE_SAMPLES) * w;
          const y = ((1 - scopeHistory[idx]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      function drawHistogram() {
        const w = histCanvas.width, h = histCanvas.height;
        histCtx.fillStyle = "#080808";
        histCtx.fillRect(0, 0, w, h);

        if (histBuffer.length === 0) return;

        // Build bins from -1 to +1
        const NUM_BINS = 32;
        const bins = new Array(NUM_BINS).fill(0);
        for (const val of histBuffer) {
          const idx = Math.min(NUM_BINS - 1, Math.max(0, Math.floor(((val + 1) / 2) * NUM_BINS)));
          bins[idx]++;
        }
        const maxBin = Math.max(1, ...bins);

        const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim();
        const barW = w / NUM_BINS;

        histCtx.fillStyle = accent;
        histCtx.globalAlpha = 0.7;
        for (let i = 0; i < NUM_BINS; i++) {
          const barH = (bins[i] / maxBin) * (h - 4);
          histCtx.fillRect(i * barW + 1, h - barH, barW - 2, barH);
        }
        histCtx.globalAlpha = 1;

        // Center line
        histCtx.strokeStyle = "rgba(128,128,128,0.2)";
        histCtx.lineWidth = 1;
        histCtx.beginPath();
        histCtx.moveTo(w / 2, 0);
        histCtx.lineTo(w / 2, h);
        histCtx.stroke();
      }

      // ── Room UI ────────────────────────────────────────────────

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate; ewObj.setPrivate(roomPrivate); updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false; updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });
      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER OBJECTS AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // ── Initialize ─────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);
        ewObj._outputValues["signal"] = 0;
        ewObj._outputValues["rate"] = 10;
        ewObj._outputValues["distribution"] = "UNIFORM";
        startWorker(); // Start in FREE mode
        resizeScope();
        resizeHist();
        drawAll();
        updateVisibleControls();
      })();

      window.addEventListener("resize", () => { resizeScope(); resizeHist(); });
    </script>
  </body>
</html>
