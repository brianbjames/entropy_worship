<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PITCH SHIFT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
      #ps-scope {
        display: block;
        width: 100%;
        height: 120px;
        background: #0e0400;
      }
      .param-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .param-row .control-label {
        min-width: 80px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      #power-toggle .toggle-track.on .toggle-thumb {
        left: 22px;
      }
      #meta .toggle-wrap {
        align-self: center;
      }
      #meta .toggle-track {
        margin: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
      }
      .param-row .range-val {
        min-width: 72px;
        text-align: right;
      }
      .room-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        margin-bottom: 6px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        transition: border-color 0.14s, background 0.14s;
        cursor: pointer;
      }
      .room-entry:hover {
        border-color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
      }
      .room-entry-name {
        color: var(--accent);
      }
      .room-entry-info {
        font-size: 0.68rem;
        color: var(--dim);
        letter-spacing: 0.08em;
      }
      .mod-row {
        opacity: 0.3;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .mod-row.active {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "PS-1",
        objectType: "pitchshift",
        roomPrefix: "ps",
        inputs: [
          {
            port: "audio",
            type: "room",
            unit: "",
            default: null,
          },
          {
            port: "pitch",
            type: "number",
            unit: "st",
            min: -24,
            max: 24,
            default: 0,
          },
          {
            port: "wet",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 1,
          },
          {
            port: "gain",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 1,
          },
        ],
        outputs: [
          { port: "pitch", type: "number", unit: "st" },
          { port: "windowSize", type: "number" },
          { port: "wet", type: "number" },
          { port: "gain", type: "number" },
          { port: "playing", type: "boolean" },
          { port: "outputMode", type: "string" },
        ],
      });

      // ── PitchShift state ───────────────────────────────────────

      let basePitch = 0;
      let pitchModDepth = 12;
      let baseWindow = 0.1;
      let baseWet = 1;
      let baseGain = 1;

      // ── Tone.js audio ──────────────────────────────────────────

      let shifter = null;
      let gainNode = null;
      let analyser = null;
      let shifterRunning = false;
      let audioReady = false;
      let outputMode = "audio";

      // Local source oscillator
      let sourceOsc = null;
      let sourceGain = null;
      let sourceConnected = false;

      // Pitch modulation state (control-rate via worker)
      let pitchModWanted = false;
      let pitchModRemoteFreq = 2;
      let pitchModRemoteType = "sine";
      let pitchModWorker = null;
      let pitchModPhase = 0;
      let pitchModLastTime = 0;

      async function ensureAudio() {
        if (audioReady) return;
        shifter = new Tone.PitchShift({
          pitch: basePitch,
          windowSize: baseWindow,
        });
        shifter.wet.value = baseWet;
        gainNode = new Tone.Gain(baseGain);
        shifter.connect(gainNode);
        applyOutputRouting();
        analyser = new Tone.Analyser("waveform", 256);
        shifter.connect(analyser);
        audioReady = true;
      }

      function applyOutputRouting() {
        if (!gainNode) return;
        gainNode.disconnect();
        if (outputMode === "audio" || outputMode === "both") {
          gainNode.toDestination();
        }
      }

      // ── Source oscillator (audio input from room) ──────────────

      function createSourceOsc(freq, type, gain) {
        if (sourceOsc) destroySourceOsc();
        sourceOsc = new Tone.Oscillator({ frequency: freq || 440, type: type || "sine" });
        sourceGain = new Tone.Gain(gain !== undefined ? gain : 0.5);
        sourceOsc.connect(sourceGain);
        sourceGain.connect(shifter);
        if (shifterRunning) sourceOsc.start();
        sourceConnected = true;
      }

      function destroySourceOsc() {
        if (sourceOsc) {
          try { sourceOsc.stop(); } catch (_) {}
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = null;
        }
        if (sourceGain) {
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = null;
        }
        sourceConnected = false;
      }

      async function startShifter() {
        if (shifterRunning) return;
        await Tone.start();
        await ensureAudio();
        if (sourceOsc) sourceOsc.start();
        shifterRunning = true;
        reconnectModulators();
        updatePowerUI();
        ewObj.setOutput("playing", true, { immediate: true });
      }

      function stopShifter() {
        if (!shifterRunning) return;
        if (sourceOsc) {
          const freq = sourceOsc.frequency.value;
          const type = sourceOsc.type;
          const gain = sourceGain ? sourceGain.gain.value : 0.5;
          sourceOsc.stop();
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = new Tone.Oscillator({ frequency: freq, type: type });
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = new Tone.Gain(gain);
          sourceOsc.connect(sourceGain);
          sourceGain.connect(shifter);
        }
        shifterRunning = false;
        reconnectModulators();
        updatePowerUI();
        ewObj.setOutput("playing", false, { immediate: true });
      }

      // ── Pitch modulation (control-rate) ────────────────────────
      // PitchShift.pitch is not a Tone.Signal, so modulate at ~30Hz.

      function computePitchMod() {
        const now = performance.now() / 1000;
        if (pitchModLastTime === 0) pitchModLastTime = now;
        const dt = now - pitchModLastTime;
        pitchModLastTime = now;
        pitchModPhase = (pitchModPhase + pitchModRemoteFreq * dt) % 1;

        let value;
        switch (pitchModRemoteType) {
          case "sine": value = Math.sin(pitchModPhase * 2 * Math.PI); break;
          case "triangle": value = 1 - 4 * Math.abs(pitchModPhase - 0.5); break;
          case "sawtooth": value = 2 * pitchModPhase - 1; break;
          case "square": value = pitchModPhase < 0.5 ? 1 : -1; break;
          default: value = Math.sin(pitchModPhase * 2 * Math.PI);
        }
        return value;
      }

      function startPitchMod() {
        if (pitchModWorker) return;
        pitchModPhase = 0;
        pitchModLastTime = 0;
        const blob = new Blob([`
          let id = setInterval(() => postMessage("tick"), 33);
          onmessage = () => { clearInterval(id); close(); };
        `], { type: "application/javascript" });
        pitchModWorker = new Worker(URL.createObjectURL(blob));
        pitchModWorker.onmessage = () => {
          if (!shifterRunning || !shifter) return;
          const signal = computePitchMod();
          const modulated = basePitch + signal * pitchModDepth;
          const clamped = Math.max(-24, Math.min(24, modulated));
          shifter.pitch = clamped;
        };
      }

      function stopPitchMod() {
        if (pitchModWorker) {
          pitchModWorker.postMessage("stop");
          pitchModWorker = null;
        }
        pitchModPhase = 0;
        pitchModLastTime = 0;
      }

      function connectPitchMod() {
        if (pitchModWanted) return;
        pitchModWanted = true;
        if (shifterRunning) startPitchMod();
      }

      function disconnectPitchMod() {
        stopPitchMod();
        pitchModWanted = false;
      }

      function reconnectModulators() {
        if (pitchModWanted) {
          stopPitchMod();
          if (shifterRunning) startPitchMod();
        }
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "PITCH SHIFT", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <select id="ps-output-mode" style="width:auto; padding:3px 24px 3px 8px">
          <option value="audio">AUDIO</option>
          <option value="control">CONTROL</option>
          <option value="both">BOTH</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls panel
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `
        <div class="param-row">
          <div class="control-label">PITCH</div>
          <input type="range" id="ps-pitch" min="-24" max="24" value="0" />
          <span class="range-val" id="ps-pitch-val">0 st</span>
        </div>

        <div class="param-row">
          <div class="control-label">WINDOW</div>
          <input type="range" id="ps-window" min="1" max="100" value="10" />
          <span class="range-val" id="ps-window-val">0.10 s</span>
        </div>

        <div class="param-row">
          <div class="control-label">WET</div>
          <input type="range" id="ps-wet" min="0" max="100" value="100" />
          <span class="range-val" id="ps-wet-val">1.00</span>
        </div>

        <div class="param-row">
          <div class="control-label">GAIN</div>
          <input type="range" id="ps-gain" min="0" max="100" value="100" />
          <span class="range-val" id="ps-gain-val">1.00</span>
        </div>

        <div style="border-top:1px solid var(--border); padding-top:14px; margin-top:4px">
          <div class="param-row mod-row" id="mod-pitch-row">
            <div class="control-label">PITCH MOD</div>
            <input type="range" id="ps-pitch-mod-depth" min="0" max="240" value="120" />
            <span class="range-val" id="ps-pitch-mod-depth-val">12.0 st</span>
          </div>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="ps-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms panel
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE PITCH SHIFTERS //</div>
        <div id="rooms-list">
          <span class="type-dim">NO OTHER PITCH SHIFTERS AVAILABLE</span>
        </div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Wire controls ──────────────────────────────────────────

      function updatePowerUI() {
        const track = document.getElementById("power-track");
        track.classList.toggle("on", shifterRunning);
      }

      document.getElementById("power-toggle").addEventListener("click", () => {
        if (shifterRunning) stopShifter(); else startShifter();
      });

      // Output mode
      document.getElementById("ps-output-mode").addEventListener("change", (e) => {
        outputMode = e.target.value;
        applyOutputRouting();
        ewObj.setOutput("outputMode", outputMode, { immediate: true });
      });

      // Pitch slider (-24 to +24 semitones)
      wireRange("ps-pitch", "ps-pitch-val", (v) => v + " st");
      document.getElementById("ps-pitch").addEventListener("input", (e) => {
        const pitch = +e.target.value;
        basePitch = pitch;
        if (shifter) shifter.pitch = pitch;
        ewObj.setOutput("pitch", pitch, { unit: "st" });
        refreshStats();
      });

      // Window slider (0.01-1.0s, slider 1-100 mapped /100)
      wireRange("ps-window", "ps-window-val", (v) => (v / 100).toFixed(2) + " s");
      document.getElementById("ps-window").addEventListener("input", (e) => {
        const win = +e.target.value / 100;
        baseWindow = win;
        if (shifter) shifter.windowSize = win;
        ewObj.setOutput("windowSize", Math.round(win * 100) / 100);
        refreshStats();
      });

      // Wet slider
      wireRange("ps-wet", "ps-wet-val", (v) => (v / 100).toFixed(2));
      document.getElementById("ps-wet").addEventListener("input", (e) => {
        const wet = +e.target.value / 100;
        baseWet = wet;
        if (shifter) shifter.wet.rampTo(wet, 0.01);
        ewObj.setOutput("wet", Math.round(wet * 100) / 100);
        refreshStats();
      });

      // Gain slider
      wireRange("ps-gain", "ps-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("ps-gain").addEventListener("input", (e) => {
        const gain = +e.target.value / 100;
        baseGain = gain;
        if (gainNode) gainNode.gain.rampTo(gain, 0.01);
        ewObj.setOutput("gain", Math.round(gain * 100) / 100);
        refreshStats();
      });

      // Pitch mod depth slider (0-24 st, slider 0-240 mapped /10)
      wireRange("ps-pitch-mod-depth", "ps-pitch-mod-depth-val", (v) => (v / 10).toFixed(1) + " st");
      document.getElementById("ps-pitch-mod-depth").addEventListener("input", (e) => {
        pitchModDepth = +e.target.value / 10;
      });

      // ── Input signal handling ──────────────────────────────────

      ewObj.onInput("audio", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;
        if (!shifter) return;

        if (meta && meta.port === "frequency" && typeof value === "number") {
          if (!sourceConnected) {
            createSourceOsc(value, "sine", 0.5);
          } else if (sourceOsc) {
            sourceOsc.frequency.value = value;
          }
        } else if (meta && meta.port === "waveform" && typeof value === "string") {
          if (sourceOsc) { try { sourceOsc.type = value; } catch (_) {} }
        } else if (meta && meta.port === "gain" && typeof value === "number") {
          if (sourceGain) sourceGain.gain.value = Math.max(0, Math.min(1, value));
        } else if (meta && meta.port === "detune" && typeof value === "number") {
          if (sourceOsc) sourceOsc.detune.value = value;
        } else if (meta && meta.port === "playing" && typeof value === "boolean") {
          if (value && sourceConnected && !shifterRunning) startShifter();
        }
      });

      ewObj.on("inputConnected", ({ room, portMapping }) => {
        ensureAudio().then(() => {
          for (const localPort of Object.values(portMapping)) {
            if (localPort === "audio" && !sourceConnected) {
              createSourceOsc(440, "sine", 0.5);
            }
            if (localPort === "pitch") connectPitchMod();
          }
          updateModRowStates();
        });
      });

      ewObj.on("inputDisconnected", ({ room }) => {
        const subs = ewObj.getSubscriptions();
        const activePorts = new Set();
        for (const sub of subs) {
          for (const local of Object.values(sub.portMapping)) activePorts.add(local);
        }
        if (!activePorts.has("audio")) destroySourceOsc();
        if (!activePorts.has("pitch")) disconnectPitchMod();
        updateModRowStates();
      });

      ewObj.onInput("pitch", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = basePitch + value * pitchModDepth;
          const clamped = Math.max(-24, Math.min(24, modulated));
          if (shifter) shifter.pitch = clamped;
          return;
        }

        if (pitchModWanted) {
          if (meta && meta.port === "frequency" && typeof value === "number") {
            pitchModRemoteFreq = value;
          } else if (meta && meta.port === "waveform" && typeof value === "string") {
            pitchModRemoteType = value;
          }
          return;
        }

        if (typeof value === "number") {
          const clamped = Math.max(-24, Math.min(24, value));
          basePitch = clamped;
          if (shifter) shifter.pitch = clamped;
          document.getElementById("ps-pitch").value = Math.round(clamped);
          document.getElementById("ps-pitch-val").textContent = Math.round(clamped) + " st";
          ewObj.setOutput("pitch", clamped, { unit: "st" });
          refreshStats();
        }
      });

      ewObj.onInput("wet", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;
        if (typeof value === "number") {
          const clamped = Math.max(0, Math.min(1, value));
          baseWet = clamped;
          if (shifter) shifter.wet.rampTo(clamped, 0.01);
          document.getElementById("ps-wet").value = Math.round(clamped * 100);
          document.getElementById("ps-wet-val").textContent = clamped.toFixed(2);
          ewObj.setOutput("wet", clamped);
          refreshStats();
        }
      });

      ewObj.onInput("gain", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;
        if (typeof value === "number") {
          const clamped = Math.max(0, Math.min(1, value));
          baseGain = clamped;
          if (gainNode) gainNode.gain.rampTo(clamped, 0.01);
          document.getElementById("ps-gain").value = Math.round(clamped * 100);
          document.getElementById("ps-gain-val").textContent = clamped.toFixed(2);
          ewObj.setOutput("gain", clamped);
          refreshStats();
        }
      });

      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !shifterRunning) await startShifter();
        else if (!value && shifterRunning) stopShifter();
      });

      ewObj.onInput("outputMode", (value) => {
        if (typeof value !== "string") return;
        if (["audio", "control", "both"].includes(value)) {
          outputMode = value;
          document.getElementById("ps-output-mode").value = value;
          applyOutputRouting();
        }
      });

      // ── Mod row states ─────────────────────────────────────────

      function updateModRowStates() {
        document.getElementById("mod-pitch-row").classList.toggle("active", pitchModWanted);
      }

      // ── Output stats ───────────────────────────────────────────

      function refreshStats() {
        updateOutputStats(ewObj, [
          { port: "pitch", label: "PITCH", unit: " st", formatter: (v) => v !== undefined ? v.toString() : "—" },
          { port: "windowSize", label: "WIN", unit: " s", formatter: (v) => v !== undefined ? v.toFixed(2) : "—" },
          { port: "wet", label: "WET", formatter: (v) => v !== undefined ? v.toFixed(2) : "—" },
          { port: "gain", label: "GAIN", formatter: (v) => v !== undefined ? v.toFixed(2) : "—" },
        ]);
      }

      // ── Scope ──────────────────────────────────────────────────

      const scopeCanvas = document.getElementById("ps-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);
        const w = scopeCanvas.width;
        const h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }

        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        if (!analyser || !shifterRunning) return;

        const data = analyser.getValue();
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210, 210, 210, 0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const x = (i / data.length) * w;
          const y = ((1 - data[i]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      // ── Room UI ────────────────────────────────────────────────

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        ewObj.setPrivate(roomPrivate);
        updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false;
        updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });

      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER PITCH SHIFTERS AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // ── Initialize ─────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);

        ewObj._outputValues["pitch"] = 0;
        ewObj._outputValues["windowSize"] = 0.1;
        ewObj._outputValues["wet"] = 1;
        ewObj._outputValues["gain"] = 1;
        ewObj._outputValues["playing"] = false;
        ewObj._outputValues["outputMode"] = "audio";

        refreshStats();
        resizeScope();
        drawScope();
      })();

      window.addEventListener("resize", resizeScope);
    </script>
  </body>
</html>
