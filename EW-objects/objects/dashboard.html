<!doctype html>
<html lang="en" class="theme-ethos">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EW/OBJECTS — NETWORK MAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@v0.171.0/build/three.module.js"
        }
      }
    </script>
    <style>
      #patch-canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1;
      }
      #kk-bg {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 0;
        pointer-events: none;
      }
      #app {
        pointer-events: none;
      }
      #app > * {
        pointer-events: auto;
      }
      header {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .dash-stats {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <!-- ── Kaluza-Klein background ── -->
    <canvas id="kk-bg"></canvas>
    <canvas id="patch-canvas"></canvas>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>

    <div id="app">
      <header>
        <h1 class="hud-title">
          <a
            href="/EW-objects/"
            style="
              color: var(--dim);
              text-decoration: none;
              transition: color 0.14s;
            "
            onmouseover="this.style.color = 'var(--accent)'"
            onmouseout="this.style.color = 'var(--dim)'"
            >&laquo;</a
          >
          NETWORK MAP
        </h1>
        <div id="meta">
          <span class="status-item">
            <span class="status-dot offline" id="status-dot"></span>
            <span id="ew-status-text">OFFLINE</span>
          </span>
          <span class="type-mono" id="ew-output-room" style="font-size:0.82rem"></span>
          <button class="btn btn-sm btn-mint" id="ew-copy-room" style="padding:2px 8px; font-size:0.62rem">COPY URL</button>
          <button class="btn btn-sm" id="privacy-btn" style="padding:2px 8px; font-size:0.62rem">PUBLIC</button>
        </div>
      </header>

      <div class="hud-panel clip-tr dash-stats">
        <div class="section-title" style="padding: 6px 10px 2px">// NETWORK STATUS //</div>
        <div class="stats-row">
          <div class="stat-block">
            <div class="stat-label">ROOMS</div>
            <div class="stat-val" id="stat-rooms">0</div>
          </div>
          <div class="stat-block">
            <div class="stat-label">OBJECTS</div>
            <div class="stat-val" id="stat-objects">0</div>
          </div>
          <div class="stat-block">
            <div class="stat-label">CONNECTIONS</div>
            <div class="stat-val" id="stat-connections">0</div>
          </div>
          <div class="stat-block">
            <div class="stat-label">SUBGRAPHS</div>
            <div class="stat-val" id="stat-subgraphs">0</div>
          </div>
        </div>
      </div>

      <div class="hud-panel clip-tr" id="private-rooms-panel" style="display:none">
        <div class="section-title" style="padding: 6px 10px 2px">// PRIVATE ROOMS //</div>
        <div style="display:flex; gap:8px; align-items:center; margin-top:8px">
          <input type="text" id="private-room-input" placeholder="PASTE ROOM URL OR NAME..." style="flex:1" spellcheck="false" autocomplete="off">
          <button class="btn btn-sm btn-mint" id="private-room-add">ADD</button>
        </div>
        <div id="private-rooms-list" style="margin-top:8px"></div>
      </div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { RoomConnection, resolveWsBase } from "../lib/ew-object-base.js";

      // ── Category colors ──────────────────────────────────────
      const CATEGORY_MAP = {
        oscillator: "source",
        noise: "source",
        audioinput: "source",
        drums: "instrument",
        granular: "instrument",
        looper: "instrument",
        sampler: "instrument",
        synth: "instrument",
        bitcrusher: "effect",
        chorus: "effect",
        compressor: "effect",
        delay: "effect",
        distortion: "effect",
        eq: "effect",
        filter: "effect",
        panner: "effect",
        phaser: "effect",
        pitchshift: "effect",
        reverb: "effect",
        ringmod: "effect",
        wavefolder: "effect",
        envelope: "modulation",
        funcgen: "modulation",
        lfo: "modulation",
        samplehold: "modulation",
        arpeggiator: "sequencing",
        clock: "sequencing",
        euclid: "sequencing",
        sequencer: "sequencing",
        crossfader: "routing",
        mixer: "routing",
        gain: "utility",
        gate: "utility",
        logic: "utility",
        math: "utility",
        midicalc: "utility",
        probability: "utility",
        quantizer: "utility",
        rng: "utility",
        dbmeter: "visualizer",
        scope: "visualizer",
      };

      const CATEGORY_COLORS = {
        source: "#ffaa00",
        instrument: "#ff4477",
        effect: "#00ffbb",
        modulation: "#dd66ff",
        sequencing: "#ff66dd",
        routing: "#66ffdd",
        utility: "#aaaaaa",
        visualizer: "#ffdd00",
        unknown: "#666666",
      };

      function getCategoryColor(objectType) {
        const cat = CATEGORY_MAP[objectType] || "unknown";
        return CATEGORY_COLORS[cat] || CATEGORY_COLORS.unknown;
      }

      // ── Three.js Setup ───────────────────────────────────────
      const canvas = document.getElementById("patch-canvas");
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
      });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);

      const frustum = 60;
      const aspect = innerWidth / innerHeight;
      const camera = new THREE.OrthographicCamera(
        -frustum * aspect,
        frustum * aspect,
        frustum,
        -frustum,
        0.1,
        100,
      );
      camera.position.set(0, 0, 50);
      camera.lookAt(0, 0, 0);

      const scene = new THREE.Scene();
      const edgeGroup = new THREE.Group();
      const nodeGroup = new THREE.Group();
      const particleGroup = new THREE.Group();
      scene.add(edgeGroup);
      scene.add(nodeGroup);
      scene.add(particleGroup);

      function resize() {
        renderer.setSize(innerWidth, innerHeight);
        const a = innerWidth / innerHeight;
        camera.left = -frustum * a * zoom;
        camera.right = frustum * a * zoom;
        camera.top = frustum * zoom;
        camera.bottom = -frustum * zoom;
        camera.updateProjectionMatrix();
      }

      // ── Raycasting ───────────────────────────────────────────
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let hoveredSprite = null;

      // ── Pan / Zoom / Node Drag ───────────────────────────────
      let zoom = 1;
      let panX = 0,
        panY = 0;
      let dragging = false,
        dragStartX = 0,
        dragStartY = 0,
        panStartX = 0,
        panStartY = 0;
      let draggedNode = null; // sprite being dragged
      let dragNodeName = null; // room name of dragged node

      function updateCamera() {
        const a = innerWidth / innerHeight;
        camera.left = -frustum * a * zoom;
        camera.right = frustum * a * zoom;
        camera.top = frustum * zoom;
        camera.bottom = -frustum * zoom;
        camera.position.set(panX, panY, 50);
        camera.lookAt(panX, panY, 0);
        camera.updateProjectionMatrix();
      }

      canvas.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          zoom *= e.deltaY > 0 ? 1.08 : 0.92;
          zoom = Math.max(0.2, Math.min(5, zoom));
          updateCamera();
        },
        { passive: false },
      );

      function screenToWorld(cx, cy) {
        const a = innerWidth / innerHeight;
        const wx = panX + ((cx / innerWidth) * 2 - 1) * frustum * a * zoom;
        const wy = panY - ((cy / innerHeight) * 2 - 1) * frustum * zoom;
        return { x: wx, y: wy };
      }

      canvas.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        dragStartX = e.clientX;
        dragStartY = e.clientY;

        // Check if clicking on a node (for dragging)
        mouse.x = (e.clientX / innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(nodeGroup.children);
        if (hits.length > 0 && layout.settled) {
          draggedNode = hits[0].object;
          dragNodeName = draggedNode.userData.roomName;
          canvas.style.cursor = "grabbing";
        } else {
          dragging = true;
          panStartX = panX;
          panStartY = panY;
          canvas.style.cursor = "grabbing";
        }
      });

      window.addEventListener("mousemove", (e) => {
        if (draggedNode && dragNodeName) {
          const world = screenToWorld(e.clientX, e.clientY);
          const pos = layout.getPos(dragNodeName);
          if (pos) {
            pos.x = world.x;
            pos.y = world.y;
            pos.vx = 0;
            pos.vy = 0;
          }
        } else if (dragging) {
          const dx = e.clientX - dragStartX;
          const dy = e.clientY - dragStartY;
          const scale = (frustum * 2 * zoom) / innerHeight;
          panX = panStartX - dx * scale;
          panY = panStartY + dy * scale;
          updateCamera();
        }
      });

      window.addEventListener("mouseup", () => {
        if (draggedNode) {
          draggedNode = null;
          dragNodeName = null;
          canvas.style.cursor = "";
        }
        if (dragging) {
          dragging = false;
          canvas.style.cursor = "";
        }
      });

      resize();
      addEventListener("resize", resize);

      canvas.addEventListener("click", (e) => {
        // Ignore if we were dragging
        const dx = Math.abs(e.clientX - dragStartX);
        const dy = Math.abs(e.clientY - dragStartY);
        if (dx > 4 || dy > 4) return;

        mouse.x = (e.clientX / innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(nodeGroup.children);
        if (hits.length > 0) {
          const data = hits[0].object.userData;
          if (data.objectType && data.roomName) {
            window.open(
              `/EW-objects/objects/${data.objectType}.html?room=${data.roomName}`,
              "_blank",
            );
          }
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        if (dragging) return;
        mouse.x = (e.clientX / innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(nodeGroup.children);

        if (
          hoveredSprite &&
          (!hits.length || hits[0].object !== hoveredSprite)
        ) {
          hoveredSprite.scale.copy(hoveredSprite.userData._baseScale);
          hoveredSprite.material.opacity = 1;
          hoveredSprite = null;
          canvas.style.cursor = "";
        }
        if (hits.length > 0 && hits[0].object !== hoveredSprite) {
          hoveredSprite = hits[0].object;
          hoveredSprite.userData._baseScale =
            hoveredSprite.userData._baseScale || hoveredSprite.scale.clone();
          hoveredSprite.scale
            .copy(hoveredSprite.userData._baseScale)
            .multiplyScalar(1.12);
          canvas.style.cursor = "pointer";
        }
      });

      // ── Node Texture Generation (auto-sized) ─────────────────
      const _measureCanvas = document.createElement("canvas");
      const _measureCtx = _measureCanvas.getContext("2d");

      function makeNodeTexture(roomName, objectType, clients) {
        const color = getCategoryColor(objectType);
        const typeLabel = (objectType || "UNKNOWN").toUpperCase();
        const cat = (CATEGORY_MAP[objectType] || "UNKNOWN").toUpperCase();
        const plrLabel = `${clients} PLR`;

        // Measure text to determine canvas width
        _measureCtx.font = '28px "VT323", monospace';
        const nameWidth = _measureCtx.measureText(roomName).width;
        _measureCtx.font = '18px "VT323", monospace';
        const typeWidth = _measureCtx.measureText(typeLabel).width;
        const bottomWidth =
          _measureCtx.measureText(cat).width +
          _measureCtx.measureText(plrLabel).width +
          40;

        const textMax = Math.max(nameWidth, typeWidth, bottomWidth);
        const pad = 32;
        const w = Math.ceil(textMax + pad * 2);
        const h = 90;

        const c = document.createElement("canvas");
        c.width = w;
        c.height = h;
        const ctx = c.getContext("2d");

        // Match panel background color
        ctx.fillStyle = "rgba(0, 0, 0, 0.92)";
        ctx.fillRect(0, 0, w, h);

        // Border
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(1, 1, w - 2, h - 2);

        // Corner accents
        ctx.fillStyle = color;
        const cn = 8;
        ctx.fillRect(0, 0, cn, 1.5);
        ctx.fillRect(0, 0, 1.5, cn);
        ctx.fillRect(w - cn, 0, cn, 1.5);
        ctx.fillRect(w - 1.5, 0, 1.5, cn);
        ctx.fillRect(0, h - 1.5, cn, 1.5);
        ctx.fillRect(0, h - cn, 1.5, cn);
        ctx.fillRect(w - cn, h - 1.5, cn, 1.5);
        ctx.fillRect(w - 1.5, h - cn, 1.5, cn);

        // Object type label
        ctx.font = '18px "VT323", monospace';
        ctx.fillStyle = "rgba(210, 210, 210, 0.35)";
        ctx.textAlign = "left";
        ctx.fillText(typeLabel, pad / 2, 22);

        // Room name
        ctx.font = '28px "VT323", monospace';
        ctx.fillStyle = color;
        ctx.fillText(roomName, pad / 2, 52);

        // Category tag
        ctx.font = '18px "VT323", monospace';
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.45;
        ctx.fillText(cat, pad / 2, 78);
        ctx.globalAlpha = 1;

        // Client count
        ctx.fillStyle = "rgba(210, 210, 210, 0.3)";
        ctx.textAlign = "right";
        ctx.fillText(plrLabel, w - pad / 2, 78);

        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        tex._nodeW = w;
        tex._nodeH = h;
        return tex;
      }

      // ── Force-Directed Layout (damped spring model) ─────────
      class ForceLayout {
        constructor() {
          this.nodes = new Map(); // name → { x, y, vx, vy }
          this.edges = []; // [{ from, to }]
          this.settled = false;
          this._prevKey = ""; // fingerprint for change detection
        }

        setGraph(nodeNames, edges) {
          // Build a fingerprint to detect actual changes
          const key =
            nodeNames.slice().sort().join(",") +
            "|" +
            edges
              .map((e) => e.from + ">" + e.to)
              .sort()
              .join(",");
          const changed = key !== this._prevKey;
          this._prevKey = key;

          // Keep existing positions, add new nodes
          for (const name of nodeNames) {
            if (!this.nodes.has(name)) {
              const angle = Math.random() * Math.PI * 2;
              const r = 5 + Math.random() * 15;
              this.nodes.set(name, {
                x: Math.cos(angle) * r,
                y: Math.sin(angle) * r,
                vx: 0,
                vy: 0,
              });
              this.settled = false;
            }
          }
          // Remove nodes no longer present
          for (const name of this.nodes.keys()) {
            if (!nodeNames.includes(name)) {
              this.nodes.delete(name);
              this.settled = false;
            }
          }
          if (changed) {
            this.edges = edges;
            this.settled = false;
          }
        }

        step() {
          if (this.settled) return;

          const nodes = [...this.nodes.entries()];
          const n = nodes.length;
          if (n === 0) {
            this.settled = true;
            return;
          }

          const REST_LEN = 12; // ideal distance between connected nodes (tight stacking)
          const REPULSE = 800; // repulsion strength
          const SPRING = 0.06; // spring stiffness
          const GRAVITY = 0.06; // pull toward center
          const FRICTION = 0.7; // velocity damping per step (lower = more damping)
          const CENTER_Y = -30; // gravity center for connected nodes
          const ORPHAN_X = 50; // orphans pushed to the right side

          // Identify orphan nodes (no edges at all)
          const connected = new Set();
          for (const edge of this.edges) {
            connected.add(edge.from);
            connected.add(edge.to);
          }

          // Accumulate forces into velocity
          // Repulsion (all pairs) — capped at a max distance
          for (let i = 0; i < n; i++) {
            for (let j = i + 1; j < n; j++) {
              const a = nodes[i][1],
                b = nodes[j][1];
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const distSq = dx * dx + dy * dy;
              const dist = Math.sqrt(distSq) || 0.1;
              if (dist > 200) continue;
              const f = REPULSE / distSq;
              const fx = (dx / dist) * f;
              const fy = (dy / dist) * f;
              a.vx += fx;
              a.vy += fy;
              b.vx -= fx;
              b.vy -= fy;
            }
          }

          // Attraction (edges) — Hooke's law spring + vertical hierarchy
          // edge.from = parent (source), edge.to = child (subscriber)
          const HIERARCHY = 3.0; // vertical separation force
          const ALIGN_X = 0.08; // horizontal alignment to reduce crossings
          for (const edge of this.edges) {
            const a = this.nodes.get(edge.from); // parent
            const b = this.nodes.get(edge.to); // child
            if (!a || !b) continue;
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
            const displacement = dist - REST_LEN;
            const f = SPRING * displacement;
            const fx = (dx / dist) * f;
            const fy = (dy / dist) * f;
            a.vx += fx;
            a.vy += fy;
            b.vx -= fx;
            b.vy -= fy;
            // Hierarchy: push parent (a) up, child (b) down
            a.vy -= HIERARCHY;
            b.vy += HIERARCHY;
            // Horizontal alignment: pull connected nodes toward same X
            a.vx += dx * ALIGN_X;
            b.vx -= dx * ALIGN_X;
          }

          // Sibling alignment: nodes sharing a parent align on same Y
          const SIBLING_ALIGN = 0.04;
          const childrenOf = new Map(); // parentName → [childNode]
          for (const edge of this.edges) {
            if (!childrenOf.has(edge.from)) childrenOf.set(edge.from, []);
            const child = this.nodes.get(edge.to);
            if (child) childrenOf.get(edge.from).push(child);
          }
          for (const siblings of childrenOf.values()) {
            if (siblings.length < 2) continue;
            let avgY = 0;
            for (const s of siblings) avgY += s.y;
            avgY /= siblings.length;
            for (const s of siblings) {
              s.vy += (avgY - s.y) * SIBLING_ALIGN;
            }
          }

          // Edge-node repulsion: push nodes away from edges they're not part of
          const EDGE_REPULSE = 0.8;
          for (const edge of this.edges) {
            const ea = this.nodes.get(edge.from);
            const eb = this.nodes.get(edge.to);
            if (!ea || !eb) continue;
            for (const [name, nd] of nodes) {
              if (name === edge.from || name === edge.to) continue;
              // Distance from point nd to line segment ea→eb
              const ex = eb.x - ea.x;
              const ey = eb.y - ea.y;
              const lenSq = ex * ex + ey * ey;
              if (lenSq < 0.01) continue;
              let t = ((nd.x - ea.x) * ex + (nd.y - ea.y) * ey) / lenSq;
              t = Math.max(0, Math.min(1, t));
              const px = ea.x + t * ex;
              const py = ea.y + t * ey;
              const dx = nd.x - px;
              const dy = nd.y - py;
              const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
              if (dist < 10) {
                const push = EDGE_REPULSE * (10 - dist) / dist;
                nd.vx += dx * push;
                nd.vy += dy * push;
              }
            }
          }

          // Center gravity — connected nodes toward center, orphans to the side
          for (const [name, nd] of nodes) {
            if (connected.has(name)) {
              nd.vx -= nd.x * GRAVITY;
              nd.vy -= (nd.y - CENTER_Y) * GRAVITY;
            } else {
              // Orphans: pull toward a column on the right
              nd.vx -= (nd.x - ORPHAN_X) * GRAVITY * 1.5;
              nd.vy -= (nd.y - CENTER_Y) * GRAVITY;
            }
          }

          // Apply velocity with friction, track max movement
          const CEILING_Y = 35; // hard ceiling — nodes can't go above this (HUD zone)
          let maxMove = 0;
          for (const [, nd] of nodes) {
            nd.vx *= FRICTION;
            nd.vy *= FRICTION;
            nd.x += nd.vx;
            nd.y += nd.vy;
            // Clamp to keep nodes below HUD
            if (nd.y > CEILING_Y) {
              nd.y = CEILING_Y;
              nd.vy = 0;
            }
            const move = Math.abs(nd.vx) + Math.abs(nd.vy);
            if (move > maxMove) maxMove = move;
          }

          // Settle when all nodes are barely moving
          if (maxMove < 0.05) {
            this.settled = true;
            for (const [, nd] of nodes) {
              nd.vx = 0;
              nd.vy = 0;
            }
          }
        }

        getPos(name) {
          return this.nodes.get(name);
        }
      }

      const layout = new ForceLayout();

      // ── Scene State ──────────────────────────────────────────
      const nodeMeshes = new Map(); // roomName → sprite
      let edgeLines = []; // { line, from, to }
      let flowParticles = null; // THREE.Points
      let flowData = []; // [{ from, to, t }]
      let currentTopology = null;

      function countSubgraphs(nodeNames, edges) {
        if (nodeNames.length === 0) return 0;
        const adj = new Map();
        for (const name of nodeNames) adj.set(name, []);
        for (const e of edges) {
          if (adj.has(e.from) && adj.has(e.to)) {
            adj.get(e.from).push(e.to);
            adj.get(e.to).push(e.from);
          }
        }
        const visited = new Set();
        let count = 0;
        for (const name of nodeNames) {
          if (visited.has(name)) continue;
          count++;
          const stack = [name];
          while (stack.length) {
            const cur = stack.pop();
            if (visited.has(cur)) continue;
            visited.add(cur);
            for (const nb of adj.get(cur) || []) {
              if (!visited.has(nb)) stack.push(nb);
            }
          }
        }
        return count;
      }

      function reconcile(topology) {
        if (!topology) return;
        currentTopology = topology;
        // Filter out the dashboard's own room
        let rooms = (topology.rooms || []).filter(
          (r) => r.name !== dashboardRoom && r.name !== "_dashboard",
        );

        // Merge private room data into the topology
        for (const [name, data] of privateRoomData) {
          if (!rooms.find((r) => r.name === name)) {
            rooms.push(data);
          }
        }

        // Build graph data
        const nodeNames = rooms.map((r) => r.name);
        const edges = [];
        const roomInfo = new Map(); // name → { objectType, clients }

        for (const room of rooms) {
          const primaryObj = room.objects[0];
          roomInfo.set(room.name, {
            objectType: primaryObj ? primaryObj.objectType : null,
            clients: room.clients,
          });
          for (const obj of room.objects) {
            if (obj.subscribedRooms) {
              for (const sub of obj.subscribedRooms) {
                if (nodeNames.includes(sub)) {
                  edges.push({ from: sub, to: room.name });
                }
              }
            }
          }
        }

        // Update layout
        layout.setGraph(nodeNames, edges);

        // Reconcile node sprites
        const currentNames = new Set(nodeMeshes.keys());
        const newNames = new Set(nodeNames);

        // Remove stale
        for (const name of currentNames) {
          if (!newNames.has(name)) {
            const sprite = nodeMeshes.get(name);
            sprite.material.map.dispose();
            sprite.material.dispose();
            nodeGroup.remove(sprite);
            nodeMeshes.delete(name);
          }
        }

        // Add or update
        for (const name of nodeNames) {
          const info = roomInfo.get(name);
          if (nodeMeshes.has(name)) {
            // Update texture if info changed
            const sprite = nodeMeshes.get(name);
            if (
              sprite.userData._objectType !== info.objectType ||
              sprite.userData._clients !== info.clients
            ) {
              sprite.material.map.dispose();
              sprite.material.map = makeNodeTexture(
                name,
                info.objectType,
                info.clients,
              );
              sprite.material.needsUpdate = true;
              sprite.userData._objectType = info.objectType;
              sprite.userData._clients = info.clients;
            }
          } else {
            const tex = makeNodeTexture(name, info.objectType, info.clients);
            const mat = new THREE.SpriteMaterial({
              map: tex,
              transparent: true,
              depthWrite: false,
            });
            const sprite = new THREE.Sprite(mat);
            const sw = (tex._nodeW / tex._nodeH) * 10;
            const sh = 10;
            sprite.scale.set(sw, sh, 1);
            sprite.userData = {
              roomName: name,
              objectType: info.objectType,
              _objectType: info.objectType,
              _clients: info.clients,
              _baseScale: new THREE.Vector3(sw, sh, 1),
            };
            nodeGroup.add(sprite);
            nodeMeshes.set(name, sprite);
          }
        }

        // Rebuild edges
        for (const { line } of edgeLines) {
          line.geometry.dispose();
          line.material.dispose();
          edgeGroup.remove(line);
        }
        edgeLines = [];

        for (const edge of edges) {
          const fromInfo = roomInfo.get(edge.from);
          const color = getCategoryColor(fromInfo ? fromInfo.objectType : null);
          const geo = new THREE.BufferGeometry();
          geo.setAttribute(
            "position",
            new THREE.Float32BufferAttribute([0, 0, 0, 0, 0, 0], 3),
          );
          const mat = new THREE.LineBasicMaterial({
            color: new THREE.Color(color),
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            linewidth: 2,
          });
          const line = new THREE.Line(geo, mat);
          edgeGroup.add(line);
          edgeLines.push({ line, from: edge.from, to: edge.to });
        }

        // Rebuild flow particles
        if (flowParticles) {
          flowParticles.geometry.dispose();
          flowParticles.material.dispose();
          particleGroup.remove(flowParticles);
          flowParticles = null;
        }
        flowData = [];

        if (edges.length > 0) {
          const particlesPerEdge = 3;
          const totalParticles = edges.length * particlesPerEdge;
          const positions = new Float32Array(totalParticles * 3);
          const colors = new Float32Array(totalParticles * 3);

          for (let i = 0; i < edges.length; i++) {
            const fromInfo = roomInfo.get(edges[i].from);
            const color = new THREE.Color(
              getCategoryColor(fromInfo ? fromInfo.objectType : null),
            );
            for (let p = 0; p < particlesPerEdge; p++) {
              const idx = i * particlesPerEdge + p;
              colors[idx * 3] = color.r;
              colors[idx * 3 + 1] = color.g;
              colors[idx * 3 + 2] = color.b;
              flowData.push({
                edgeIdx: i,
                from: edges[i].from,
                to: edges[i].to,
                t: p / particlesPerEdge,
              });
            }
          }

          const geo = new THREE.BufferGeometry();
          geo.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3),
          );
          geo.setAttribute(
            "color",
            new THREE.Float32BufferAttribute(colors, 3),
          );

          // Dot texture
          const dotCanvas = document.createElement("canvas");
          dotCanvas.width = 16;
          dotCanvas.height = 16;
          const dctx = dotCanvas.getContext("2d");
          dctx.beginPath();
          dctx.arc(8, 8, 6, 0, Math.PI * 2);
          dctx.fillStyle = "#ffffff";
          dctx.fill();
          const dotTex = new THREE.CanvasTexture(dotCanvas);

          const mat = new THREE.PointsMaterial({
            size: 2.5,
            map: dotTex,
            vertexColors: true,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          });

          flowParticles = new THREE.Points(geo, mat);
          particleGroup.add(flowParticles);
        }

        // Update stats
        document.getElementById("stat-rooms").textContent = rooms.length;
        document.getElementById("stat-objects").textContent = rooms.reduce(
          (s, r) => s + r.objects.length,
          0,
        );
        document.getElementById("stat-connections").textContent = edges.length;
        document.getElementById("stat-subgraphs").textContent = countSubgraphs(
          nodeNames,
          edges,
        );
      }

      // ── Empty state sprite ───────────────────────────────────
      let emptySprite = null;

      function showEmptyState() {
        if (emptySprite) return;
        const c = document.createElement("canvas");
        c.width = 512;
        c.height = 64;
        const ctx = c.getContext("2d");
        ctx.font = '28px "VT323", monospace';
        ctx.fillStyle = "rgba(255, 170, 0, 0.3)";
        ctx.textAlign = "center";
        ctx.fillText("WAITING FOR OBJECTS...", 256, 40);
        const tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        const mat = new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          depthWrite: false,
        });
        emptySprite = new THREE.Sprite(mat);
        emptySprite.scale.set(60, 7.5, 1);
        scene.add(emptySprite);
      }

      function hideEmptyState() {
        if (!emptySprite) return;
        emptySprite.material.map.dispose();
        emptySprite.material.dispose();
        scene.remove(emptySprite);
        emptySprite = null;
      }

      // ── Room / Privacy ──────────────────────────────────────────
      const wsBase = resolveWsBase();
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("ew-status-text");
      let topoPollTimer = null;
      let roomPrivate = false;

      // Determine room name: use ?room= param, default to "dashboard"
      const urlParams = new URLSearchParams(location.search);
      const dashboardRoom = urlParams.get("room") || "dashboard";

      // Update URL bar to reflect room
      if (!urlParams.has("room")) {
        const url = new URL(location.href);
        url.searchParams.set("room", dashboardRoom);
        history.replaceState(null, "", url.toString());
      }

      // Privacy toggle
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
        // Show/hide private rooms panel
        document.getElementById("private-rooms-panel").style.display = roomPrivate ? "" : "none";
      }

      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        conn.send({ type: "setPrivate", private: roomPrivate });
        updatePrivacyBtn();
      });

      // Copy URL button
      document.getElementById("ew-copy-room").addEventListener("click", () => {
        const url = new URL(location.href);
        url.searchParams.set("room", dashboardRoom);
        navigator.clipboard.writeText(url.toString()).then(() => {
          const btn = document.getElementById("ew-copy-room");
          btn.textContent = "COPIED";
          setTimeout(() => (btn.textContent = "COPY URL"), 1500);
        });
      });

      // ── Private Rooms Management ─────────────────────────────────
      const privateRooms = new Map(); // roomName → { conn, objectType }
      const privateRoomData = new Map(); // roomName → room data for topology merge

      function addPrivateRoom(roomInput) {
        // Extract room name from URL or use as-is
        let roomName = roomInput.trim();
        if (roomName.includes("?room=")) {
          try {
            const url = new URL(roomName);
            roomName = url.searchParams.get("room") || "";
          } catch {
            const match = roomName.match(/[?&]room=([^&]+)/);
            roomName = match ? decodeURIComponent(match[1]) : "";
          }
        }
        roomName = roomName.replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32);
        if (!roomName || privateRooms.has(roomName)) return;

        // Connect to the private room to get its object info
        const privConn = new RoomConnection(wsBase, roomName, {
          onOpen: () => {
            privConn.send({ type: "requestState" });
          },
          onSignal: () => {},
          onState: (msg) => {
            // We got state from this room — update the private room data
            privateRoomData.set(roomName, {
              name: roomName,
              clients: msg.peers ? msg.peers.length : 1,
              objects: msg.objects || [],
            });
            // Re-reconcile with merged topology
            if (currentTopology) reconcile(currentTopology);
          },
          onMessage: (msg) => {
            if (msg.type === "objectInfo") {
              const existing = privateRoomData.get(roomName) || { name: roomName, clients: 1, objects: [] };
              existing.objects = [msg.info];
              privateRoomData.set(roomName, existing);
              if (currentTopology) reconcile(currentTopology);
            }
          },
          onPeers: (msg) => {
            const existing = privateRoomData.get(roomName) || { name: roomName, clients: 0, objects: [] };
            existing.clients = msg.count || (msg.peers ? msg.peers.length : 0);
            privateRoomData.set(roomName, existing);
          },
        });

        privateRooms.set(roomName, privConn);
        privateRoomData.set(roomName, { name: roomName, clients: 0, objects: [] });
        privConn.connect();
        renderPrivateRoomsList();
      }

      function removePrivateRoom(roomName) {
        const privConn = privateRooms.get(roomName);
        if (privConn) {
          privConn.destroy();
          privateRooms.delete(roomName);
        }
        privateRoomData.delete(roomName);
        renderPrivateRoomsList();
        if (currentTopology) reconcile(currentTopology);
      }

      function renderPrivateRoomsList() {
        const list = document.getElementById("private-rooms-list");
        if (privateRooms.size === 0) {
          list.innerHTML = '<span class="type-dim" style="font-size:0.72rem">NO PRIVATE ROOMS ADDED</span>';
          return;
        }
        list.innerHTML = "";
        for (const [name] of privateRooms) {
          const row = document.createElement("div");
          row.style.cssText = "display:flex; gap:8px; align-items:center; margin-top:4px";
          row.innerHTML = `
            <span class="type-mono" style="flex:1; font-size:0.78rem; word-break:break-all">${name}</span>
            <button class="btn btn-sm btn-rose" style="padding:1px 6px; font-size:0.58rem" data-room="${name}">×</button>
          `;
          row.querySelector("button").addEventListener("click", () => removePrivateRoom(name));
          list.appendChild(row);
        }
      }

      document.getElementById("private-room-add").addEventListener("click", () => {
        const input = document.getElementById("private-room-input");
        addPrivateRoom(input.value);
        input.value = "";
      });
      document.getElementById("private-room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("private-room-add").click();
      });

      // ── WebSocket ────────────────────────────────────────────
      const conn = new RoomConnection(wsBase, dashboardRoom, {
        onOpen: () => {
          statusDot.className = "status-dot live";
          statusText.textContent = "ONLINE";
          document.getElementById("ew-output-room").textContent = dashboardRoom;
          conn.send({ type: "requestTopology" });
          topoPollTimer = setInterval(() => {
            conn.send({ type: "requestTopology" });
          }, 4000);
        },
        onClose: () => {
          statusDot.className = "status-dot offline";
          statusText.textContent = "OFFLINE";
          if (topoPollTimer) {
            clearInterval(topoPollTimer);
            topoPollTimer = null;
          }
        },
        onTopology: (msg) => {
          reconcile(msg);
        },
        onRoomPrivate: (msg) => {
          roomPrivate = msg.private;
          updatePrivacyBtn();
        },
        onState: (msg) => {
          if (msg.private !== undefined) {
            roomPrivate = msg.private;
            updatePrivacyBtn();
          }
        },
      });

      // Wait for font then connect
      document.fonts.ready.then(() => {
        conn.connect();
        showEmptyState();
        renderPrivateRoomsList();
      });

      // ── Animation Loop ───────────────────────────────────────
      let time = 0;

      function animate() {
        requestAnimationFrame(animate);
        time += 0.016;

        layout.step();

        // Update node positions
        for (const [name, sprite] of nodeMeshes) {
          const pos = layout.getPos(name);
          if (pos) {
            sprite.position.set(pos.x, pos.y, 0);
          }
        }

        // Update edge endpoints
        for (const { line, from, to } of edgeLines) {
          const a = layout.getPos(from);
          const b = layout.getPos(to);
          if (a && b) {
            const arr = line.geometry.attributes.position.array;
            arr[0] = a.x;
            arr[1] = a.y;
            arr[2] = 0;
            arr[3] = b.x;
            arr[4] = b.y;
            arr[5] = 0;
            line.geometry.attributes.position.needsUpdate = true;
          }
        }

        // Update flow particles
        if (flowParticles && flowData.length > 0) {
          const arr = flowParticles.geometry.attributes.position.array;
          for (let i = 0; i < flowData.length; i++) {
            const fd = flowData[i];
            fd.t += 0.008;
            if (fd.t > 1) fd.t -= 1;
            const a = layout.getPos(fd.from);
            const b = layout.getPos(fd.to);
            if (a && b) {
              arr[i * 3] = a.x + (b.x - a.x) * fd.t;
              arr[i * 3 + 1] = a.y + (b.y - a.y) * fd.t;
              arr[i * 3 + 2] = 0.1;
            }
          }
          flowParticles.geometry.attributes.position.needsUpdate = true;
        }

        // Empty state pulse
        if (emptySprite) {
          emptySprite.material.opacity = 0.4 + Math.sin(time * 2) * 0.2;
          if (nodeMeshes.size > 0) hideEmptyState();
        }

        renderer.render(scene, camera);
      }

      animate();

            const vib =
              Math.sin(angle * data.vibFreq + t * 3 + data.phase) * data.vibAmp;
            const vib2 =
              Math.cos(
                angle * (data.vibFreq + 1) + t * 2.3 + data.phase * 0.7,
              ) *
              data.vibAmp *
              0.5;
            x += vib * Math.cos(angle);
            y += vib * Math.sin(angle);
            z += vib2;
            const kkMod = 1 + 0.15 * Math.sin(angle * 3 + t * 1.5 + data.phase);
            x *= kkMod;
            y *= kkMod;
            pts[i].set(x, y, z);
          }
          curve.updateArcLengths();
          const newGeo = new THREE.TubeGeometry(
            curve,
            segments,
            data.minorR,
            5,
            true,
          );
          mesh.geometry.dispose();
          mesh.geometry = newGeo;
        });

        manifolds.forEach(({ mesh, speed, cfg }) => {
          mesh.rotation.x += speed;
          mesh.rotation.y += speed * 0.7;
          mesh.rotation.z += speed * 0.3;
          mesh.material.opacity =
            cfg.opacity + Math.sin(t * 2 + cfg.radius) * 0.03;
        });

        kkGroup.rotation.x = Math.sin(t * 0.08) * 0.3;
        kkGroup.rotation.y += 0.001;
        kkGroup.rotation.z = Math.cos(t * 0.06) * 0.15;

        for (let i = 0; i < NPARTS; i++) {
          const angle = pPhase[i] + t * pSpeed[i];
          const r = pRadius[i] + Math.sin(t * 1.5 + pPhase[i] * 3) * 2;
          const wobble = Math.sin(angle * 5 + t * 2) * 1.5;
          const ax = pAxis[i];
          if (ax === 0) {
            pPos[i * 3] = Math.cos(angle) * r;
            pPos[i * 3 + 1] = Math.sin(angle) * r + wobble;
            pPos[i * 3 + 2] = wobble * 0.5;
          } else if (ax === 1) {
            pPos[i * 3] = Math.cos(angle) * r;
            pPos[i * 3 + 1] = wobble * 0.5;
            pPos[i * 3 + 2] = Math.sin(angle) * r + wobble;
          } else {
            pPos[i * 3] = wobble * 0.5;
            pPos[i * 3 + 1] = Math.cos(angle) * r;
            pPos[i * 3 + 2] = Math.sin(angle) * r + wobble;
          }
        }
        pGeo.attributes.position.needsUpdate = true;

        camera.position.x = Math.sin(t * 0.1) * 12;
        camera.position.y = Math.cos(t * 0.07) * 8;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
      }
      kkAnimate();
    </script>
  </body>
</html>
