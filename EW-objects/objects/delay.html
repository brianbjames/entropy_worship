<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DELAY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
      #dly-scope {
        display: block;
        width: 100%;
        height: 120px;
        background: #0e0400;
      }
      .param-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .param-row .control-label {
        min-width: 80px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      #power-toggle .toggle-track.on .toggle-thumb {
        left: 22px;
      }
      #meta .toggle-wrap {
        align-self: center;
      }
      #meta .toggle-track {
        margin: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
      }
      .param-row .range-val {
        min-width: 72px;
        text-align: right;
      }
      .room-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        margin-bottom: 6px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        transition: border-color 0.14s, background 0.14s;
        cursor: pointer;
      }
      .room-entry:hover {
        border-color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
      }
      .room-entry-name {
        color: var(--accent);
      }
      .room-entry-info {
        font-size: 0.68rem;
        color: var(--dim);
        letter-spacing: 0.08em;
      }
      .mod-row {
        opacity: 0.3;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .mod-row.active {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "DLY-1",
        objectType: "delay",
        roomPrefix: "dly",
        inputs: [
          {
            port: "audio",
            type: "room",
            unit: "",
            default: null,
          },
          {
            port: "time",
            type: "number",
            unit: "s",
            min: 0.01,
            max: 2,
            default: 0.25,
          },
          {
            port: "feedback",
            type: "number",
            unit: "",
            min: 0,
            max: 0.95,
            default: 0.4,
          },
          {
            port: "wet",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 0.5,
          },
          {
            port: "gain",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 1,
          },
        ],
        outputs: [
          { port: "time", type: "number", unit: "s" },
          { port: "feedback", type: "number" },
          { port: "wet", type: "number" },
          { port: "gain", type: "number" },
          { port: "playing", type: "boolean" },
          { port: "outputMode", type: "string" },
        ],
      });

      // ── Delay state ────────────────────────────────────────────

      let baseTime = 0.25;
      let timeModDepth = 0.1;
      let baseGain = 1;
      let gainModDepth = 0.5;

      // ── Tone.js audio ──────────────────────────────────────────

      let delay = null;
      let gainNode = null;
      let analyser = null;
      let delayRunning = false;
      let audioReady = false;
      let outputMode = "audio";

      // Local source oscillator — created when a room is linked
      // to the audio input. Mirrors the remote oscillator's params.
      let sourceOsc = null;
      let sourceGain = null;
      let sourceConnected = false;

      // Modulation state
      let timeModOsc = null;
      let timeModGain = null;
      let timeModWanted = false;
      let timeModRemoteFreq = 2;
      let timeModRemoteType = "sine";

      let gainModOsc = null;
      let gainModGainNode = null;
      let gainModWanted = false;
      let gainModRemoteFreq = 2;
      let gainModRemoteType = "sine";

      async function ensureAudio() {
        if (audioReady) return;
        await Tone.start();
        delay = new Tone.FeedbackDelay({
          delayTime: baseTime,
          feedback: 0.4,
          wet: 0.5,
        });
        gainNode = new Tone.Gain(1);
        delay.connect(gainNode);
        applyOutputRouting();
        analyser = new Tone.Analyser("waveform", 256);
        delay.connect(analyser);
        audioReady = true;
      }

      // ── Time modulation ────────────────────────────────────────

      function connectTimeMod() {
        if (timeModOsc || !delay) return;
        timeModOsc = new Tone.Oscillator({ type: timeModRemoteType, frequency: timeModRemoteFreq });
        timeModGain = new Tone.Gain(timeModDepth);
        timeModOsc.connect(timeModGain);
        timeModGain.connect(delay.delayTime);
        timeModOsc.start();
        timeModWanted = true;
      }

      function disconnectTimeMod() {
        if (timeModOsc) {
          timeModOsc.stop(); timeModOsc.disconnect(); timeModOsc.dispose();
          timeModGain.disconnect(); timeModGain.dispose();
          timeModOsc = null; timeModGain = null;
        }
        timeModWanted = false;
      }

      // ── Gain modulation ────────────────────────────────────────

      function connectGainMod() {
        if (gainModOsc || !gainNode) return;
        gainModOsc = new Tone.Oscillator({ type: gainModRemoteType, frequency: gainModRemoteFreq });
        gainModGainNode = new Tone.Gain(gainModDepth);
        gainModOsc.connect(gainModGainNode);
        gainModGainNode.connect(gainNode.gain);
        gainModOsc.start();
        gainModWanted = true;
      }

      function disconnectGainMod() {
        if (gainModOsc) {
          gainModOsc.stop(); gainModOsc.disconnect(); gainModOsc.dispose();
          gainModGainNode.disconnect(); gainModGainNode.dispose();
          gainModOsc = null; gainModGainNode = null;
        }
        gainModWanted = false;
      }

      function reconnectModulators() {
        if (timeModWanted) {
          if (timeModOsc) { timeModOsc.stop(); timeModOsc.disconnect(); timeModOsc.dispose(); timeModGain.disconnect(); timeModGain.dispose(); }
          timeModOsc = null; timeModGain = null;
          connectTimeMod();
        }
        if (gainModWanted) {
          if (gainModOsc) { gainModOsc.stop(); gainModOsc.disconnect(); gainModOsc.dispose(); gainModGainNode.disconnect(); gainModGainNode.dispose(); }
          gainModOsc = null; gainModGainNode = null;
          connectGainMod();
        }
      }

      function applyOutputRouting() {
        if (!gainNode) return;
        gainNode.disconnect();
        if (outputMode === "audio" || outputMode === "both") {
          gainNode.toDestination();
        }
      }

      // ── Source oscillator (audio input from room) ──────────────

      function createSourceOsc(freq, type, gain) {
        if (sourceOsc) destroySourceOsc();
        sourceOsc = new Tone.Oscillator({ frequency: freq || 440, type: type || "sine" });
        sourceGain = new Tone.Gain(gain !== undefined ? gain : 0.5);
        sourceOsc.connect(sourceGain);
        sourceGain.connect(delay);
        if (delayRunning) sourceOsc.start();
        sourceConnected = true;
      }

      function destroySourceOsc() {
        if (sourceOsc) {
          try { sourceOsc.stop(); } catch (_) {}
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = null;
        }
        if (sourceGain) {
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = null;
        }
        sourceConnected = false;
      }

      async function startDelay() {
        if (delayRunning) return;
        await ensureAudio();
        if (sourceOsc) sourceOsc.start();
        delayRunning = true;
        reconnectModulators();
        updatePowerUI();
        ewObj.setOutput("playing", true, { immediate: true });
      }

      function stopDelay() {
        if (!delayRunning) return;
        if (sourceOsc) {
          const freq = sourceOsc.frequency.value;
          const type = sourceOsc.type;
          const gain = sourceGain ? sourceGain.gain.value : 0.5;
          sourceOsc.stop();
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = new Tone.Oscillator({ frequency: freq, type: type });
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = new Tone.Gain(gain);
          sourceOsc.connect(sourceGain);
          sourceGain.connect(delay);
        }
        delayRunning = false;
        reconnectModulators();
        updatePowerUI();
        ewObj.setOutput("playing", false, { immediate: true });
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "DELAY", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <select id="dly-output-mode" style="width:auto; padding:3px 24px 3px 8px">
          <option value="audio">AUDIO</option>
          <option value="control">CONTROL</option>
          <option value="both">BOTH</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls panel
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `
        <div class="param-row">
          <div class="control-label">TIME</div>
          <input type="range" id="dly-time" min="1" max="200" value="25" />
          <span class="range-val" id="dly-time-val">0.25 s</span>
        </div>

        <div class="param-row">
          <div class="control-label">FEEDBACK</div>
          <input type="range" id="dly-feedback" min="0" max="95" value="40" />
          <span class="range-val" id="dly-feedback-val">0.40</span>
        </div>

        <div class="param-row">
          <div class="control-label">WET</div>
          <input type="range" id="dly-wet" min="0" max="100" value="50" />
          <span class="range-val" id="dly-wet-val">0.50</span>
        </div>

        <div class="param-row">
          <div class="control-label">GAIN</div>
          <input type="range" id="dly-gain" min="0" max="100" value="100" />
          <span class="range-val" id="dly-gain-val">1.00</span>
        </div>

        <div style="border-top:1px solid var(--border); padding-top:14px; margin-top:4px">
          <div class="param-row mod-row" id="mod-time-row">
            <div class="control-label">TIME MOD</div>
            <input type="range" id="dly-time-mod-depth" min="0" max="100" value="10" />
            <span class="range-val" id="dly-time-mod-depth-val">0.10 s</span>
          </div>
          <div class="param-row mod-row" id="mod-gain-row">
            <div class="control-label">GM MOD</div>
            <input type="range" id="dly-gain-mod-depth" min="0" max="100" value="50" />
            <span class="range-val" id="dly-gain-mod-depth-val">0.50</span>
          </div>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="dly-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms panel
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE DELAYS //</div>
        <div id="rooms-list">
          <span class="type-dim">NO OTHER DELAYS AVAILABLE</span>
        </div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Wire controls ──────────────────────────────────────────

      function updatePowerUI() {
        const track = document.getElementById("power-track");
        track.classList.toggle("on", delayRunning);
      }

      document.getElementById("power-toggle").addEventListener("click", () => {
        if (delayRunning) stopDelay(); else startDelay();
      });

      // Output mode
      document.getElementById("dly-output-mode").addEventListener("change", (e) => {
        outputMode = e.target.value;
        applyOutputRouting();
        ewObj.setOutput("outputMode", outputMode, { immediate: true });
      });

      // Time slider (0.01–2s, mapped from 1–200)
      wireRange("dly-time", "dly-time-val", (v) => (v / 100).toFixed(2) + " s");
      document.getElementById("dly-time").addEventListener("input", (e) => {
        const time = +e.target.value / 100;
        baseTime = time;
        if (delay) delay.delayTime.rampTo(time, 0.01);
        ewObj.setOutput("time", Math.round(time * 100) / 100, { unit: "s" });
        refreshStats();
      });

      // Feedback slider (0–0.95, mapped from 0–95)
      wireRange("dly-feedback", "dly-feedback-val", (v) => (v / 100).toFixed(2));
      document.getElementById("dly-feedback").addEventListener("input", (e) => {
        const fb = +e.target.value / 100;
        if (delay) delay.feedback.rampTo(fb, 0.01);
        ewObj.setOutput("feedback", Math.round(fb * 100) / 100);
        refreshStats();
      });

      // Wet slider
      wireRange("dly-wet", "dly-wet-val", (v) => (v / 100).toFixed(2));
      document.getElementById("dly-wet").addEventListener("input", (e) => {
        const wet = +e.target.value / 100;
        if (delay) delay.wet.value = wet;
        ewObj.setOutput("wet", Math.round(wet * 100) / 100);
        refreshStats();
      });

      // Gain slider
      wireRange("dly-gain", "dly-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("dly-gain").addEventListener("input", (e) => {
        const gain = +e.target.value / 100;
        baseGain = gain;
        if (gainNode) gainNode.gain.rampTo(gain, 0.01);
        ewObj.setOutput("gain", Math.round(gain * 100) / 100);
        refreshStats();
      });

      // Mod depth sliders
      wireRange("dly-time-mod-depth", "dly-time-mod-depth-val", (v) => (v / 100).toFixed(2) + " s");
      document.getElementById("dly-time-mod-depth").addEventListener("input", (e) => {
        timeModDepth = +e.target.value / 100;
        if (timeModGain) timeModGain.gain.rampTo(timeModDepth, 0.01);
      });

      wireRange("dly-gain-mod-depth", "dly-gain-mod-depth-val", (v) => (v / 100).toFixed(2));
      document.getElementById("dly-gain-mod-depth").addEventListener("input", (e) => {
        gainModDepth = +e.target.value / 100;
        if (gainModGainNode) gainModGainNode.gain.rampTo(gainModDepth, 0.01);
      });

      // ── Input signal handling ──────────────────────────────────

      // Audio input — creates a local oscillator mirroring the remote
      // source and routes it through the delay chain.
      ewObj.onInput("audio", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;
        if (!delay) return;

        // Sync source oscillator params from the remote room
        if (meta && meta.port === "frequency" && typeof value === "number") {
          if (!sourceConnected) {
            createSourceOsc(value, "sine", 0.5);
          } else if (sourceOsc) {
            sourceOsc.frequency.value = value;
          }
        } else if (meta && meta.port === "waveform" && typeof value === "string") {
          if (sourceOsc) { try { sourceOsc.type = value; } catch (_) {} }
        } else if (meta && meta.port === "gain" && typeof value === "number") {
          if (sourceGain) sourceGain.gain.value = Math.max(0, Math.min(1, value));
        } else if (meta && meta.port === "detune" && typeof value === "number") {
          if (sourceOsc) sourceOsc.detune.value = value;
        } else if (meta && meta.port === "playing" && typeof value === "boolean") {
          if (value && sourceConnected && !delayRunning) startDelay();
        }
      });

      ewObj.on("inputConnected", ({ room, portMapping }) => {
        ensureAudio().then(() => {
          for (const localPort of Object.values(portMapping)) {
            if (localPort === "audio" && !sourceConnected) {
              createSourceOsc(440, "sine", 0.5);
            }
            if (localPort === "time") connectTimeMod();
            if (localPort === "gain") connectGainMod();
          }
          updateModRowStates();
        });
      });

      ewObj.on("inputDisconnected", ({ room }) => {
        const subs = ewObj.getSubscriptions();
        const activePorts = new Set();
        for (const sub of subs) {
          for (const local of Object.values(sub.portMapping)) activePorts.add(local);
        }
        if (!activePorts.has("audio")) destroySourceOsc();
        if (!activePorts.has("time")) disconnectTimeMod();
        if (!activePorts.has("gain")) disconnectGainMod();
        updateModRowStates();
      });

      ewObj.onInput("time", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseTime + value * timeModDepth;
          const clamped = Math.max(0.01, Math.min(2, modulated));
          if (delay) delay.delayTime.rampTo(clamped, 0.012);
          return;
        }

        if (timeModWanted) {
          if (meta && meta.port === "frequency" && typeof value === "number") {
            timeModRemoteFreq = value;
            if (timeModOsc) timeModOsc.frequency.value = value;
          } else if (meta && meta.port === "waveform" && typeof value === "string") {
            timeModRemoteType = value;
            if (timeModOsc) { try { timeModOsc.type = value; } catch (_) {} }
          }
          return;
        }

        // Direct time set
        if (typeof value === "number") {
          const clamped = Math.max(0.01, Math.min(2, value));
          baseTime = clamped;
          if (delay) delay.delayTime.rampTo(clamped, 0.01);
          document.getElementById("dly-time").value = Math.round(clamped * 100);
          document.getElementById("dly-time-val").textContent = clamped.toFixed(2) + " s";
          ewObj.setOutput("time", clamped, { unit: "s" });
          refreshStats();
        }
      });

      ewObj.onInput("feedback", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;

        if (typeof value === "number") {
          const clamped = Math.max(0, Math.min(0.95, value));
          if (delay) delay.feedback.rampTo(clamped, 0.01);
          document.getElementById("dly-feedback").value = Math.round(clamped * 100);
          document.getElementById("dly-feedback-val").textContent = clamped.toFixed(2);
          ewObj.setOutput("feedback", clamped);
          refreshStats();
        }
      });

      ewObj.onInput("wet", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;

        if (typeof value === "number") {
          const clamped = Math.max(0, Math.min(1, value));
          if (delay) delay.wet.value = clamped;
          document.getElementById("dly-wet").value = Math.round(clamped * 100);
          document.getElementById("dly-wet-val").textContent = clamped.toFixed(2);
          ewObj.setOutput("wet", clamped);
          refreshStats();
        }
      });

      ewObj.onInput("gain", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseGain + value * gainModDepth;
          const clamped = Math.max(0, Math.min(1, modulated));
          if (gainNode) gainNode.gain.rampTo(clamped, 0.012);
          return;
        }

        if (gainModWanted) {
          if (meta && meta.port === "frequency" && typeof value === "number") {
            gainModRemoteFreq = value;
            if (gainModOsc) gainModOsc.frequency.value = value;
          } else if (meta && meta.port === "waveform" && typeof value === "string") {
            gainModRemoteType = value;
            if (gainModOsc) { try { gainModOsc.type = value; } catch (_) {} }
          }
          return;
        }

        if (typeof value === "number") {
          const clamped = Math.max(0, Math.min(1, value));
          baseGain = clamped;
          if (gainNode) gainNode.gain.rampTo(clamped, 0.01);
          document.getElementById("dly-gain").value = Math.round(clamped * 100);
          document.getElementById("dly-gain-val").textContent = clamped.toFixed(2);
          ewObj.setOutput("gain", clamped);
          refreshStats();
        }
      });

      // Room state sync
      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !delayRunning) await startDelay();
        else if (!value && delayRunning) stopDelay();
      });

      ewObj.onInput("outputMode", (value) => {
        if (typeof value !== "string") return;
        if (["audio", "control", "both"].includes(value)) {
          outputMode = value;
          document.getElementById("dly-output-mode").value = value;
          applyOutputRouting();
        }
      });

      // ── Modulator connect/disconnect ───────────────────────────

      function updateModRowStates() {
        document.getElementById("mod-time-row").classList.toggle("active", timeModWanted);
        document.getElementById("mod-gain-row").classList.toggle("active", gainModWanted);
      }

      // ── Output stats ───────────────────────────────────────────

      function refreshStats() {
        updateOutputStats(ewObj, [
          { port: "time", label: "TIME", unit: " s", formatter: (v) => v !== undefined ? v.toFixed(2) : "\u2014" },
          { port: "feedback", label: "FB", formatter: (v) => v !== undefined ? v.toFixed(2) : "\u2014" },
          { port: "wet", label: "WET", formatter: (v) => v !== undefined ? v.toFixed(2) : "\u2014" },
          { port: "gain", label: "GAIN", formatter: (v) => v !== undefined ? v.toFixed(2) : "\u2014" },
        ]);
      }

      // ── Scope ──────────────────────────────────────────────────

      const scopeCanvas = document.getElementById("dly-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);
        const w = scopeCanvas.width;
        const h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }

        // Center line
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        if (!analyser || !delayRunning) return;

        const data = analyser.getValue();
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210, 210, 210, 0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const x = (i / data.length) * w;
          const y = ((1 - data[i]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      // ── Room UI ────────────────────────────────────────────────

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        ewObj.setPrivate(roomPrivate);
        updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false;
        updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });

      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER DELAYS AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " \u00b7 " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // ── Initialize ─────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);

        ewObj._outputValues["time"] = 0.25;
        ewObj._outputValues["feedback"] = 0.4;
        ewObj._outputValues["wet"] = 0.5;
        ewObj._outputValues["gain"] = 1;
        ewObj._outputValues["playing"] = false;
        ewObj._outputValues["outputMode"] = "audio";

        refreshStats();
        resizeScope();
        drawScope();
      })();

      window.addEventListener("resize", resizeScope);
    </script>
  </body>
</html>
