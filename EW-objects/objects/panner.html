<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PANNER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
      #pan-scope {
        display: block;
        width: 100%;
        height: 120px;
        background: #0e0400;
      }
      .param-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .param-row .control-label {
        min-width: 80px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      #power-toggle .toggle-track.on .toggle-thumb {
        left: 22px;
      }
      #meta .toggle-wrap {
        align-self: center;
      }
      #meta .toggle-track {
        margin: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
      }
      .param-row .range-val {
        min-width: 72px;
        text-align: right;
      }
      .room-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        margin-bottom: 6px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        transition: border-color 0.14s, background 0.14s;
        cursor: pointer;
      }
      .room-entry:hover {
        border-color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
      }
      .room-entry-name {
        color: var(--accent);
      }
      .room-entry-info {
        font-size: 0.68rem;
        color: var(--dim);
        letter-spacing: 0.08em;
      }
      .mode-dependent {
        transition: opacity 0.2s;
      }
      .mode-dependent.disabled {
        opacity: 0.3;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // -- EWObject instance ------------------------------------------

      const ewObj = new EWObject({
        name: "PAN-1",
        objectType: "panner",
        roomPrefix: "pan",
        inputs: [
          {
            port: "audio",
            type: "room",
            unit: "",
            default: null,
          },
          {
            port: "pan",
            type: "number",
            unit: "",
            min: -1,
            max: 1,
            default: 0,
          },
          {
            port: "rate",
            type: "number",
            unit: "hz",
            min: 0.01,
            max: 20,
            default: 1,
          },
          {
            port: "depth",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 1,
          },
        ],
        outputs: [
          { port: "pan", type: "number" },
          { port: "rate", type: "number", unit: "hz" },
          { port: "depth", type: "number" },
          { port: "mode", type: "string" },
          { port: "playing", type: "boolean" },
          { port: "outputMode", type: "string" },
        ],
      });

      // -- Panner state -----------------------------------------------

      let panMode = "manual"; // "manual" | "auto"
      let basePan = 0;
      let baseRate = 1;
      let baseDepth = 1;
      let baseGain = 1;

      // -- Tone.js audio ----------------------------------------------

      let panner = null;       // Tone.Panner (manual mode)
      let autoPanner = null;   // Tone.AutoPanner (auto mode)
      let gainNode = null;
      let analyser = null;
      let pannerRunning = false;
      let audioReady = false;
      let outputMode = "audio";

      // Source oscillator (audio input from room)
      let sourceOsc = null;
      let sourceGain = null;
      let sourceConnected = false;

      async function ensureAudio() {
        if (audioReady) return;
        await Tone.start();
        panner = new Tone.Panner(basePan);
        autoPanner = new Tone.AutoPanner({ frequency: baseRate, depth: baseDepth }).stop();
        gainNode = new Tone.Gain(baseGain);
        // Default chain: source -> panner -> gainNode -> destination
        panner.connect(gainNode);
        applyOutputRouting();
        analyser = new Tone.Analyser("waveform", 256);
        gainNode.connect(analyser);
        audioReady = true;
      }

      function getActiveEffect() {
        return panMode === "manual" ? panner : autoPanner;
      }

      function applyOutputRouting() {
        if (!gainNode) return;
        gainNode.disconnect();
        if (outputMode === "audio" || outputMode === "both") {
          gainNode.toDestination();
        }
      }

      function switchMode(newMode) {
        if (newMode === panMode) return;
        if (!audioReady) { panMode = newMode; updateModeUI(); return; }

        // Disconnect source from old effect
        if (sourceGain) sourceGain.disconnect();

        // Disconnect old effect from gainNode
        panner.disconnect();
        autoPanner.disconnect();
        if (panMode === "auto" && pannerRunning) autoPanner.stop();

        panMode = newMode;

        // Connect new effect
        if (panMode === "manual") {
          panner.connect(gainNode);
          if (sourceGain) sourceGain.connect(panner);
        } else {
          autoPanner.connect(gainNode);
          if (sourceGain) sourceGain.connect(autoPanner);
          if (pannerRunning) autoPanner.start();
        }

        updateModeUI();
        ewObj.setOutput("mode", panMode, { immediate: true });
      }

      // -- Source oscillator (audio input from room) ------------------

      function createSourceOsc(freq, type, gain) {
        if (sourceOsc) destroySourceOsc();
        sourceOsc = new Tone.Oscillator({ frequency: freq || 440, type: type || "sine" });
        sourceGain = new Tone.Gain(gain !== undefined ? gain : 0.5);
        sourceOsc.connect(sourceGain);
        sourceGain.connect(getActiveEffect());
        if (pannerRunning) sourceOsc.start();
        sourceConnected = true;
      }

      function destroySourceOsc() {
        if (sourceOsc) {
          try { sourceOsc.stop(); } catch (_) {}
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = null;
        }
        if (sourceGain) {
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = null;
        }
        sourceConnected = false;
      }

      async function startPanner() {
        if (pannerRunning) return;
        await ensureAudio();
        if (sourceOsc) sourceOsc.start();
        if (panMode === "auto") autoPanner.start();
        pannerRunning = true;
        updatePowerUI();
        ewObj.setOutput("playing", true, { immediate: true });
      }

      function stopPanner() {
        if (!pannerRunning) return;
        if (sourceOsc) {
          const freq = sourceOsc.frequency.value;
          const type = sourceOsc.type;
          const gain = sourceGain ? sourceGain.gain.value : 0.5;
          sourceOsc.stop();
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = new Tone.Oscillator({ frequency: freq, type: type });
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = new Tone.Gain(gain);
          sourceOsc.connect(sourceGain);
          sourceGain.connect(getActiveEffect());
        }
        if (panMode === "auto") autoPanner.stop();
        pannerRunning = false;
        updatePowerUI();
        ewObj.setOutput("playing", false, { immediate: true });
      }

      // -- Build UI ---------------------------------------------------

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "PANNER", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <select id="pan-output-mode" style="width:auto; padding:3px 24px 3px 8px">
          <option value="audio">AUDIO</option>
          <option value="control">CONTROL</option>
          <option value="both">BOTH</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls panel
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `
        <div class="control-group">
          <div class="control-label">MODE</div>
          <select id="pan-mode">
            <option value="manual">MANUAL</option>
            <option value="auto">AUTO</option>
          </select>
        </div>

        <div class="param-row mode-dependent" id="row-pan" data-mode="manual">
          <div class="control-label">PAN</div>
          <input type="range" id="pan-pos" min="-100" max="100" value="0" />
          <span class="range-val" id="pan-pos-val">0.00</span>
        </div>

        <div class="param-row mode-dependent disabled" id="row-rate" data-mode="auto">
          <div class="control-label">RATE</div>
          <input type="range" id="pan-rate" min="0" max="1000" value="500" />
          <span class="range-val" id="pan-rate-val">1.00 Hz</span>
        </div>

        <div class="param-row mode-dependent disabled" id="row-depth" data-mode="auto">
          <div class="control-label">DEPTH</div>
          <input type="range" id="pan-depth" min="0" max="100" value="100" />
          <span class="range-val" id="pan-depth-val">1.00</span>
        </div>

        <div class="param-row">
          <div class="control-label">GAIN</div>
          <input type="range" id="pan-gain" min="0" max="100" value="100" />
          <span class="range-val" id="pan-gain-val">1.00</span>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="pan-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms panel
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE PANNERS //</div>
        <div id="rooms-list">
          <span class="type-dim">NO OTHER PANNERS AVAILABLE</span>
        </div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // -- Wire controls ----------------------------------------------

      function updatePowerUI() {
        const track = document.getElementById("power-track");
        track.classList.toggle("on", pannerRunning);
      }

      function updateModeUI() {
        document.querySelectorAll(".mode-dependent").forEach((el) => {
          const mode = el.getAttribute("data-mode");
          el.classList.toggle("disabled", mode !== panMode);
        });
        document.getElementById("pan-mode").value = panMode;
      }

      document.getElementById("power-toggle").addEventListener("click", () => {
        if (pannerRunning) stopPanner(); else startPanner();
      });

      // Mode select
      document.getElementById("pan-mode").addEventListener("change", (e) => {
        switchMode(e.target.value);
        refreshStats();
      });

      // Output mode
      document.getElementById("pan-output-mode").addEventListener("change", (e) => {
        outputMode = e.target.value;
        applyOutputRouting();
        ewObj.setOutput("outputMode", outputMode, { immediate: true });
      });

      // Pan position slider (-1 to +1, mapped from -100 to 100)
      wireRange("pan-pos", "pan-pos-val", (v) => (v / 100).toFixed(2));
      document.getElementById("pan-pos").addEventListener("input", (e) => {
        const pan = +e.target.value / 100;
        basePan = pan;
        if (panner) panner.pan.rampTo(pan, 0.01);
        ewObj.setOutput("pan", Math.round(pan * 100) / 100);
        refreshStats();
      });

      // Rate slider (logarithmic 0.01 to 20 Hz, mapped from 0 to 1000)
      const RATE_MIN = 0.01;
      const RATE_MAX = 20;
      const RATE_LOG_MIN = Math.log(RATE_MIN);
      const RATE_LOG_MAX = Math.log(RATE_MAX);

      function sliderToRate(val) {
        return Math.exp(RATE_LOG_MIN + (val / 1000) * (RATE_LOG_MAX - RATE_LOG_MIN));
      }

      function rateToSlider(rate) {
        return Math.round(((Math.log(rate) - RATE_LOG_MIN) / (RATE_LOG_MAX - RATE_LOG_MIN)) * 1000);
      }

      function formatRate(val) {
        const rate = sliderToRate(val);
        return rate.toFixed(2) + " Hz";
      }

      const rateSlider = document.getElementById("pan-rate");
      const rateVal = document.getElementById("pan-rate-val");
      rateSlider.value = rateToSlider(baseRate);

      rateSlider.addEventListener("input", () => {
        const rate = sliderToRate(+rateSlider.value);
        baseRate = rate;
        rateVal.textContent = formatRate(+rateSlider.value);
        const pct = (+rateSlider.value / 1000) * 100;
        rateSlider.style.setProperty("--val", pct + "%");
        if (autoPanner) autoPanner.frequency.rampTo(rate, 0.01);
        ewObj.setOutput("rate", Math.round(rate * 100) / 100, { unit: "hz" });
        refreshStats();
      });
      (() => {
        const pct = (+rateSlider.value / 1000) * 100;
        rateSlider.style.setProperty("--val", pct + "%");
      })();

      // Depth slider
      wireRange("pan-depth", "pan-depth-val", (v) => (v / 100).toFixed(2));
      document.getElementById("pan-depth").addEventListener("input", (e) => {
        const depth = +e.target.value / 100;
        baseDepth = depth;
        if (autoPanner) autoPanner.depth.rampTo(depth, 0.01);
        ewObj.setOutput("depth", Math.round(depth * 100) / 100);
        refreshStats();
      });

      // Gain slider
      wireRange("pan-gain", "pan-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("pan-gain").addEventListener("input", (e) => {
        const gain = +e.target.value / 100;
        baseGain = gain;
        if (gainNode) gainNode.gain.rampTo(gain, 0.01);
        ewObj.setOutput("gain", Math.round(gain * 100) / 100);
        refreshStats();
      });

      // -- Input signal handling --------------------------------------

      ewObj.onInput("audio", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;
        if (!audioReady) return;

        if (meta && meta.port === "frequency" && typeof value === "number") {
          if (!sourceConnected) {
            createSourceOsc(value, "sine", 0.5);
          } else if (sourceOsc) {
            sourceOsc.frequency.value = value;
          }
        } else if (meta && meta.port === "waveform" && typeof value === "string") {
          if (sourceOsc) { try { sourceOsc.type = value; } catch (_) {} }
        } else if (meta && meta.port === "gain" && typeof value === "number") {
          if (sourceGain) sourceGain.gain.value = Math.max(0, Math.min(1, value));
        } else if (meta && meta.port === "detune" && typeof value === "number") {
          if (sourceOsc) sourceOsc.detune.value = value;
        } else if (meta && meta.port === "playing" && typeof value === "boolean") {
          if (value && sourceConnected && !pannerRunning) startPanner();
        }
      });

      ewObj.on("inputConnected", ({ room, portMapping }) => {
        ensureAudio().then(() => {
          for (const localPort of Object.values(portMapping)) {
            if (localPort === "audio" && !sourceConnected) {
              createSourceOsc(440, "sine", 0.5);
            }
          }
        });
      });

      ewObj.on("inputDisconnected", ({ room }) => {
        const subs = ewObj.getSubscriptions();
        const activePorts = new Set();
        for (const sub of subs) {
          for (const local of Object.values(sub.portMapping)) activePorts.add(local);
        }
        if (!activePorts.has("audio")) destroySourceOsc();
      });

      ewObj.onInput("pan", (value, meta) => {
        if (typeof value !== "number") return;
        if (meta && meta.unit === "bipolar") {
          // Bipolar signal: map directly to pan position
          const clamped = Math.max(-1, Math.min(1, value));
          if (panner) panner.pan.rampTo(clamped, 0.012);
          return;
        }
        const clamped = Math.max(-1, Math.min(1, value));
        basePan = clamped;
        if (panner) panner.pan.rampTo(clamped, 0.01);
        document.getElementById("pan-pos").value = Math.round(clamped * 100);
        document.getElementById("pan-pos-val").textContent = clamped.toFixed(2);
        ewObj.setOutput("pan", clamped);
        refreshStats();
      });

      ewObj.onInput("rate", (value, meta) => {
        if (typeof value !== "number") return;
        const clamped = Math.max(0.01, Math.min(20, value));
        baseRate = clamped;
        if (autoPanner) autoPanner.frequency.rampTo(clamped, 0.01);
        rateSlider.value = rateToSlider(clamped);
        rateVal.textContent = clamped.toFixed(2) + " Hz";
        const pct = (+rateSlider.value / 1000) * 100;
        rateSlider.style.setProperty("--val", pct + "%");
        ewObj.setOutput("rate", clamped, { unit: "hz" });
        refreshStats();
      });

      ewObj.onInput("depth", (value, meta) => {
        if (typeof value !== "number") return;
        const clamped = Math.max(0, Math.min(1, value));
        baseDepth = clamped;
        if (autoPanner) autoPanner.depth.rampTo(clamped, 0.01);
        document.getElementById("pan-depth").value = Math.round(clamped * 100);
        document.getElementById("pan-depth-val").textContent = clamped.toFixed(2);
        ewObj.setOutput("depth", clamped);
        refreshStats();
      });

      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !pannerRunning) await startPanner();
        else if (!value && pannerRunning) stopPanner();
      });

      ewObj.onInput("outputMode", (value) => {
        if (typeof value !== "string") return;
        if (["audio", "control", "both"].includes(value)) {
          outputMode = value;
          document.getElementById("pan-output-mode").value = value;
          applyOutputRouting();
        }
      });

      // -- Output stats -----------------------------------------------

      function refreshStats() {
        updateOutputStats(ewObj, [
          { port: "pan", label: "PAN", formatter: (v) => v !== undefined ? v.toFixed(2) : "0.00" },
          { port: "mode", label: "MODE", formatter: (v) => v ? v.toUpperCase() : "MANUAL" },
          { port: "rate", label: "RATE", unit: " Hz", formatter: (v) => v !== undefined ? v.toFixed(2) : "---" },
          { port: "depth", label: "DEPTH", formatter: (v) => v !== undefined ? v.toFixed(2) : "---" },
        ]);
      }

      // -- Scope ------------------------------------------------------

      const scopeCanvas = document.getElementById("pan-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);
        const w = scopeCanvas.width;
        const h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }

        // Center line
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        if (!analyser || !pannerRunning) return;

        const data = analyser.getValue();
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210, 210, 210, 0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const x = (i / data.length) * w;
          const y = ((1 - data[i]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      // -- Room UI ----------------------------------------------------

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        ewObj.setPrivate(roomPrivate);
        updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false;
        updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });

      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER PANNERS AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // -- Initialize -------------------------------------------------

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);

        ewObj._outputValues["pan"] = 0;
        ewObj._outputValues["rate"] = 1;
        ewObj._outputValues["depth"] = 1;
        ewObj._outputValues["mode"] = "manual";
        ewObj._outputValues["playing"] = false;
        ewObj._outputValues["outputMode"] = "audio";

        refreshStats();
        resizeScope();
        drawScope();
      })();

      window.addEventListener("resize", resizeScope);
    </script>
  </body>
</html>
