<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSCILLATOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
      /* ── Oscillator-specific styles ─────────────────────────── */
      #osc-scope {
        display: block;
        width: 100%;
        height: 120px;
        background: #0e0400;
      }

      .param-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .param-row .control-label {
        min-width: 80px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      #power-toggle .toggle-track.on .toggle-thumb {
        left: 22px;
      }
      #meta .toggle-wrap {
        align-self: center;
      }
      #meta .toggle-track {
        margin: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
      }
      .param-row .range-val {
        min-width: 72px;
        text-align: right;
      }
      .room-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        margin-bottom: 6px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        transition: border-color 0.14s, background 0.14s;
        cursor: pointer;
      }
      .room-entry:hover {
        border-color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
      }
      .room-entry-name {
        color: var(--accent);
      }
      .room-entry-info {
        font-size: 0.68rem;
        color: var(--dim);
        letter-spacing: 0.08em;
      }
      .mod-row {
        opacity: 0.3;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .mod-row.active {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <!-- ── Grid overlay ── -->
    <div id="grid-bg"></div>
    <!-- ── Scanline overlay ── -->
    <div id="scanlines"></div>

    <!-- ── App ─────────────────────────────────────────────────── -->
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "OSC-1",
        objectType: "oscillator",
        roomPrefix: "osc",
        inputs: [
          {
            port: "frequency",
            type: "number",
            unit: "hz",
            min: 20,
            max: 20000,
            default: 440,
          },
          {
            port: "detune",
            type: "number",
            unit: "cents",
            min: -1200,
            max: 1200,
            default: 0,
          },
          {
            port: "gain",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 0.5,
          },
          {
            port: "waveform",
            type: "enum",
            values: ["sine", "sawtooth", "triangle", "square"],
            default: "sine",
          },
        ],
        outputs: [
          { port: "signal", type: "number", unit: "bipolar" },
          { port: "frequency", type: "number", unit: "hz" },
          { port: "detune", type: "number", unit: "cents" },
          { port: "waveform", type: "string" },
          { port: "gain", type: "number" },
          { port: "playing", type: "boolean" },
          { port: "outputMode", type: "string" },
          { port: "modChain", type: "object" },
        ],
      });

      // ── FM modulation state ────────────────────────────────────
      // When another oscillator's signal arrives on the frequency
      // input, it modulates this oscillator's frequency around its
      // base value. The incoming bipolar signal (-1..+1) is scaled
      // by fmDepth (in Hz).
      let baseFrequency = 440; // center frequency set by the slider
      let fmDepth = 200; // modulation depth in Hz
      let baseDetune = 0; // center detune set by the slider
      let detuneModDepth = 400; // modulation depth in cents
      let baseGain = 0.5; // center gain set by the slider
      let gainModDepth = 0.5; // modulation depth (0-1 range)
      const waveforms = ["sine", "sawtooth", "triangle", "square"];

      // ── Tone.js audio ──────────────────────────────────────────

      let osc = null;
      let gainNode = null;
      let analyser = null;
      let fftAnalyser = null;
      let oscRunning = false;
      let audioReady = false;
      let outputMode = "audio"; // "audio" | "control" | "both"

      // Local modulator oscillators — created when a room signal is
      // linked to an input. These run at audio rate inside Web Audio,
      // with their parameters synced from the remote room.
      let fmModOsc = null; // modulates osc.frequency
      let fmModGain = null; // scales modulator output by fmDepth
      let detuneModOsc = null;
      let detuneModGain = null;
      let gainModOsc = null;
      let gainModGainNode = null;

      // Track which modulator connections are wanted (survive stop/start)
      let fmModWanted = false;
      let detuneModWanted = false;
      let gainModWanted = false;
      // Store remote modulator params to restore after reconnect
      let fmModRemoteFreq = 2;
      let fmModRemoteType = "sine";
      let detuneModRemoteFreq = 2;
      let detuneModRemoteType = "sine";
      let gainModRemoteFreq = 2;
      let gainModRemoteType = "sine";

      async function ensureAudio() {
        if (audioReady) return;
        await Tone.start();
        gainNode = new Tone.Gain(0.5);
        applyOutputRouting();
        osc = new Tone.Oscillator({
          frequency: 440,
          type: "sine",
        }).connect(gainNode);
        analyser = new Tone.Analyser("waveform", 256);
        osc.connect(analyser);
        fftAnalyser = new Tone.Analyser("fft", 1024);
        osc.connect(fftAnalyser);
        audioReady = true;
      }

      // Build a modulation chain from a descriptor and connect it
      // to a Tone.js Signal (e.g. osc.frequency).
      // A chain descriptor looks like:
      //   { freq: 440, type: "sine", depth: 200, mod: { freq: 4, type: "sine", depth: 100, mod: null } }
      // Each level creates an oscillator→gain chain, where the inner
      // level modulates the outer level's frequency — all at audio rate.
      function buildModChain(desc, targetSignal, level = 0) {
        if (!desc) return null;
        const modOsc = new Tone.Oscillator({ type: desc.type || "sine", frequency: desc.freq || 2 });
        const modGain = new Tone.Gain(desc.depth || 200);
        modOsc.connect(modGain);
        modGain.connect(targetSignal);
        modOsc.start();
        // Build inner chain AFTER starting this oscillator
        let inner = null;
        if (desc.mod) {
          inner = buildModChain(desc.mod, modOsc.frequency, level + 1);
        }
        return { modOsc, modGain, inner };
      }

      function destroyModChain(chain) {
        if (!chain) return;
        if (chain.inner) destroyModChain(chain.inner);
        chain.modOsc.stop();
        chain.modOsc.disconnect();
        chain.modOsc.dispose();
        chain.modGain.disconnect();
        chain.modGain.dispose();
      }

      // Get the current modulation chain descriptor for broadcasting.
      // This lets downstream oscillators recreate the full FM chain locally.
      function getModChainDesc() {
        if (!fmModWanted) return null;
        return {
          freq: fmModRemoteFreq,
          type: fmModRemoteType,
          depth: fmDepth,
          mod: fmModUpstreamChain, // nested chain from upstream
        };
      }

      // Broadcast modChain whenever it changes so downstream can rebuild
      function broadcastModChain() {
        const desc = getModChainDesc();
        ewObj.setOutput("modChain", desc, { immediate: true });
      }

      // Update an existing mod chain's parameters in-place (no rebuild).
      // This avoids clicks from destroying/recreating audio nodes.
      function updateModChainParams(chain, desc) {
        if (!chain || !desc) return;
        chain.modOsc.frequency.value = desc.freq || 2;
        try { chain.modOsc.type = desc.type || "sine"; } catch (_) {}
        chain.modGain.gain.value = desc.depth || 200;
        if (chain.inner && desc.mod) {
          updateModChainParams(chain.inner, desc.mod);
        } else if (!chain.inner && desc.mod) {
          // New inner level appeared — need to rebuild
          chain.inner = buildModChain(desc.mod, chain.modOsc.frequency);
        } else if (chain.inner && !desc.mod) {
          // Inner level removed
          destroyModChain(chain.inner);
          chain.inner = null;
        }
      }

      // FM modulator chain state
      let fmModChain = null; // the built audio chain
      let fmModUpstreamChain = null; // upstream chain descriptor (from remote)

      function connectFMMod() {
        if (fmModChain || !osc) return;
        const desc = {
          freq: fmModRemoteFreq,
          type: fmModRemoteType,
          depth: fmDepth,
          mod: fmModUpstreamChain,
        };
        fmModChain = buildModChain(desc, osc.frequency);
        fmModWanted = true;
        broadcastModChain();
      }

      function disconnectFMMod() {
        if (fmModChain) {
          destroyModChain(fmModChain);
          fmModChain = null;
        }
        fmModWanted = false;
        fmModUpstreamChain = null;
        broadcastModChain();
      }

      // Rebuild the FM chain (e.g. when upstream chain changes or params update)
      function rebuildFMMod() {
        if (!fmModWanted || !osc) return;
        if (fmModChain) {
          destroyModChain(fmModChain);
          fmModChain = null;
        }
        const desc = {
          freq: fmModRemoteFreq,
          type: fmModRemoteType,
          depth: fmDepth,
          mod: fmModUpstreamChain,
        };
        fmModChain = buildModChain(desc, osc.frequency);
        broadcastModChain();
      }

      function connectDetuneMod() {
        if (detuneModOsc || !osc) return;
        const desc = { freq: detuneModRemoteFreq, type: detuneModRemoteType, depth: detuneModDepth, mod: null };
        const chain = buildModChain(desc, osc.detune);
        detuneModOsc = chain.modOsc;
        detuneModGain = chain.modGain;
        detuneModWanted = true;
      }

      function disconnectDetuneMod() {
        if (detuneModOsc) {
          // Find full chain to destroy — for simplicity, detune/gain don't cascade
          detuneModOsc.stop();
          detuneModOsc.disconnect();
          detuneModOsc.dispose();
          detuneModGain.disconnect();
          detuneModGain.dispose();
          detuneModOsc = null;
          detuneModGain = null;
        }
        detuneModWanted = false;
      }

      function connectGainMod() {
        if (gainModOsc || !gainNode) return;
        const desc = { freq: gainModRemoteFreq, type: gainModRemoteType, depth: gainModDepth, mod: null };
        const chain = buildModChain(desc, gainNode.gain);
        gainModOsc = chain.modOsc;
        gainModGainNode = chain.modGain;
        gainModWanted = true;
      }

      function disconnectGainMod() {
        if (gainModOsc) {
          gainModOsc.stop();
          gainModOsc.disconnect();
          gainModOsc.dispose();
          gainModGainNode.disconnect();
          gainModGainNode.dispose();
          gainModOsc = null;
          gainModGainNode = null;
        }
        gainModWanted = false;
      }

      // Reconnect all wanted modulators to the current osc/gainNode.
      function reconnectModulators() {
        if (fmModWanted) {
          if (fmModChain) destroyModChain(fmModChain);
          fmModChain = null;
          connectFMMod();
        }
        if (detuneModWanted) {
          if (detuneModOsc) {
            detuneModOsc.stop(); detuneModOsc.disconnect(); detuneModOsc.dispose();
            detuneModGain.disconnect(); detuneModGain.dispose();
          }
          detuneModOsc = null; detuneModGain = null;
          connectDetuneMod();
        }
        if (gainModWanted) {
          if (gainModOsc) {
            gainModOsc.stop(); gainModOsc.disconnect(); gainModOsc.dispose();
            gainModGainNode.disconnect(); gainModGainNode.dispose();
          }
          gainModOsc = null; gainModGainNode = null;
          connectGainMod();
        }
      }

      function applyOutputRouting() {
        if (!gainNode) return;
        gainNode.disconnect();
        if (outputMode === "audio" || outputMode === "both") {
          gainNode.toDestination();
        }
        // "control" mode: gainNode is disconnected from destination
        // but the oscillator still runs so the analyser can sample it
        // and the signal output loop can broadcast values to the room.
      }

      async function startOsc() {
        if (oscRunning) return;
        await ensureAudio();
        osc.start();
        oscRunning = true;
        reconnectModulators();
        startSignalOutput();
        updatePowerUI();
        ewObj.setOutput("playing", true, { immediate: true });
      }

      function stopOsc() {
        if (!osc || !oscRunning) return;
        osc.stop();
        oscRunning = false;
        stopSignalOutput();
        const freq = osc.frequency.value;
        const type = osc.type;
        osc.disconnect();
        osc.dispose();
        osc = new Tone.Oscillator({ frequency: freq, type: type });
        osc.connect(gainNode);
        if (analyser) osc.connect(analyser);
        if (fftAnalyser) osc.connect(fftAnalyser);
        reconnectModulators();
        updatePowerUI();
        ewObj.setOutput("playing", false, { immediate: true });
      }

      // ── Logarithmic frequency mapping ──────────────────────────

      const FREQ_MIN = 20;
      const FREQ_MAX = 20000;
      const LOG_MIN = Math.log(FREQ_MIN);
      const LOG_MAX = Math.log(FREQ_MAX);

      function sliderToFreq(val) {
        // val: 0-1000 (slider range)
        const t = val / 1000;
        return Math.exp(LOG_MIN + t * (LOG_MAX - LOG_MIN));
      }

      function freqToSlider(freq) {
        const t = (Math.log(freq) - LOG_MIN) / (LOG_MAX - LOG_MIN);
        return Math.round(t * 1000);
      }

      function formatFreq(val) {
        const freq = sliderToFreq(val);
        return freq >= 1000
          ? (freq / 1000).toFixed(2) + " kHz"
          : freq.toFixed(1) + " Hz";
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      // Header
      buildHeaderBar(ewObj, "OSCILLATOR", app);

      // Add power, output mode, and theme to header controls row
      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <select id="osc-output-mode" style="width:auto; padding:3px 24px 3px 8px">
          <option value="audio">AUDIO</option>
          <option value="control">CONTROL</option>
          <option value="both">BOTH</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls panel
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `

        <div class="control-group">
          <div class="control-label">WAVEFORM</div>
          <select id="osc-waveform">
            <option value="sine">SINE</option>
            <option value="sawtooth">SAWTOOTH</option>
            <option value="triangle">TRIANGLE</option>
            <option value="square">SQUARE</option>
          </select>
        </div>

        <div class="param-row">
          <div class="control-label">FREQ</div>
          <input type="range" id="osc-freq" min="0" max="1000" value="${freqToSlider(440)}" />
          <span class="range-val" id="osc-freq-val">440.0 Hz</span>
        </div>

        <div class="param-row">
          <div class="control-label">DETUNE</div>
          <input type="range" id="osc-detune" min="-1200" max="1200" value="0" />
          <span class="range-val" id="osc-detune-val">0 ct</span>
        </div>

        <div class="param-row">
          <div class="control-label">GAIN</div>
          <input type="range" id="osc-gain" min="0" max="100" value="50" />
          <span class="range-val" id="osc-gain-val">0.50</span>
        </div>

        <div style="border-top:1px solid var(--border); padding-top:14px; margin-top:4px">
          <div class="param-row mod-row" id="mod-fm-row">
            <div class="control-label">FM</div>
            <input type="range" id="osc-fm-depth" min="0" max="2000" value="200" />
            <span class="range-val" id="osc-fm-depth-val">200 Hz</span>
          </div>
          <div class="param-row mod-row" id="mod-detune-row">
            <div class="control-label">DT MOD</div>
            <input type="range" id="osc-detune-mod-depth" min="0" max="1200" value="400" />
            <span class="range-val" id="osc-detune-mod-depth-val">400 ct</span>
          </div>
          <div class="param-row mod-row" id="mod-gain-row">
            <div class="control-label">GM MOD</div>
            <input type="range" id="osc-gain-mod-depth" min="0" max="100" value="50" />
            <span class="range-val" id="osc-gain-mod-depth-val">0.50</span>
          </div>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme selector
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      // Set default theme
      document.documentElement.className = "theme-ethos";

      // Waveform display
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="osc-scope"></canvas>
            <canvas id="osc-fft" style="display:block; width:100%; height:80px; background:#0e0400; margin-top:2px"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms panel
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE OBJECTS //</div>
        <div id="rooms-list">
          <span class="type-dim">NO OTHER OBJECTS AVAILABLE</span>
        </div>
      `;
      app.appendChild(roomsPanel);

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value
          .trim()
          .replace(/[^a-zA-Z0-9_-]/g, "")
          .slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      // Privacy toggle
      let roomPrivate = false;

      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }

      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        ewObj.setPrivate(roomPrivate);
        updatePrivacyBtn();
      });

      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false;
        updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });

      ewObj.on("roomPrivate", (msg) => {
        roomPrivate = msg.private;
        updatePrivacyBtn();
      });

      // Render available rooms
      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) {
          el.innerHTML = '<span class="type-dim">NO OTHER OBJECTS AVAILABLE</span>';
          return;
        }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length
            ? r.objects.join(", ").toUpperCase()
            : "";
          a.innerHTML =
            `<span class="room-entry-name">${r.name}</span>` +
            `<span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText =
        "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML =
        '<a href="../../index.html" style="color:var(--dim); text-decoration:none">&copy; 2026 ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Wire controls ──────────────────────────────────────────

      // Power toggle
      function updatePowerUI() {
        const track = document.getElementById("power-track");
        if (oscRunning) {
          track.classList.add("on");
        } else {
          track.classList.remove("on");
        }
      }

      document.getElementById("power-toggle").addEventListener("click", () => {
        if (oscRunning) {
          stopOsc();
        } else {
          startOsc();
        }
      });

      // Waveform select
      document
        .getElementById("osc-waveform")
        .addEventListener("change", (e) => {
          const type = e.target.value;
          if (osc) osc.type = type;
          ewObj.setOutput("waveform", type, { immediate: true });
          refreshStats();
        });

      // Output mode select
      document
        .getElementById("osc-output-mode")
        .addEventListener("change", (e) => {
          outputMode = e.target.value;
          applyOutputRouting();
          ewObj.setOutput("outputMode", outputMode, { immediate: true });
        });

      // Frequency slider (logarithmic)
      const freqSlider = document.getElementById("osc-freq");
      const freqVal = document.getElementById("osc-freq-val");

      freqSlider.addEventListener("input", () => {
        const freq = sliderToFreq(+freqSlider.value);
        baseFrequency = freq;
        freqVal.textContent = formatFreq(+freqSlider.value);

        // Update slider fill
        const pct = (+freqSlider.value / 1000) * 100;
        freqSlider.style.setProperty("--val", pct + "%");

        if (osc) osc.frequency.rampTo(freq, 0.01);
        ewObj.setOutput("frequency", Math.round(freq * 10) / 10, {
          unit: "hz",
        });
        refreshStats();
      });
      // Initialize slider fill
      (() => {
        const pct = (+freqSlider.value / 1000) * 100;
        freqSlider.style.setProperty("--val", pct + "%");
      })();

      // Detune slider
      wireRange("osc-detune", "osc-detune-val", (v) => v + " ct");
      document.getElementById("osc-detune").addEventListener("input", (e) => {
        const cents = +e.target.value;
        baseDetune = cents;
        if (osc) osc.detune.rampTo(cents, 0.01);
        ewObj.setOutput("detune", cents, { unit: "cents" });
        refreshStats();
      });

      // Gain slider
      wireRange("osc-gain", "osc-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("osc-gain").addEventListener("input", (e) => {
        const gain = +e.target.value / 100;
        baseGain = gain;
        if (gainNode) gainNode.gain.rampTo(gain, 0.01);
        ewObj.setOutput("gain", Math.round(gain * 100) / 100);
        refreshStats();
      });

      // FM depth slider
      wireRange("osc-fm-depth", "osc-fm-depth-val", (v) => v + " Hz");
      document
        .getElementById("osc-fm-depth")
        .addEventListener("input", (e) => {
          fmDepth = +e.target.value;
          if (fmModChain) fmModChain.modGain.gain.rampTo(fmDepth, 0.01);
          broadcastModChain();
        });

      // Detune mod depth slider
      wireRange("osc-detune-mod-depth", "osc-detune-mod-depth-val", (v) => v + " ct");
      document
        .getElementById("osc-detune-mod-depth")
        .addEventListener("input", (e) => {
          detuneModDepth = +e.target.value;
          if (detuneModGain) detuneModGain.gain.rampTo(detuneModDepth, 0.01);
        });

      // Gain mod depth slider
      wireRange("osc-gain-mod-depth", "osc-gain-mod-depth-val", (v) => (v / 100).toFixed(2));
      document
        .getElementById("osc-gain-mod-depth")
        .addEventListener("input", (e) => {
          gainModDepth = +e.target.value / 100;
          if (gainModGainNode) gainModGainNode.gain.rampTo(gainModDepth, 0.01);
        });

      // ── Signal output loop ─────────────────────────────────────
      // Compute the waveform value mathematically rather than
      // sampling the analyser. This gives a smooth, correct signal
      // at any output rate regardless of oscillator frequency.
      let signalWorker = null;
      let signalPhase = 0;
      let signalLastTime = 0;

      function computeSignal() {
        const now = performance.now() / 1000; // seconds
        if (signalLastTime === 0) signalLastTime = now;
        const dt = now - signalLastTime;
        signalLastTime = now;

        const freq = osc ? osc.frequency.value : baseFrequency;
        signalPhase = (signalPhase + freq * dt) % 1;

        const type = osc ? osc.type : "sine";
        let value;
        switch (type) {
          case "sine":
            value = Math.sin(signalPhase * 2 * Math.PI);
            break;
          case "triangle":
            value = 1 - 4 * Math.abs(signalPhase - 0.5);
            break;
          case "sawtooth":
            value = 2 * signalPhase - 1;
            break;
          case "square":
            value = signalPhase < 0.5 ? 1 : -1;
            break;
          default:
            value = Math.sin(signalPhase * 2 * Math.PI);
        }
        return Math.round(value * 1000) / 1000;
      }

      function startSignalOutput() {
        if (signalWorker) return;
        signalPhase = 0;
        signalLastTime = 0;
        const blob = new Blob([`
          let id = setInterval(() => postMessage("tick"), 10);
          onmessage = () => { clearInterval(id); close(); };
        `], { type: "application/javascript" });
        signalWorker = new Worker(URL.createObjectURL(blob));
        signalWorker.onmessage = () => {
          if (!oscRunning) return;
          const value = computeSignal();
          ewObj.setOutput("signal", value, { unit: "bipolar" });
        };
      }

      function stopSignalOutput() {
        if (signalWorker) {
          signalWorker.postMessage("stop");
          signalWorker = null;
        }
        signalPhase = 0;
        signalLastTime = 0;
        ewObj.setOutput("signal", 0, { unit: "bipolar", immediate: true });
      }

      // ── Input signal handling ──────────────────────────────────
      // When a room is linked to an input, a local modulator oscillator
      // is created at audio rate. Incoming room messages sync the
      // modulator's frequency and waveform from the remote source.

      const toneWaveforms = ["sine", "triangle", "sawtooth", "square"];

      ewObj.onInput("frequency", (value, meta) => {
        // Bipolar signal — apply directly as modulation
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          // Always apply bipolar signals directly — this handles LFO
          // custom waveforms and any control-rate modulation source.
          // If a local mod chain exists, the bipolar signal adds on top.
          const modulated = baseFrequency + value * fmDepth;
          const clamped = Math.max(20, Math.min(20000, modulated));
          if (osc) osc.frequency.rampTo(clamped, 0.012);
          return;
        }

        if (fmModWanted) {
          // A local FM modulator is active — sync its params from remote
          if (meta && meta.port === "frequency" && typeof value === "number") {
            fmModRemoteFreq = value;
            if (fmModChain) fmModChain.modOsc.frequency.value = value;
            broadcastModChain();
          } else if (meta && meta.port === "waveform" && typeof value === "string") {
            fmModRemoteType = value;
            // If waveform is a custom type, destroy the local mod chain
            // so bipolar signals take over modulation instead
            if (!toneWaveforms.includes(value)) {
              if (fmModChain) {
                destroyModChain(fmModChain);
                fmModChain = null;
              }
            } else {
              // Standard waveform — rebuild chain if it was destroyed
              if (!fmModChain) {
                connectFMMod();
              } else {
                try { fmModChain.modOsc.type = value; } catch (_) {}
              }
            }
            broadcastModChain();
          } else if (meta && meta.port === "modChain") {
            // Upstream modulation chain changed
            const incoming = JSON.stringify(value);
            const current = JSON.stringify(fmModUpstreamChain);
            if (incoming !== current) {
              fmModUpstreamChain = value;
              // Try to update the inner chain in-place instead of rebuilding
              if (fmModChain && fmModChain.inner && value) {
                updateModChainParams(fmModChain.inner, value);
              } else {
                rebuildFMMod();
              }
              broadcastModChain();
            }
          }
          return;
        }

        // No modulator — direct frequency set
        if (typeof value === "number" && value >= 20 && value <= 20000) {
          baseFrequency = value;
          if (osc) osc.frequency.rampTo(value, 0.01);
          freqSlider.value = freqToSlider(value);
          freqVal.textContent =
            value >= 1000
              ? (value / 1000).toFixed(2) + " kHz"
              : value.toFixed(1) + " Hz";
          const pct = (freqSlider.value / 1000) * 100;
          freqSlider.style.setProperty("--val", pct + "%");
          ewObj.setOutput("frequency", value, { unit: "hz" });
          refreshStats();
        }
      });

      ewObj.onInput("detune", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseDetune + value * detuneModDepth;
          const clamped = Math.max(-1200, Math.min(1200, modulated));
          if (osc) osc.detune.rampTo(clamped, 0.012);
          return;
        }

        if (detuneModWanted) {
          if (meta && meta.port === "frequency" && typeof value === "number") {
            detuneModRemoteFreq = value;
            if (detuneModOsc) detuneModOsc.frequency.value = value;
          } else if (meta && meta.port === "waveform" && typeof value === "string") {
            detuneModRemoteType = value;
            if (!toneWaveforms.includes(value)) {
              if (detuneModOsc) {
                detuneModOsc.stop(); detuneModOsc.disconnect(); detuneModOsc.dispose();
                detuneModGain.disconnect(); detuneModGain.dispose();
                detuneModOsc = null; detuneModGain = null;
              }
            } else {
              if (!detuneModOsc) { connectDetuneMod(); }
              else { try { detuneModOsc.type = value; } catch (_) {} }
            }
          }
          return;
        }

        if (typeof value === "number") {
          const clamped = Math.max(-1200, Math.min(1200, value));
          baseDetune = clamped;
          if (osc) osc.detune.rampTo(clamped, 0.01);
          document.getElementById("osc-detune").value = clamped;
          document.getElementById("osc-detune-val").textContent = clamped + " ct";
          ewObj.setOutput("detune", clamped, { unit: "cents" });
          refreshStats();
        }
      });

      ewObj.onInput("gain", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseGain + value * gainModDepth;
          const clamped = Math.max(0, Math.min(1, modulated));
          if (gainNode) gainNode.gain.rampTo(clamped, 0.012);
          return;
        }

        if (gainModWanted) {
          if (meta && meta.port === "frequency" && typeof value === "number") {
            gainModRemoteFreq = value;
            if (gainModOsc) gainModOsc.frequency.value = value;
          } else if (meta && meta.port === "waveform" && typeof value === "string") {
            gainModRemoteType = value;
            if (!toneWaveforms.includes(value)) {
              if (gainModOsc) {
                gainModOsc.stop(); gainModOsc.disconnect(); gainModOsc.dispose();
                gainModGainNode.disconnect(); gainModGainNode.dispose();
                gainModOsc = null; gainModGainNode = null;
              }
            } else {
              if (!gainModOsc) { connectGainMod(); }
              else { try { gainModOsc.type = value; } catch (_) {} }
            }
          }
          return;
        }

        if (typeof value === "number") {
          const clamped = Math.max(0, Math.min(1, value));
          baseGain = clamped;
          if (gainNode) gainNode.gain.rampTo(clamped, 0.01);
          document.getElementById("osc-gain").value = Math.round(clamped * 100);
          document.getElementById("osc-gain-val").textContent =
            clamped.toFixed(2);
          ewObj.setOutput("gain", clamped);
          refreshStats();
        }
      });

      ewObj.onInput("waveform", (value, meta) => {
        if (meta && meta.unit === "bipolar") return; // waveform can't be modulated by signal
        if (typeof value !== "string") return;
        const valid = ["sine", "sawtooth", "triangle", "square"];
        if (!valid.includes(value)) return;

        // Sync to any active local modulators
        if (fmModOsc) { try { fmModOsc.type = value; } catch (_) {} }
        if (detuneModOsc) { try { detuneModOsc.type = value; } catch (_) {} }
        if (gainModOsc) { try { gainModOsc.type = value; } catch (_) {} }

        // If no modulators, set own waveform
        if (!fmModOsc && !detuneModOsc && !gainModOsc) {
          if (osc) osc.type = value;
          document.getElementById("osc-waveform").value = value;
          ewObj.setOutput("waveform", value);
          refreshStats();
        }
      });

      // ── Room state sync (same room, different browser) ─────────

      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !oscRunning) {
          await startOsc();
        } else if (!value && oscRunning) {
          stopOsc();
        }
      });

      ewObj.onInput("outputMode", (value) => {
        if (typeof value !== "string") return;
        if (["audio", "control", "both"].includes(value)) {
          outputMode = value;
          document.getElementById("osc-output-mode").value = value;
          applyOutputRouting();
        }
      });

      // Connect/disconnect local modulators when inputs are linked/unlinked
      function updateModRowStates() {
        document.getElementById("mod-fm-row").classList.toggle("active", fmModWanted);
        document.getElementById("mod-detune-row").classList.toggle("active", detuneModWanted);
        document.getElementById("mod-gain-row").classList.toggle("active", gainModWanted);
      }

      ewObj.on("inputConnected", ({ room, portMapping }) => {
        ensureAudio().then(() => {
          for (const localPort of Object.values(portMapping)) {
            if (localPort === "frequency") connectFMMod();
            if (localPort === "detune") connectDetuneMod();
            if (localPort === "gain") connectGainMod();
          }
          updateModRowStates();
        });
      });

      ewObj.on("inputDisconnected", ({ room }) => {
        const subs = ewObj.getSubscriptions();
        const activePorts = new Set();
        for (const sub of subs) {
          for (const local of Object.values(sub.portMapping)) {
            activePorts.add(local);
          }
        }
        if (!activePorts.has("frequency")) {
          disconnectFMMod();
          // Snap frequency back to slider value after removing modulation
          if (osc) osc.frequency.rampTo(baseFrequency, 0.01);
        }
        if (!activePorts.has("detune")) {
          disconnectDetuneMod();
          if (osc) osc.detune.rampTo(baseDetune, 0.01);
        }
        if (!activePorts.has("gain")) {
          disconnectGainMod();
          if (gainNode) gainNode.gain.rampTo(baseGain, 0.01);
        }
        updateModRowStates();
      });

      // ── Output stats ───────────────────────────────────────────

      function refreshStats() {
        updateOutputStats(ewObj, [
          {
            port: "signal",
            label: "SIGNAL",
            formatter: (v) => (v !== undefined ? v.toFixed(3) : "0.000"),
          },
          {
            port: "frequency",
            label: "FREQ",
            unit: " Hz",
            formatter: (v) => (v ? v.toFixed(1) : "—"),
          },
          { port: "waveform", label: "WAVE", formatter: (v) => v || "—" },
          {
            port: "gain",
            label: "GAIN",
            formatter: (v) => (v !== undefined ? v.toFixed(2) : "—"),
          },
        ]);
      }

      // ── Waveform scope ─────────────────────────────────────────

      const scopeCanvas = document.getElementById("osc-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      const fftCanvas = document.getElementById("osc-fft");
      const fftCtx = fftCanvas.getContext("2d");

      function resizeFreq() {
        const rect = fftCanvas.parentElement.getBoundingClientRect();
        fftCanvas.width = rect.width;
        fftCanvas.height = 80;
      }

      function drawFreq() {
        const w = fftCanvas.width;
        const h = fftCanvas.height;
        fftCtx.fillStyle = "#0e0400";
        fftCtx.fillRect(0, 0, w, h);

        if (!fftAnalyser) return;
        const data = fftAnalyser.getValue();

        const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        const len = data.length;

        fftCtx.fillStyle = accent;
        fftCtx.globalAlpha = 0.7;
        for (let x = 0; x < w; x++) {
          const pct = x / w;
          const bin = Math.floor(Math.pow(pct, 2) * len);
          if (bin >= len) continue;
          const db = data[bin];
          const norm = Math.max(0, (db + 100) / 100);
          const barH = norm * h;
          fftCtx.fillRect(x, h - barH, 1, barH);
        }
        fftCtx.globalAlpha = 1.0;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);

        const w = scopeCanvas.width;
        const h = scopeCanvas.height;
        scopeCtx.fillStyle = "#0e0400";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid lines
        scopeCtx.strokeStyle = "rgba(160, 72, 0, 0.12)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) {
          scopeCtx.beginPath();
          scopeCtx.moveTo(0, y);
          scopeCtx.lineTo(w, y);
          scopeCtx.stroke();
        }
        for (let x = 0; x < w; x += 20) {
          scopeCtx.beginPath();
          scopeCtx.moveTo(x, 0);
          scopeCtx.lineTo(x, h);
          scopeCtx.stroke();
        }

        // Center line
        scopeCtx.strokeStyle = "rgba(160, 72, 0, 0.3)";
        scopeCtx.beginPath();
        scopeCtx.moveTo(0, h / 2);
        scopeCtx.lineTo(w, h / 2);
        scopeCtx.stroke();

        if (!analyser || !oscRunning) return;

        const data = analyser.getValue();
        scopeCtx.strokeStyle = getComputedStyle(
          document.documentElement
        ).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(255, 170, 0, 0.6)";
        scopeCtx.shadowBlur = 8;
        scopeCtx.beginPath();

        for (let i = 0; i < data.length; i++) {
          const x = (i / data.length) * w;
          const y = ((1 - data[i]) / 2) * h;
          if (i === 0) {
            scopeCtx.moveTo(x, y);
          } else {
            scopeCtx.lineTo(x, y);
          }
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
        drawFreq();
      }

      // ── Initialize ──────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);

        // Set local defaults (stored but not broadcast yet —
        // the requestState response from existing peers will
        // override these if someone is already in the room).
        ewObj._outputValues["frequency"] = 440;
        ewObj._outputValues["detune"] = 0;
        ewObj._outputValues["gain"] = 0.5;
        ewObj._outputValues["waveform"] = "sine";
        ewObj._outputValues["playing"] = false;
        ewObj._outputValues["outputMode"] = "audio";

        refreshStats();
        resizeScope();
        resizeFreq();
        drawScope();
      })();

      window.addEventListener("resize", () => { resizeScope(); resizeFreq(); });
    </script>
  </body>
</html>
