<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LFO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css" />
    <link rel="stylesheet" href="../lib/ewuilib.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
      #lfo-scope {
        display: block; width: 100%; height: 120px; background: #080808;
      }
      .param-row {
        display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
      }
      .param-row .control-label { min-width: 80px; margin-bottom: 0; flex-shrink: 0; }
      .param-row input[type="range"] { flex: 1; }
      .param-row .range-val { min-width: 72px; text-align: right; }
      #power-toggle .toggle-track.on .toggle-thumb { left: 22px; }
      #meta .toggle-wrap { align-self: center; }
      #meta .toggle-track { margin: 0; }
      .room-entry {
        display: flex; justify-content: space-between; align-items: center;
        padding: 6px 10px; border: 1px solid var(--border); margin-bottom: 6px;
        text-decoration: none; color: var(--text); font-size: 0.82rem;
        letter-spacing: 0.1em; transition: border-color 0.14s, background 0.14s; cursor: pointer;
      }
      .room-entry:hover { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.06); }
      .room-entry-name { color: var(--accent); }
      .room-entry-info { font-size: 0.68rem; color: var(--dim); letter-spacing: 0.08em; }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "LFO-1",
        objectType: "lfo",
        roomPrefix: "lfo",
        inputs: [
          { port: "frequency", type: "number", unit: "hz", min: 0.01, max: 100, default: 2 },
          { port: "gain", type: "number", unit: "", min: 0, max: 1, default: 1 },
          { port: "waveform", type: "enum", values: ["sine", "triangle", "sawtooth", "square", "random"], default: "sine" },
        ],
        outputs: [
          { port: "frequency", type: "number", unit: "hz" },
          { port: "waveform", type: "string" },
          { port: "gain", type: "number" },
          { port: "playing", type: "boolean" },
          { port: "modChain", type: "object" },
        ],
      });

      // ── LFO state ──────────────────────────────────────────────

      let baseFrequency = 2;
      let baseGain = 1;
      let lfoRunning = false;
      let audioReady = false;

      // Extended waveforms — Tone.js supports these natively
      const waveformList = [
        "sine", "triangle", "sawtooth", "square",
      ];
      // Custom waveforms computed manually for the scope + signal output
      const customWaveforms = [
        "random", "staircase", "exp-rise", "exp-fall",
        "pulse-25", "pulse-10", "smooth-random", "wander",
      ];
      const allWaveforms = [...waveformList, ...customWaveforms];

      // ── Tone.js audio ──────────────────────────────────────────
      // The LFO is always in CONTROL mode — it doesn't output audio
      // to the speakers. It only broadcasts its waveform signal to
      // the room for other objects to use as modulation source.

      let osc = null;
      let gainNode = null;
      let analyser = null;

      async function ensureAudio() {
        if (audioReady) return;
        await Tone.start();
        gainNode = new Tone.Gain(1);
        osc = new Tone.Oscillator({ frequency: 2, type: "sine" });
        osc.connect(gainNode);
        analyser = new Tone.Analyser("waveform", 256);
        osc.connect(analyser);
        audioReady = true;
      }

      async function startLFO() {
        if (lfoRunning) return;
        await Tone.start();
        await ensureAudio();
        osc.start();
        lfoRunning = true;
        startSignalOutput();
        updatePowerUI();
        ewObj.setOutput("playing", true, { immediate: true });
      }

      function stopLFO() {
        if (!osc || !lfoRunning) return;
        osc.stop();
        lfoRunning = false;
        stopSignalOutput();
        // Recreate osc (Tone.js can't restart)
        const freq = osc.frequency.value;
        const type = osc.type;
        osc.disconnect();
        osc.dispose();
        osc = new Tone.Oscillator({ frequency: freq, type: type });
        osc.connect(gainNode);
        if (analyser) osc.connect(analyser);
        updatePowerUI();
        ewObj.setOutput("playing", false, { immediate: true });
      }

      // ── Signal output ──────────────────────────────────────────
      // Broadcasts the LFO waveform value at ~100Hz for downstream
      // modulation targets. Uses a Web Worker timer to survive
      // background tab throttling.

      let signalWorker = null;
      let signalPhase = 0;
      let signalLastTime = 0;
      let currentWaveform = "sine";
      let sampleHoldValue = 0;
      let sampleHoldLast = 0;
      let wanderValue = 0;
      let wanderTarget = 0;
      let smoothRandomValue = 0;
      let smoothRandomTarget = 0;

      function computeSignal() {
        const now = performance.now() / 1000;
        if (signalLastTime === 0) signalLastTime = now;
        const dt = now - signalLastTime;
        signalLastTime = now;

        const freq = baseFrequency;
        signalPhase = (signalPhase + freq * dt) % 1;

        let value;
        switch (currentWaveform) {
          case "sine":
            value = Math.sin(signalPhase * 2 * Math.PI);
            break;
          case "triangle":
            value = 1 - 4 * Math.abs(signalPhase - 0.5);
            break;
          case "sawtooth":
            value = 2 * signalPhase - 1;
            break;
          case "square":
            value = signalPhase < 0.5 ? 1 : -1;
            break;
          case "random": {
            // Sample & hold — new random value each cycle
            const cyclePos = Math.floor(signalPhase * 1) !== Math.floor(sampleHoldLast * 1);
            if (signalPhase < sampleHoldLast || cyclePos) {
              sampleHoldValue = Math.random() * 2 - 1;
            }
            sampleHoldLast = signalPhase;
            value = sampleHoldValue;
            break;
          }
          case "staircase": {
            // 8-step staircase
            const step = Math.floor(signalPhase * 8);
            value = (step / 3.5) - 1;
            break;
          }
          case "exp-rise":
            value = (Math.exp(signalPhase * 3) - 1) / (Math.exp(3) - 1) * 2 - 1;
            break;
          case "exp-fall":
            value = 1 - (Math.exp(signalPhase * 3) - 1) / (Math.exp(3) - 1) * 2;
            break;
          case "pulse-25":
            value = signalPhase < 0.25 ? 1 : -1;
            break;
          case "pulse-10":
            value = signalPhase < 0.1 ? 1 : -1;
            break;
          case "smooth-random": {
            // Smoothly interpolated random — new target each cycle
            if (signalPhase < sampleHoldLast) {
              smoothRandomValue = smoothRandomTarget;
              smoothRandomTarget = Math.random() * 2 - 1;
            }
            sampleHoldLast = signalPhase;
            // Cosine interpolation
            const t = (1 - Math.cos(signalPhase * Math.PI)) / 2;
            value = smoothRandomValue * (1 - t) + smoothRandomTarget * t;
            break;
          }
          case "wander": {
            // Brownian motion — small random steps
            wanderTarget += (Math.random() - 0.5) * dt * freq * 4;
            wanderTarget = Math.max(-1, Math.min(1, wanderTarget));
            wanderValue += (wanderTarget - wanderValue) * Math.min(1, dt * freq * 8);
            value = wanderValue;
            break;
          }
          default:
            value = Math.sin(signalPhase * 2 * Math.PI);
        }
        return Math.round(value * baseGain * 1000) / 1000;
      }

      function startSignalOutput() {
        if (signalWorker) return;
        signalPhase = 0;
        signalLastTime = 0;
        const blob = new Blob([`
          let id = setInterval(() => postMessage("tick"), 10);
          onmessage = () => { clearInterval(id); close(); };
        `], { type: "application/javascript" });
        signalWorker = new Worker(URL.createObjectURL(blob));
        signalWorker.onmessage = () => {
          if (!lfoRunning) return;
          const value = computeSignal();
          ewObj.setOutput("signal", value, { unit: "bipolar" });
        };
      }

      function stopSignalOutput() {
        if (signalWorker) {
          signalWorker.postMessage("stop");
          signalWorker = null;
        }
        signalPhase = 0;
        signalLastTime = 0;
        ewObj.setOutput("signal", 0, { unit: "bipolar", immediate: true });
      }

      // ── Scope ──────────────────────────────────────────────────
      // Draws the computed waveform shape (not from analyser —
      // uses computeSignal math directly for clean display).

      const SCOPE_SAMPLES = 200;
      let scopeHistory = new Float32Array(SCOPE_SAMPLES);
      let scopeWriteIdx = 0;

      function pushScopeValue(val) {
        scopeHistory[scopeWriteIdx] = val;
        scopeWriteIdx = (scopeWriteIdx + 1) % SCOPE_SAMPLES;
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "LFO", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `
        <div class="control-group">
          <div class="control-label">WAVEFORM</div>
          <select id="lfo-waveform">
            <optgroup label="STANDARD">
              <option value="sine">SINE</option>
              <option value="triangle">TRIANGLE</option>
              <option value="sawtooth">SAWTOOTH</option>
              <option value="square">SQUARE</option>
            </optgroup>
            <optgroup label="PULSE">
              <option value="pulse-25">PULSE 25%</option>
              <option value="pulse-10">PULSE 10%</option>
            </optgroup>
            <optgroup label="EXPONENTIAL">
              <option value="exp-rise">EXP RISE</option>
              <option value="exp-fall">EXP FALL</option>
            </optgroup>
            <optgroup label="STEPPED">
              <option value="staircase">STAIRCASE</option>
              <option value="random">RANDOM S&H</option>
            </optgroup>
            <optgroup label="SMOOTH">
              <option value="smooth-random">SMOOTH RANDOM</option>
              <option value="wander">WANDER</option>
            </optgroup>
          </select>
        </div>

        <div class="param-row">
          <div class="control-label">RATE</div>
          <input type="range" id="lfo-freq" min="1" max="1000" value="200" />
          <span class="range-val" id="lfo-freq-val">2.00 Hz</span>
        </div>

        <div class="param-row">
          <div class="control-label">DEPTH</div>
          <input type="range" id="lfo-gain" min="0" max="100" value="100" />
          <span class="range-val" id="lfo-gain-val">1.00</span>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="lfo-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE LFOS //</div>
        <div id="rooms-list"><span class="type-dim">NO OTHER LFOS AVAILABLE</span></div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Wire controls ──────────────────────────────────────────

      function updatePowerUI() {
        document.getElementById("power-track").classList.toggle("on", lfoRunning);
      }

      document.getElementById("power-toggle").addEventListener("click", () => {
        if (lfoRunning) stopLFO(); else startLFO();
      });

      // Waveform
      document.getElementById("lfo-waveform").addEventListener("change", (e) => {
        currentWaveform = e.target.value;
        // Set Tone.js osc type for standard waveforms (used by mod chain)
        if (waveformList.includes(currentWaveform) && osc) {
          osc.type = currentWaveform;
        }
        ewObj.setOutput("waveform", currentWaveform, { immediate: true });
        // Reset random state
        sampleHoldValue = 0;
        sampleHoldLast = 0;
        smoothRandomValue = 0;
        smoothRandomTarget = Math.random() * 2 - 1;
        wanderValue = 0;
        wanderTarget = 0;
      });

      // Rate — logarithmic 0.01 to 100 Hz mapped from slider 1-1000
      const RATE_MIN = Math.log(0.01);
      const RATE_MAX = Math.log(100);

      function sliderToRate(val) {
        return Math.exp(RATE_MIN + (val / 1000) * (RATE_MAX - RATE_MIN));
      }
      function rateToSlider(rate) {
        return Math.round(((Math.log(rate) - RATE_MIN) / (RATE_MAX - RATE_MIN)) * 1000);
      }

      const rateSlider = document.getElementById("lfo-freq");
      const rateVal = document.getElementById("lfo-freq-val");

      rateSlider.addEventListener("input", () => {
        const rate = sliderToRate(+rateSlider.value);
        baseFrequency = rate;
        rateVal.textContent = rate >= 10 ? rate.toFixed(1) + " Hz" : rate.toFixed(2) + " Hz";
        const pct = (+rateSlider.value / 1000) * 100;
        rateSlider.style.setProperty("--val", pct + "%");
        if (osc) osc.frequency.rampTo(rate, 0.01);
        ewObj.setOutput("frequency", Math.round(rate * 100) / 100, { unit: "hz" });
      });
      (() => {
        const pct = (+rateSlider.value / 1000) * 100;
        rateSlider.style.setProperty("--val", pct + "%");
      })();

      // Depth
      wireRange("lfo-gain", "lfo-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("lfo-gain").addEventListener("input", (e) => {
        baseGain = +e.target.value / 100;
        ewObj.setOutput("gain", baseGain);
      });

      // ── Input handlers ─────────────────────────────────────────

      ewObj.onInput("frequency", (value, meta) => {
        if (typeof value !== "number") return;
        if (value >= 0.01 && value <= 100) {
          baseFrequency = value;
          if (osc) osc.frequency.rampTo(value, 0.01);
          rateSlider.value = rateToSlider(value);
          rateVal.textContent = value >= 10 ? value.toFixed(1) + " Hz" : value.toFixed(2) + " Hz";
          rateSlider.style.setProperty("--val", (+rateSlider.value / 1000) * 100 + "%");
          ewObj.setOutput("frequency", value, { unit: "hz" });
        }
      });

      ewObj.onInput("gain", (value) => {
        if (typeof value !== "number") return;
        const clamped = Math.max(0, Math.min(1, value));
        baseGain = clamped;
        document.getElementById("lfo-gain").value = Math.round(clamped * 100);
        document.getElementById("lfo-gain-val").textContent = clamped.toFixed(2);
        ewObj.setOutput("gain", clamped);
      });

      ewObj.onInput("waveform", (value) => {
        if (typeof value !== "string") return;
        if (allWaveforms.includes(value)) {
          currentWaveform = value;
          document.getElementById("lfo-waveform").value = value;
          if (waveformList.includes(value) && osc) osc.type = value;
          ewObj.setOutput("waveform", value);
        }
      });

      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !lfoRunning) await startLFO();
        else if (!value && lfoRunning) stopLFO();
      });

      // ── Scope drawing ──────────────────────────────────────────

      const scopeCanvas = document.getElementById("lfo-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);
        const w = scopeCanvas.width, h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid
        scopeCtx.strokeStyle = "rgba(128,128,128,0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }
        scopeCtx.strokeStyle = "rgba(128,128,128,0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        if (!lfoRunning) return;

        // Push current value
        pushScopeValue(computeSignal());

        // Draw history
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210,210,210,0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < SCOPE_SAMPLES; i++) {
          const idx = (scopeWriteIdx + i) % SCOPE_SAMPLES;
          const x = (i / SCOPE_SAMPLES) * w;
          const y = ((1 - scopeHistory[idx]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      // ── Room UI ────────────────────────────────────────────────

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate; ewObj.setPrivate(roomPrivate); updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false; updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });
      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER LFOS AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // ── Initialize ─────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);
        ewObj._outputValues["frequency"] = 2;
        ewObj._outputValues["gain"] = 1;
        ewObj._outputValues["waveform"] = "sine";
        ewObj._outputValues["playing"] = false;
        resizeScope();
        drawScope();
      })();

      window.addEventListener("resize", resizeScope);
    </script>
  </body>
</html>
