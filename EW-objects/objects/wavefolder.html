<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAVEFOLDER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
      #wfl-scope {
        display: block;
        width: 100%;
        height: 120px;
        background: #0e0400;
      }
      #wfl-curve-canvas {
        display: block;
        width: 100%;
        height: 140px;
        background: #080808;
        border: 1px solid var(--border);
        margin-bottom: 14px;
      }
      .param-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .param-row .control-label {
        min-width: 80px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      #power-toggle .toggle-track.on .toggle-thumb {
        left: 22px;
      }
      #meta .toggle-wrap {
        align-self: center;
      }
      #meta .toggle-track {
        margin: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
      }
      .param-row .range-val {
        min-width: 72px;
        text-align: right;
      }
      .room-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        margin-bottom: 6px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        transition: border-color 0.14s, background 0.14s;
        cursor: pointer;
      }
      .room-entry:hover {
        border-color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
      }
      .room-entry-name {
        color: var(--accent);
      }
      .room-entry-info {
        font-size: 0.68rem;
        color: var(--dim);
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // -- EWObject instance ------------------------------------------

      const ewObj = new EWObject({
        name: "WFL-1",
        objectType: "wavefolder",
        roomPrefix: "wfl",
        inputs: [
          {
            port: "audio",
            type: "room",
            unit: "",
            default: null,
          },
          {
            port: "drive",
            type: "number",
            unit: "",
            min: 1,
            max: 10,
            default: 2,
          },
          {
            port: "folds",
            type: "number",
            unit: "",
            min: 1,
            max: 8,
            default: 3,
          },
          {
            port: "symmetry",
            type: "number",
            unit: "",
            min: -1,
            max: 1,
            default: 0,
          },
          {
            port: "gain",
            type: "number",
            unit: "",
            min: 0,
            max: 1,
            default: 0.7,
          },
        ],
        outputs: [
          { port: "drive", type: "number" },
          { port: "folds", type: "number" },
          { port: "symmetry", type: "number" },
          { port: "gain", type: "number" },
          { port: "playing", type: "boolean" },
          { port: "outputMode", type: "string" },
        ],
      });

      // -- Wavefolder state -------------------------------------------

      let baseDrive = 2;
      let baseFolds = 3;
      let baseSymmetry = 0;
      let baseGain = 0.7;
      const CURVE_SIZE = 8192;

      // -- Tone.js audio ----------------------------------------------

      let driveGain = null;    // Pre-amplification
      let shaper = null;       // Tone.WaveShaper
      let outputGain = null;
      let analyser = null;
      let folderRunning = false;
      let audioReady = false;
      let outputMode = "audio";

      // Source oscillator (audio input from room)
      let sourceOsc = null;
      let sourceGain = null;
      let sourceConnected = false;

      // -- Folding algorithm ------------------------------------------

      function fold(x, folds, symmetry) {
        x = x * baseDrive + symmetry;
        for (let i = 0; i < folds; i++) {
          if (x > 1) x = 2 - x;
          else if (x < -1) x = -2 - x;
        }
        return Math.max(-1, Math.min(1, x));
      }

      function buildCurve() {
        const curve = new Float32Array(CURVE_SIZE);
        for (let i = 0; i < CURVE_SIZE; i++) {
          const x = (i / (CURVE_SIZE - 1)) * 2 - 1; // -1 to +1
          curve[i] = fold(x, baseFolds, baseSymmetry);
        }
        return curve;
      }

      function updateShaper() {
        if (!shaper) return;
        shaper.curve = buildCurve();
        drawCurve();
      }

      async function ensureAudio() {
        if (audioReady) return;
        await Tone.start();
        driveGain = new Tone.Gain(1); // drive is baked into the curve
        shaper = new Tone.WaveShaper(buildCurve());
        outputGain = new Tone.Gain(baseGain);
        driveGain.connect(shaper);
        shaper.connect(outputGain);
        applyOutputRouting();
        analyser = new Tone.Analyser("waveform", 256);
        outputGain.connect(analyser);
        audioReady = true;
      }

      function applyOutputRouting() {
        if (!outputGain) return;
        outputGain.disconnect();
        if (outputMode === "audio" || outputMode === "both") {
          outputGain.toDestination();
        }
      }

      // -- Source oscillator (audio input from room) ------------------

      function createSourceOsc(freq, type, gain) {
        if (sourceOsc) destroySourceOsc();
        sourceOsc = new Tone.Oscillator({ frequency: freq || 440, type: type || "sine" });
        sourceGain = new Tone.Gain(gain !== undefined ? gain : 0.5);
        sourceOsc.connect(sourceGain);
        sourceGain.connect(driveGain);
        if (folderRunning) sourceOsc.start();
        sourceConnected = true;
      }

      function destroySourceOsc() {
        if (sourceOsc) {
          try { sourceOsc.stop(); } catch (_) {}
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = null;
        }
        if (sourceGain) {
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = null;
        }
        sourceConnected = false;
      }

      async function startFolder() {
        if (folderRunning) return;
        await ensureAudio();
        if (sourceOsc) sourceOsc.start();
        folderRunning = true;
        updatePowerUI();
        ewObj.setOutput("playing", true, { immediate: true });
      }

      function stopFolder() {
        if (!folderRunning) return;
        if (sourceOsc) {
          const freq = sourceOsc.frequency.value;
          const type = sourceOsc.type;
          const gain = sourceGain ? sourceGain.gain.value : 0.5;
          sourceOsc.stop();
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = new Tone.Oscillator({ frequency: freq, type: type });
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = new Tone.Gain(gain);
          sourceOsc.connect(sourceGain);
          sourceGain.connect(driveGain);
        }
        folderRunning = false;
        updatePowerUI();
        ewObj.setOutput("playing", false, { immediate: true });
      }

      // -- Build UI ---------------------------------------------------

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "WAVEFOLDER", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <select id="wfl-output-mode" style="width:auto; padding:3px 24px 3px 8px">
          <option value="audio">AUDIO</option>
          <option value="control">CONTROL</option>
          <option value="both">BOTH</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls panel
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `
        <div class="param-row">
          <div class="control-label">DRIVE</div>
          <input type="range" id="wfl-drive" min="100" max="1000" value="200" />
          <span class="range-val" id="wfl-drive-val">2.00</span>
        </div>

        <div class="param-row">
          <div class="control-label">FOLDS</div>
          <input type="range" id="wfl-folds" min="1" max="8" value="3" step="1" />
          <span class="range-val" id="wfl-folds-val">3</span>
        </div>

        <div class="param-row">
          <div class="control-label">SYMMETRY</div>
          <input type="range" id="wfl-symmetry" min="-100" max="100" value="0" />
          <span class="range-val" id="wfl-symmetry-val">0.00</span>
        </div>

        <div class="param-row">
          <div class="control-label">GAIN</div>
          <input type="range" id="wfl-gain" min="0" max="100" value="70" />
          <span class="range-val" id="wfl-gain-val">0.70</span>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Transfer function canvas
      const curvePanel = document.createElement("div");
      curvePanel.className = "hud-panel";
      curvePanel.innerHTML = `
        <div class="control-label" style="margin-bottom:8px">TRANSFER FUNCTION</div>
        <canvas id="wfl-curve-canvas"></canvas>
      `;
      app.appendChild(curvePanel);

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="wfl-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms panel
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE WAVEFOLDERS //</div>
        <div id="rooms-list">
          <span class="type-dim">NO OTHER WAVEFOLDERS AVAILABLE</span>
        </div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // -- Wire controls ----------------------------------------------

      function updatePowerUI() {
        const track = document.getElementById("power-track");
        track.classList.toggle("on", folderRunning);
      }

      document.getElementById("power-toggle").addEventListener("click", () => {
        if (folderRunning) stopFolder(); else startFolder();
      });

      // Output mode
      document.getElementById("wfl-output-mode").addEventListener("change", (e) => {
        outputMode = e.target.value;
        applyOutputRouting();
        ewObj.setOutput("outputMode", outputMode, { immediate: true });
      });

      // Drive slider (1 to 10, mapped from 100 to 1000)
      wireRange("wfl-drive", "wfl-drive-val", (v) => (v / 100).toFixed(2));
      document.getElementById("wfl-drive").addEventListener("input", (e) => {
        baseDrive = +e.target.value / 100;
        updateShaper();
        ewObj.setOutput("drive", Math.round(baseDrive * 100) / 100);
        refreshStats();
      });

      // Folds slider (integer 1-8)
      wireRange("wfl-folds", "wfl-folds-val", (v) => String(v));
      document.getElementById("wfl-folds").addEventListener("input", (e) => {
        baseFolds = +e.target.value;
        updateShaper();
        ewObj.setOutput("folds", baseFolds);
        refreshStats();
      });

      // Symmetry slider (-1 to +1, mapped from -100 to 100)
      wireRange("wfl-symmetry", "wfl-symmetry-val", (v) => (v / 100).toFixed(2));
      document.getElementById("wfl-symmetry").addEventListener("input", (e) => {
        baseSymmetry = +e.target.value / 100;
        updateShaper();
        ewObj.setOutput("symmetry", Math.round(baseSymmetry * 100) / 100);
        refreshStats();
      });

      // Gain slider
      wireRange("wfl-gain", "wfl-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("wfl-gain").addEventListener("input", (e) => {
        const gain = +e.target.value / 100;
        baseGain = gain;
        if (outputGain) outputGain.gain.rampTo(gain, 0.01);
        ewObj.setOutput("gain", Math.round(gain * 100) / 100);
        refreshStats();
      });

      // -- Input signal handling --------------------------------------

      ewObj.onInput("audio", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;
        if (!audioReady) return;

        if (meta && meta.port === "frequency" && typeof value === "number") {
          if (!sourceConnected) {
            createSourceOsc(value, "sine", 0.5);
          } else if (sourceOsc) {
            sourceOsc.frequency.value = value;
          }
        } else if (meta && meta.port === "waveform" && typeof value === "string") {
          if (sourceOsc) { try { sourceOsc.type = value; } catch (_) {} }
        } else if (meta && meta.port === "gain" && typeof value === "number") {
          if (sourceGain) sourceGain.gain.value = Math.max(0, Math.min(1, value));
        } else if (meta && meta.port === "detune" && typeof value === "number") {
          if (sourceOsc) sourceOsc.detune.value = value;
        } else if (meta && meta.port === "playing" && typeof value === "boolean") {
          if (value && sourceConnected && !folderRunning) startFolder();
        }
      });

      ewObj.on("inputConnected", ({ room, portMapping }) => {
        ensureAudio().then(() => {
          for (const localPort of Object.values(portMapping)) {
            if (localPort === "audio" && !sourceConnected) {
              createSourceOsc(440, "sine", 0.5);
            }
          }
        });
      });

      ewObj.on("inputDisconnected", ({ room }) => {
        const subs = ewObj.getSubscriptions();
        const activePorts = new Set();
        for (const sub of subs) {
          for (const local of Object.values(sub.portMapping)) activePorts.add(local);
        }
        if (!activePorts.has("audio")) destroySourceOsc();
      });

      ewObj.onInput("drive", (value, meta) => {
        if (typeof value !== "number") return;
        if (meta && meta.unit === "bipolar") {
          // Bipolar modulation: scale around base drive
          const modulated = baseDrive + value * 4; // +/- 4 range
          baseDrive = Math.max(1, Math.min(10, modulated));
          updateShaper();
          return;
        }
        const clamped = Math.max(1, Math.min(10, value));
        baseDrive = clamped;
        updateShaper();
        document.getElementById("wfl-drive").value = Math.round(clamped * 100);
        document.getElementById("wfl-drive-val").textContent = clamped.toFixed(2);
        ewObj.setOutput("drive", clamped);
        refreshStats();
      });

      ewObj.onInput("folds", (value, meta) => {
        if (typeof value !== "number") return;
        const clamped = Math.max(1, Math.min(8, Math.round(value)));
        baseFolds = clamped;
        updateShaper();
        document.getElementById("wfl-folds").value = clamped;
        document.getElementById("wfl-folds-val").textContent = String(clamped);
        ewObj.setOutput("folds", clamped);
        refreshStats();
      });

      ewObj.onInput("symmetry", (value, meta) => {
        if (typeof value !== "number") return;
        if (meta && meta.unit === "bipolar") {
          baseSymmetry = Math.max(-1, Math.min(1, value));
          updateShaper();
          return;
        }
        const clamped = Math.max(-1, Math.min(1, value));
        baseSymmetry = clamped;
        updateShaper();
        document.getElementById("wfl-symmetry").value = Math.round(clamped * 100);
        document.getElementById("wfl-symmetry-val").textContent = clamped.toFixed(2);
        ewObj.setOutput("symmetry", clamped);
        refreshStats();
      });

      ewObj.onInput("gain", (value, meta) => {
        if (typeof value !== "number") return;
        const clamped = Math.max(0, Math.min(1, value));
        baseGain = clamped;
        if (outputGain) outputGain.gain.rampTo(clamped, 0.01);
        document.getElementById("wfl-gain").value = Math.round(clamped * 100);
        document.getElementById("wfl-gain-val").textContent = clamped.toFixed(2);
        ewObj.setOutput("gain", clamped);
        refreshStats();
      });

      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !folderRunning) await startFolder();
        else if (!value && folderRunning) stopFolder();
      });

      ewObj.onInput("outputMode", (value) => {
        if (typeof value !== "string") return;
        if (["audio", "control", "both"].includes(value)) {
          outputMode = value;
          document.getElementById("wfl-output-mode").value = value;
          applyOutputRouting();
        }
      });

      // -- Output stats -----------------------------------------------

      function refreshStats() {
        updateOutputStats(ewObj, [
          { port: "drive", label: "DRIVE", formatter: (v) => v !== undefined ? v.toFixed(2) : "2.00" },
          { port: "folds", label: "FOLDS", formatter: (v) => v !== undefined ? String(v) : "3" },
          { port: "symmetry", label: "SYM", formatter: (v) => v !== undefined ? v.toFixed(2) : "0.00" },
          { port: "gain", label: "GAIN", formatter: (v) => v !== undefined ? v.toFixed(2) : "0.70" },
        ]);
      }

      // -- Transfer function curve canvas -----------------------------

      const curveCanvas = document.getElementById("wfl-curve-canvas");
      const curveCtx = curveCanvas.getContext("2d");

      function resizeCurveCanvas() {
        const rect = curveCanvas.parentElement.getBoundingClientRect();
        curveCanvas.width = rect.width - 36; // account for panel padding
        curveCanvas.height = 140;
      }

      function drawCurve() {
        const w = curveCanvas.width;
        const h = curveCanvas.height;
        if (w === 0 || h === 0) return;
        curveCtx.fillStyle = "#080808";
        curveCtx.fillRect(0, 0, w, h);

        // Grid
        curveCtx.strokeStyle = "rgba(128, 128, 128, 0.08)";
        curveCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { curveCtx.beginPath(); curveCtx.moveTo(0, y); curveCtx.lineTo(w, y); curveCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { curveCtx.beginPath(); curveCtx.moveTo(x, 0); curveCtx.lineTo(x, h); curveCtx.stroke(); }

        // Axes
        curveCtx.strokeStyle = "rgba(128, 128, 128, 0.25)";
        curveCtx.beginPath(); curveCtx.moveTo(0, h / 2); curveCtx.lineTo(w, h / 2); curveCtx.stroke();
        curveCtx.beginPath(); curveCtx.moveTo(w / 2, 0); curveCtx.lineTo(w / 2, h); curveCtx.stroke();

        // Linear reference (diagonal)
        curveCtx.strokeStyle = "rgba(128, 128, 128, 0.15)";
        curveCtx.setLineDash([4, 4]);
        curveCtx.beginPath(); curveCtx.moveTo(0, h); curveCtx.lineTo(w, 0); curveCtx.stroke();
        curveCtx.setLineDash([]);

        // Transfer function curve
        const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        curveCtx.strokeStyle = accent;
        curveCtx.lineWidth = 2;
        curveCtx.shadowColor = "rgba(210, 210, 210, 0.4)";
        curveCtx.shadowBlur = 6;
        curveCtx.beginPath();
        const steps = Math.min(w, 400);
        for (let i = 0; i <= steps; i++) {
          const inputVal = (i / steps) * 2 - 1; // -1 to +1
          const outputVal = fold(inputVal, baseFolds, baseSymmetry);
          const x = (i / steps) * w;
          const y = ((1 - outputVal) / 2) * h;
          if (i === 0) curveCtx.moveTo(x, y); else curveCtx.lineTo(x, y);
        }
        curveCtx.stroke();
        curveCtx.shadowBlur = 0;
      }

      // -- Scope ------------------------------------------------------

      const scopeCanvas = document.getElementById("wfl-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);
        const w = scopeCanvas.width;
        const h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }

        // Center line
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        if (!analyser || !folderRunning) return;

        const data = analyser.getValue();
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210, 210, 210, 0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const x = (i / data.length) * w;
          const y = ((1 - data[i]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      // -- Room UI ----------------------------------------------------

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        ewObj.setPrivate(roomPrivate);
        updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false;
        updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });

      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER WAVEFOLDERS AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // -- Initialize -------------------------------------------------

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);

        ewObj._outputValues["drive"] = 2;
        ewObj._outputValues["folds"] = 3;
        ewObj._outputValues["symmetry"] = 0;
        ewObj._outputValues["gain"] = 0.7;
        ewObj._outputValues["playing"] = false;
        ewObj._outputValues["outputMode"] = "audio";

        refreshStats();
        resizeScope();
        resizeCurveCanvas();
        drawCurve();
        drawScope();
      })();

      window.addEventListener("resize", () => {
        resizeScope();
        resizeCurveCanvas();
        drawCurve();
      });
    </script>
  </body>
</html>
