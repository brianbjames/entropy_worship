<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COMPRESSOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css"
    />
    <link rel="stylesheet" href="../lib/ewuilib.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
      #cmp-scope {
        display: block;
        width: 100%;
        height: 120px;
        background: #0e0400;
      }
      .param-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .param-row .control-label {
        min-width: 80px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      #power-toggle .toggle-track.on .toggle-thumb {
        left: 22px;
      }
      #meta .toggle-wrap {
        align-self: center;
      }
      #meta .toggle-track {
        margin: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
      }
      .param-row .range-val {
        min-width: 72px;
        text-align: right;
      }
      .room-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid var(--border);
        margin-bottom: 6px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        transition: border-color 0.14s, background 0.14s;
        cursor: pointer;
      }
      .room-entry:hover {
        border-color: var(--accent);
        background: rgba(var(--accent-rgb), 0.06);
      }
      .room-entry-name {
        color: var(--accent);
      }
      .room-entry-info {
        font-size: 0.68rem;
        color: var(--dim);
        letter-spacing: 0.08em;
      }
      .mod-row {
        opacity: 0.3;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .mod-row.active {
        opacity: 1;
        pointer-events: auto;
      }
      .gr-meter-wrap {
        position: relative;
        height: 18px;
        background: #111;
        border: 1px solid var(--border);
        margin-top: 4px;
        overflow: hidden;
      }
      .gr-meter-bar {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        background: var(--accent);
        opacity: 0.7;
        transition: width 0.05s linear;
      }
      .gr-meter-label {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        color: var(--text);
        z-index: 1;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        updateOutputStats,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "CMP-1",
        objectType: "compressor",
        roomPrefix: "cmp",
        inputs: [
          {
            port: "audio",
            type: "room",
            unit: "",
            default: null,
          },
          {
            port: "threshold",
            type: "number",
            unit: "dB",
            min: -60,
            max: 0,
            default: -24,
          },
          {
            port: "ratio",
            type: "number",
            unit: "",
            min: 1,
            max: 20,
            default: 4,
          },
          {
            port: "attack",
            type: "number",
            unit: "s",
            min: 0.001,
            max: 1,
            default: 0.003,
          },
          {
            port: "release",
            type: "number",
            unit: "s",
            min: 0.01,
            max: 2,
            default: 0.25,
          },
          {
            port: "knee",
            type: "number",
            unit: "dB",
            min: 0,
            max: 40,
            default: 30,
          },
        ],
        outputs: [
          { port: "threshold", type: "number", unit: "dB" },
          { port: "ratio", type: "number" },
          { port: "attack", type: "number", unit: "s" },
          { port: "release", type: "number", unit: "s" },
          { port: "knee", type: "number", unit: "dB" },
          { port: "reduction", type: "number", unit: "dB" },
          { port: "gain", type: "number" },
          { port: "playing", type: "boolean" },
          { port: "outputMode", type: "string" },
        ],
      });

      // ── Compressor state ───────────────────────────────────────

      let baseThreshold = -24;
      let baseRatio = 4;
      let baseAttack = 0.003;
      let baseRelease = 0.25;
      let baseKnee = 30;
      let baseGain = 1;

      // Modulation depths for bipolar input
      let thresholdModDepth = 20;
      let ratioModDepth = 8;
      let attackModDepth = 0.2;
      let releaseModDepth = 0.5;
      let kneeModDepth = 15;

      // ── Tone.js audio ──────────────────────────────────────────

      let compressor = null;
      let makeupGain = null;
      let analyser = null;
      let fftAnalyser = null;
      let compRunning = false;
      let audioReady = false;
      let outputMode = "audio";

      // Local source oscillator — created when a room is linked
      // to the audio input. Mirrors the remote oscillator's params.
      let sourceOsc = null;
      let sourceGain = null;
      let sourceConnected = false;

      // Modulation oscillators for each parameter
      let threshModOsc = null;
      let threshModGain = null;
      let threshModWanted = false;
      let threshModRemoteFreq = 2;
      let threshModRemoteType = "sine";

      let ratioModOsc = null;
      let ratioModGainNode = null;
      let ratioModWanted = false;
      let ratioModRemoteFreq = 2;
      let ratioModRemoteType = "sine";

      let attackModOsc = null;
      let attackModGainNode = null;
      let attackModWanted = false;
      let attackModRemoteFreq = 2;
      let attackModRemoteType = "sine";

      let releaseModOsc = null;
      let releaseModGainNode = null;
      let releaseModWanted = false;
      let releaseModRemoteFreq = 2;
      let releaseModRemoteType = "sine";

      let kneeModOsc = null;
      let kneeModGainNode = null;
      let kneeModWanted = false;
      let kneeModRemoteFreq = 2;
      let kneeModRemoteType = "sine";

      async function ensureAudio() {
        if (audioReady) return;
        compressor = new Tone.Compressor({
          threshold: baseThreshold,
          ratio: baseRatio,
          attack: baseAttack,
          release: baseRelease,
          knee: baseKnee,
        });
        makeupGain = new Tone.Gain(baseGain);
        compressor.connect(makeupGain);
        applyOutputRouting();
        analyser = new Tone.Analyser("waveform", 256);
        compressor.connect(analyser);
        fftAnalyser = new Tone.Analyser("fft", 1024);
        compressor.connect(fftAnalyser);
        audioReady = true;
      }

      function applyOutputRouting() {
        if (!makeupGain) return;
        makeupGain.disconnect();
        if (outputMode === "audio" || outputMode === "both") {
          makeupGain.toDestination();
        }
      }

      // ── Source oscillator (audio input from room) ──────────────

      function createSourceOsc(freq, type, gain) {
        if (sourceOsc) destroySourceOsc();
        sourceOsc = new Tone.Oscillator({ frequency: freq || 440, type: type || "sine" });
        sourceGain = new Tone.Gain(gain !== undefined ? gain : 0.5);
        sourceOsc.connect(sourceGain);
        sourceGain.connect(compressor);
        if (compRunning) sourceOsc.start();
        sourceConnected = true;
      }

      function destroySourceOsc() {
        if (sourceOsc) {
          try { sourceOsc.stop(); } catch (_) {}
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = null;
        }
        if (sourceGain) {
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = null;
        }
        sourceConnected = false;
      }

      async function startComp() {
        if (compRunning) return;
        await Tone.start();
        await ensureAudio();
        if (sourceOsc) sourceOsc.start();
        compRunning = true;
        updatePowerUI();
        ewObj.setOutput("playing", true, { immediate: true });
      }

      function stopComp() {
        if (!compRunning) return;
        if (sourceOsc) {
          const freq = sourceOsc.frequency.value;
          const type = sourceOsc.type;
          const gain = sourceGain ? sourceGain.gain.value : 0.5;
          sourceOsc.stop();
          sourceOsc.disconnect();
          sourceOsc.dispose();
          sourceOsc = new Tone.Oscillator({ frequency: freq, type: type });
          sourceGain.disconnect();
          sourceGain.dispose();
          sourceGain = new Tone.Gain(gain);
          sourceOsc.connect(sourceGain);
          sourceGain.connect(compressor);
        }
        compRunning = false;
        updatePowerUI();
        ewObj.setOutput("playing", false, { immediate: true });
      }

      // ── Log mapping helpers ────────────────────────────────────

      const ATK_MIN = 0.001;
      const ATK_MAX = 1;
      const ATK_LOG_MIN = Math.log(ATK_MIN);
      const ATK_LOG_MAX = Math.log(ATK_MAX);

      function sliderToAttack(val) {
        return Math.exp(ATK_LOG_MIN + (val / 1000) * (ATK_LOG_MAX - ATK_LOG_MIN));
      }
      function attackToSlider(v) {
        return Math.round(((Math.log(v) - ATK_LOG_MIN) / (ATK_LOG_MAX - ATK_LOG_MIN)) * 1000);
      }
      function formatAttack(val) {
        const s = sliderToAttack(val);
        return s >= 1 ? s.toFixed(2) + " s" : (s * 1000).toFixed(1) + " ms";
      }

      const REL_MIN = 0.01;
      const REL_MAX = 2;
      const REL_LOG_MIN = Math.log(REL_MIN);
      const REL_LOG_MAX = Math.log(REL_MAX);

      function sliderToRelease(val) {
        return Math.exp(REL_LOG_MIN + (val / 1000) * (REL_LOG_MAX - REL_LOG_MIN));
      }
      function releaseToSlider(v) {
        return Math.round(((Math.log(v) - REL_LOG_MIN) / (REL_LOG_MAX - REL_LOG_MIN)) * 1000);
      }
      function formatRelease(val) {
        const s = sliderToRelease(val);
        return s >= 1 ? s.toFixed(2) + " s" : (s * 1000).toFixed(1) + " ms";
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "COMPRESSOR", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <select id="cmp-output-mode" style="width:auto; padding:3px 24px 3px 8px">
          <option value="audio">AUDIO</option>
          <option value="control">CONTROL</option>
          <option value="both">BOTH</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls panel
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `
        <div class="param-row">
          <div class="control-label">THRESH</div>
          <input type="range" id="cmp-threshold" min="-60" max="0" value="-24" />
          <span class="range-val" id="cmp-threshold-val">-24 dB</span>
        </div>

        <div class="param-row">
          <div class="control-label">RATIO</div>
          <input type="range" id="cmp-ratio" min="10" max="200" value="40" />
          <span class="range-val" id="cmp-ratio-val">4.0</span>
        </div>

        <div class="param-row">
          <div class="control-label">ATTACK</div>
          <input type="range" id="cmp-attack" min="0" max="1000" value="${attackToSlider(0.003)}" />
          <span class="range-val" id="cmp-attack-val">${formatAttack(attackToSlider(0.003))}</span>
        </div>

        <div class="param-row">
          <div class="control-label">RELEASE</div>
          <input type="range" id="cmp-release" min="0" max="1000" value="${releaseToSlider(0.25)}" />
          <span class="range-val" id="cmp-release-val">${formatRelease(releaseToSlider(0.25))}</span>
        </div>

        <div class="param-row">
          <div class="control-label">KNEE</div>
          <input type="range" id="cmp-knee" min="0" max="400" value="300" />
          <span class="range-val" id="cmp-knee-val">30.0 dB</span>
        </div>

        <div class="param-row">
          <div class="control-label">MAKEUP</div>
          <input type="range" id="cmp-gain" min="0" max="200" value="100" />
          <span class="range-val" id="cmp-gain-val">1.00</span>
        </div>

        <div class="control-group" style="margin-top:10px">
          <div class="control-label">GR METER</div>
          <div class="gr-meter-wrap">
            <div class="gr-meter-bar" id="gr-bar"></div>
            <div class="gr-meter-label" id="gr-label">0.0 dB</div>
          </div>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="cmp-scope"></canvas>
            <canvas id="cmp-freq" style="display:block; width:100%; height:80px; background:#0e0400; margin-top:2px"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms panel
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE OBJECTS //</div>
        <div id="rooms-list">
          <span class="type-dim">NO OTHER OBJECTS AVAILABLE</span>
        </div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">&copy; 2026 ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Wire controls ──────────────────────────────────────────

      function updatePowerUI() {
        const track = document.getElementById("power-track");
        track.classList.toggle("on", compRunning);
      }

      document.getElementById("power-toggle").addEventListener("click", () => {
        if (compRunning) stopComp(); else startComp();
      });

      // Output mode
      document.getElementById("cmp-output-mode").addEventListener("change", (e) => {
        outputMode = e.target.value;
        applyOutputRouting();
        ewObj.setOutput("outputMode", outputMode, { immediate: true });
      });

      // Threshold slider
      wireRange("cmp-threshold", "cmp-threshold-val", (v) => v + " dB");
      document.getElementById("cmp-threshold").addEventListener("input", (e) => {
        baseThreshold = +e.target.value;
        if (compressor) compressor.threshold.rampTo(baseThreshold, 0.01);
        ewObj.setOutput("threshold", baseThreshold, { unit: "dB" });
        refreshStats();
      });

      // Ratio slider (10-200 maps to 1.0-20.0)
      wireRange("cmp-ratio", "cmp-ratio-val", (v) => (v / 10).toFixed(1));
      document.getElementById("cmp-ratio").addEventListener("input", (e) => {
        baseRatio = +e.target.value / 10;
        if (compressor) compressor.ratio.rampTo(baseRatio, 0.01);
        ewObj.setOutput("ratio", Math.round(baseRatio * 10) / 10);
        refreshStats();
      });

      // Attack slider (logarithmic)
      const atkSlider = document.getElementById("cmp-attack");
      const atkVal = document.getElementById("cmp-attack-val");
      atkSlider.addEventListener("input", () => {
        const atk = sliderToAttack(+atkSlider.value);
        baseAttack = atk;
        atkVal.textContent = formatAttack(+atkSlider.value);
        const pct = (+atkSlider.value / 1000) * 100;
        atkSlider.style.setProperty("--val", pct + "%");
        if (compressor) compressor.attack.rampTo(atk, 0.01);
        ewObj.setOutput("attack", Math.round(atk * 10000) / 10000, { unit: "s" });
        refreshStats();
      });
      (() => {
        const pct = (+atkSlider.value / 1000) * 100;
        atkSlider.style.setProperty("--val", pct + "%");
      })();

      // Release slider (logarithmic)
      const relSlider = document.getElementById("cmp-release");
      const relVal = document.getElementById("cmp-release-val");
      relSlider.addEventListener("input", () => {
        const rel = sliderToRelease(+relSlider.value);
        baseRelease = rel;
        relVal.textContent = formatRelease(+relSlider.value);
        const pct = (+relSlider.value / 1000) * 100;
        relSlider.style.setProperty("--val", pct + "%");
        if (compressor) compressor.release.rampTo(rel, 0.01);
        ewObj.setOutput("release", Math.round(rel * 10000) / 10000, { unit: "s" });
        refreshStats();
      });
      (() => {
        const pct = (+relSlider.value / 1000) * 100;
        relSlider.style.setProperty("--val", pct + "%");
      })();

      // Knee slider (0-400 maps to 0-40 dB)
      wireRange("cmp-knee", "cmp-knee-val", (v) => (v / 10).toFixed(1) + " dB");
      document.getElementById("cmp-knee").addEventListener("input", (e) => {
        baseKnee = +e.target.value / 10;
        if (compressor) compressor.knee.rampTo(baseKnee, 0.01);
        ewObj.setOutput("knee", Math.round(baseKnee * 10) / 10, { unit: "dB" });
        refreshStats();
      });

      // Makeup gain slider (0-200 maps to 0-2)
      wireRange("cmp-gain", "cmp-gain-val", (v) => (v / 100).toFixed(2));
      document.getElementById("cmp-gain").addEventListener("input", (e) => {
        baseGain = +e.target.value / 100;
        if (makeupGain) makeupGain.gain.rampTo(baseGain, 0.01);
        ewObj.setOutput("gain", Math.round(baseGain * 100) / 100);
        refreshStats();
      });

      // ── GR Meter ───────────────────────────────────────────────

      const grBar = document.getElementById("gr-bar");
      const grLabel = document.getElementById("gr-label");

      function updateGRMeter() {
        requestAnimationFrame(updateGRMeter);
        if (!compressor || !compRunning) {
          grBar.style.width = "0%";
          grLabel.textContent = "0.0 dB";
          return;
        }
        // compressor.reduction is a negative number (dB of gain reduction)
        const reduction = compressor.reduction;
        const absReduction = Math.abs(reduction);
        // Scale: 0 dB = 0%, 40 dB = 100%
        const pct = Math.min(100, (absReduction / 40) * 100);
        grBar.style.width = pct + "%";
        grLabel.textContent = reduction.toFixed(1) + " dB";
        ewObj.setOutput("reduction", Math.round(reduction * 10) / 10, { unit: "dB" });
      }
      updateGRMeter();

      // ── Input signal handling ──────────────────────────────────

      ewObj.onInput("audio", (value, meta) => {
        if (meta && meta.unit === "bipolar") return;
        if (!compressor) return;

        if (meta && meta.port === "frequency" && typeof value === "number") {
          if (!sourceConnected) {
            createSourceOsc(value, "sine", 0.5);
          } else if (sourceOsc) {
            sourceOsc.frequency.value = value;
          }
        } else if (meta && meta.port === "waveform" && typeof value === "string") {
          if (sourceOsc) { try { sourceOsc.type = value; } catch (_) {} }
        } else if (meta && meta.port === "gain" && typeof value === "number") {
          if (sourceGain) sourceGain.gain.value = Math.max(0, Math.min(1, value));
        } else if (meta && meta.port === "detune" && typeof value === "number") {
          if (sourceOsc) sourceOsc.detune.value = value;
        } else if (meta && meta.port === "playing" && typeof value === "boolean") {
          if (value && sourceConnected && !compRunning) startComp();
        }
      });

      ewObj.on("inputConnected", ({ room, portMapping }) => {
        ensureAudio().then(() => {
          for (const localPort of Object.values(portMapping)) {
            if (localPort === "audio" && !sourceConnected) {
              createSourceOsc(440, "sine", 0.5);
            }
          }
        });
      });

      ewObj.on("inputDisconnected", ({ room }) => {
        const subs = ewObj.getSubscriptions();
        const activePorts = new Set();
        for (const sub of subs) {
          for (const local of Object.values(sub.portMapping)) activePorts.add(local);
        }
        if (!activePorts.has("audio")) destroySourceOsc();
      });

      ewObj.onInput("threshold", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseThreshold + value * thresholdModDepth;
          const clamped = Math.max(-60, Math.min(0, modulated));
          if (compressor) compressor.threshold.rampTo(clamped, 0.012);
          return;
        }
        if (typeof value === "number") {
          const clamped = Math.max(-60, Math.min(0, value));
          baseThreshold = clamped;
          if (compressor) compressor.threshold.rampTo(clamped, 0.01);
          document.getElementById("cmp-threshold").value = clamped;
          document.getElementById("cmp-threshold-val").textContent = clamped + " dB";
          ewObj.setOutput("threshold", clamped, { unit: "dB" });
          refreshStats();
        }
      });

      ewObj.onInput("ratio", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseRatio + value * ratioModDepth;
          const clamped = Math.max(1, Math.min(20, modulated));
          if (compressor) compressor.ratio.rampTo(clamped, 0.012);
          return;
        }
        if (typeof value === "number") {
          const clamped = Math.max(1, Math.min(20, value));
          baseRatio = clamped;
          if (compressor) compressor.ratio.rampTo(clamped, 0.01);
          document.getElementById("cmp-ratio").value = Math.round(clamped * 10);
          document.getElementById("cmp-ratio-val").textContent = clamped.toFixed(1);
          ewObj.setOutput("ratio", Math.round(clamped * 10) / 10);
          refreshStats();
        }
      });

      ewObj.onInput("attack", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseAttack + value * attackModDepth;
          const clamped = Math.max(0.001, Math.min(1, modulated));
          if (compressor) compressor.attack.rampTo(clamped, 0.012);
          return;
        }
        if (typeof value === "number") {
          const clamped = Math.max(0.001, Math.min(1, value));
          baseAttack = clamped;
          if (compressor) compressor.attack.rampTo(clamped, 0.01);
          atkSlider.value = attackToSlider(clamped);
          atkVal.textContent = formatAttack(attackToSlider(clamped));
          const pct = (+atkSlider.value / 1000) * 100;
          atkSlider.style.setProperty("--val", pct + "%");
          ewObj.setOutput("attack", Math.round(clamped * 10000) / 10000, { unit: "s" });
          refreshStats();
        }
      });

      ewObj.onInput("release", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseRelease + value * releaseModDepth;
          const clamped = Math.max(0.01, Math.min(2, modulated));
          if (compressor) compressor.release.rampTo(clamped, 0.012);
          return;
        }
        if (typeof value === "number") {
          const clamped = Math.max(0.01, Math.min(2, value));
          baseRelease = clamped;
          if (compressor) compressor.release.rampTo(clamped, 0.01);
          relSlider.value = releaseToSlider(clamped);
          relVal.textContent = formatRelease(releaseToSlider(clamped));
          const pct = (+relSlider.value / 1000) * 100;
          relSlider.style.setProperty("--val", pct + "%");
          ewObj.setOutput("release", Math.round(clamped * 10000) / 10000, { unit: "s" });
          refreshStats();
        }
      });

      ewObj.onInput("knee", (value, meta) => {
        if (meta && meta.unit === "bipolar" && typeof value === "number") {
          const modulated = baseKnee + value * kneeModDepth;
          const clamped = Math.max(0, Math.min(40, modulated));
          if (compressor) compressor.knee.rampTo(clamped, 0.012);
          return;
        }
        if (typeof value === "number") {
          const clamped = Math.max(0, Math.min(40, value));
          baseKnee = clamped;
          if (compressor) compressor.knee.rampTo(clamped, 0.01);
          document.getElementById("cmp-knee").value = Math.round(clamped * 10);
          document.getElementById("cmp-knee-val").textContent = clamped.toFixed(1) + " dB";
          ewObj.setOutput("knee", Math.round(clamped * 10) / 10, { unit: "dB" });
          refreshStats();
        }
      });

      // Room state sync
      ewObj.onInput("playing", async (value) => {
        if (typeof value !== "boolean") return;
        if (value && !compRunning) await startComp();
        else if (!value && compRunning) stopComp();
      });

      ewObj.onInput("outputMode", (value) => {
        if (typeof value !== "string") return;
        if (["audio", "control", "both"].includes(value)) {
          outputMode = value;
          document.getElementById("cmp-output-mode").value = value;
          applyOutputRouting();
        }
      });

      // ── Output stats ───────────────────────────────────────────

      function refreshStats() {
        updateOutputStats(ewObj, [
          { port: "threshold", label: "THR", unit: " dB", formatter: (v) => v !== undefined ? v.toFixed(0) : "-" },
          { port: "ratio", label: "RAT", formatter: (v) => v !== undefined ? v.toFixed(1) : "-" },
          { port: "attack", label: "ATK", formatter: (v) => v !== undefined ? (v >= 1 ? v.toFixed(2) + "s" : (v * 1000).toFixed(1) + "ms") : "-" },
          { port: "release", label: "REL", formatter: (v) => v !== undefined ? (v >= 1 ? v.toFixed(2) + "s" : (v * 1000).toFixed(0) + "ms") : "-" },
          { port: "knee", label: "KNEE", unit: " dB", formatter: (v) => v !== undefined ? v.toFixed(1) : "-" },
          { port: "reduction", label: "GR", unit: " dB", formatter: (v) => v !== undefined ? v.toFixed(1) : "0.0" },
        ]);
      }

      // ── Scope ──────────────────────────────────────────────────

      const scopeCanvas = document.getElementById("cmp-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);
        const w = scopeCanvas.width;
        const h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }

        // Center line
        scopeCtx.strokeStyle = "rgba(128, 128, 128, 0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        if (!analyser || !compRunning) return;

        const data = analyser.getValue();
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210, 210, 210, 0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const x = (i / data.length) * w;
          const y = ((1 - data[i]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;

        drawFreq();
      }

      // ── Frequency spectrum ─────────────────────────────────────

      const freqCanvas = document.getElementById("cmp-freq");
      const freqCtx = freqCanvas.getContext("2d");

      function resizeFreq() {
        const rect = freqCanvas.parentElement.getBoundingClientRect();
        freqCanvas.width = rect.width;
        freqCanvas.height = 80;
      }

      function drawFreq() {
        const w = freqCanvas.width;
        const h = freqCanvas.height;
        freqCtx.fillStyle = "#0e0400";
        freqCtx.fillRect(0, 0, w, h);
        if (!fftAnalyser) return;
        const data = fftAnalyser.getValue();
        const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        const len = data.length;
        freqCtx.fillStyle = accent;
        freqCtx.globalAlpha = 0.7;
        for (let x = 0; x < w; x++) {
          const pct = x / w;
          const bin = Math.floor(Math.pow(pct, 2) * len);
          if (bin >= len) continue;
          const db = data[bin];
          const norm = Math.max(0, (db + 100) / 100);
          const barH = norm * h;
          freqCtx.fillRect(x, h - barH, 1, barH);
        }
        freqCtx.globalAlpha = 1.0;
      }

      // ── Room UI ────────────────────────────────────────────────

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate;
        ewObj.setPrivate(roomPrivate);
        updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false;
        updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });

      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER OBJECTS AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // ── Initialize ─────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);

        ewObj._outputValues["threshold"] = -24;
        ewObj._outputValues["ratio"] = 4;
        ewObj._outputValues["attack"] = 0.003;
        ewObj._outputValues["release"] = 0.25;
        ewObj._outputValues["knee"] = 30;
        ewObj._outputValues["reduction"] = 0;
        ewObj._outputValues["gain"] = 1;
        ewObj._outputValues["playing"] = false;
        ewObj._outputValues["outputMode"] = "audio";

        refreshStats();
        resizeScope();
        resizeFreq();
        drawScope();
      })();

      window.addEventListener("resize", () => { resizeScope(); resizeFreq(); });
    </script>
  </body>
</html>
