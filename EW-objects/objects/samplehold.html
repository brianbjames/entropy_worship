<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMPLE & HOLD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/augmented-ui@2/augmented-ui.min.css" />
    <link rel="stylesheet" href="../lib/ewuilib.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
      #sh-scope {
        display: block; width: 100%; height: 120px; background: #080808;
      }
      .param-row {
        display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
      }
      .param-row .control-label { min-width: 80px; margin-bottom: 0; flex-shrink: 0; }
      .param-row input[type="range"] { flex: 1; }
      .param-row .range-val { min-width: 72px; text-align: right; }
      #power-toggle .toggle-track.on .toggle-thumb { left: 22px; }
      #meta .toggle-wrap { align-self: center; }
      #meta .toggle-track { margin: 0; }
      .room-entry {
        display: flex; justify-content: space-between; align-items: center;
        padding: 6px 10px; border: 1px solid var(--border); margin-bottom: 6px;
        text-decoration: none; color: var(--text); font-size: 0.82rem;
        letter-spacing: 0.1em; transition: border-color 0.14s, background 0.14s; cursor: pointer;
      }
      .room-entry:hover { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.06); }
      .room-entry-name { color: var(--accent); }
      .room-entry-info { font-size: 0.68rem; color: var(--dim); letter-spacing: 0.08em; }
      .held-value-display {
        font-size: 2.4rem; text-align: center; padding: 10px 0;
        color: var(--accent); letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div id="grid-bg"></div>
    <div id="scanlines"></div>
    <div id="app"></div>

    <script type="module">
      import { EWObject } from "../lib/ew-object-base.js";
      import {
        buildHeaderBar,
        buildInputPanel,
        wireRange,
      } from "../lib/ew-object-ui.js";

      // ── EWObject instance ──────────────────────────────────────

      const ewObj = new EWObject({
        name: "S&H-1",
        objectType: "samplehold",
        roomPrefix: "sh",
        inputs: [
          { port: "signal", type: "number", unit: "bipolar", min: -1, max: 1, default: 0 },
          { port: "trigger", type: "number", unit: "bipolar", min: -1, max: 1, default: 0 },
        ],
        outputs: [
          { port: "signal", type: "number", unit: "bipolar" },
        ],
      });

      // ── S&H state ──────────────────────────────────────────────

      let running = false;
      let heldValue = 0;
      let targetValue = 0;
      let currentSignalValue = 0;
      let prevTriggerValue = 0;
      let slewMs = 0;

      // ── Signal worker ──────────────────────────────────────────

      let signalWorker = null;

      function startWorker() {
        if (signalWorker) return;
        const blob = new Blob([`
          let id = setInterval(() => postMessage("tick"), 10);
          onmessage = () => { clearInterval(id); close(); };
        `], { type: "application/javascript" });
        signalWorker = new Worker(URL.createObjectURL(blob));
        signalWorker.onmessage = () => {
          if (!running) return;
          // Slew interpolation
          if (slewMs > 0) {
            const step = 10 / slewMs; // 10ms tick
            const diff = targetValue - heldValue;
            if (Math.abs(diff) < 0.001) {
              heldValue = targetValue;
            } else {
              heldValue += diff * Math.min(1, step);
            }
          } else {
            heldValue = targetValue;
          }
          const out = Math.round(heldValue * 1000) / 1000;
          ewObj.setOutput("signal", out, { unit: "bipolar" });
          pushScopeValue(out);
        };
      }

      function stopWorker() {
        if (signalWorker) {
          signalWorker.postMessage("stop");
          signalWorker = null;
        }
        ewObj.setOutput("signal", 0, { unit: "bipolar", immediate: true });
      }

      function updatePowerUI() {
        document.getElementById("power-track").classList.toggle("on", running);
      }

      // ── Scope ──────────────────────────────────────────────────

      const SCOPE_SAMPLES = 200;
      let scopeHistory = new Float32Array(SCOPE_SAMPLES);
      let scopeWriteIdx = 0;

      function pushScopeValue(val) {
        scopeHistory[scopeWriteIdx] = val;
        scopeWriteIdx = (scopeWriteIdx + 1) % SCOPE_SAMPLES;
      }

      // ── Build UI ───────────────────────────────────────────────

      const app = document.getElementById("app");

      buildHeaderBar(ewObj, "SAMPLE & HOLD", app);

      document.getElementById("ew-header-controls").innerHTML = `
        <select id="ew-theme" style="width:auto; padding:3px 24px 3px 8px">
          <option value="theme-ethos">ETHOS</option>
          <option value="">AMBER</option>
          <option value="theme-phosphor">PHOSPHOR</option>
          <option value="theme-cobalt">COBALT</option>
          <option value="theme-plasma">PLASMA</option>
          <option value="theme-danger">DANGER</option>
          <option value="theme-matrix">MATRIX</option>
          <option value="theme-solar">SOLAR</option>
          <option value="theme-arctic">ARCTIC</option>
        </select>
        <div class="toggle-wrap" id="power-toggle" style="margin-bottom:0; cursor:pointer">
          <div class="toggle-track" id="power-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      `;

      // Controls
      const controlsPanel = document.createElement("div");
      controlsPanel.className = "hud-panel clip-tr";
      controlsPanel.innerHTML = `
        <div class="held-value-display" id="held-display">0.000</div>
        <div class="param-row">
          <div class="control-label">SLEW</div>
          <input type="range" id="sh-slew" min="0" max="1000" value="0" />
          <span class="range-val" id="sh-slew-val">0 ms</span>
        </div>
      `;
      app.appendChild(controlsPanel);

      // Theme
      document.getElementById("ew-theme").addEventListener("change", (e) => {
        document.documentElement.className = e.target.value;
      });
      document.documentElement.className = "theme-ethos";

      // Scope
      const scopePanel = document.createElement("div");
      scopePanel.className = "hud-panel";
      scopePanel.innerHTML = `
        <div class="screen-wrap">
          <div class="screen-inner" style="padding:0; min-height:auto">
            <canvas id="sh-scope"></canvas>
            <div class="screen-scan"></div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
          </div>
        </div>
      `;
      app.appendChild(scopePanel);

      // Input panel
      buildInputPanel(ewObj, app);

      // Rooms
      const roomsPanel = document.createElement("div");
      roomsPanel.className = "hud-panel";
      roomsPanel.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px">
          <span class="control-label" style="margin:0; flex-shrink:0">ROOM</span>
          <input type="text" id="room-input" placeholder="ROOM-ID" maxlength="32" spellcheck="false" autocomplete="off" style="flex:1">
          <button class="btn btn-sm" id="room-join-btn">JOIN</button>
          <button class="btn btn-sm" id="privacy-btn">PUBLIC</button>
        </div>
        <hr class="hud-divider" style="margin:10px 0">
        <div class="section-title">// AVAILABLE S&H //</div>
        <div id="rooms-list"><span class="type-dim">NO OTHER S&H AVAILABLE</span></div>
      `;
      app.appendChild(roomsPanel);

      // Footer
      const footer = document.createElement("div");
      footer.style.cssText = "text-align:center; padding:20px 0; font-size:0.72rem; letter-spacing:0.22em; color:var(--dim)";
      footer.innerHTML = '<a href="../../index.html" style="color:var(--dim); text-decoration:none">ENTROPY WORSHIP</a>';
      app.appendChild(footer);

      // ── Wire controls ──────────────────────────────────────────

      document.getElementById("power-toggle").addEventListener("click", () => {
        running = !running;
        if (running) startWorker(); else stopWorker();
        updatePowerUI();
      });

      // Slew
      wireRange("sh-slew", "sh-slew-val", (v) => v + " ms");
      document.getElementById("sh-slew").addEventListener("input", (e) => {
        slewMs = +e.target.value;
      });

      // ── Input handlers ─────────────────────────────────────────

      ewObj.onInput("signal", (value, meta) => {
        if (typeof value !== "number") return;
        currentSignalValue = Math.max(-1, Math.min(1, value));
      });

      ewObj.onInput("trigger", (value, meta) => {
        if (typeof value !== "number") return;
        const newVal = value;
        // Positive edge detection
        if (prevTriggerValue <= 0 && newVal > 0) {
          targetValue = currentSignalValue;
          document.getElementById("held-display").textContent = targetValue.toFixed(3);
        }
        prevTriggerValue = newVal;
      });

      // ── Scope drawing ──────────────────────────────────────────

      const scopeCanvas = document.getElementById("sh-scope");
      const scopeCtx = scopeCanvas.getContext("2d");

      function resizeScope() {
        const rect = scopeCanvas.parentElement.getBoundingClientRect();
        scopeCanvas.width = rect.width;
        scopeCanvas.height = 120;
      }

      function drawScope() {
        requestAnimationFrame(drawScope);
        const w = scopeCanvas.width, h = scopeCanvas.height;
        scopeCtx.fillStyle = "#080808";
        scopeCtx.fillRect(0, 0, w, h);

        // Grid
        scopeCtx.strokeStyle = "rgba(128,128,128,0.08)";
        scopeCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(0, y); scopeCtx.lineTo(w, y); scopeCtx.stroke(); }
        for (let x = 0; x < w; x += 20) { scopeCtx.beginPath(); scopeCtx.moveTo(x, 0); scopeCtx.lineTo(x, h); scopeCtx.stroke(); }
        scopeCtx.strokeStyle = "rgba(128,128,128,0.2)";
        scopeCtx.beginPath(); scopeCtx.moveTo(0, h / 2); scopeCtx.lineTo(w, h / 2); scopeCtx.stroke();

        if (!running) return;

        // Draw stepped history
        scopeCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        scopeCtx.lineWidth = 2;
        scopeCtx.shadowColor = "rgba(210,210,210,0.4)";
        scopeCtx.shadowBlur = 6;
        scopeCtx.beginPath();
        for (let i = 0; i < SCOPE_SAMPLES; i++) {
          const idx = (scopeWriteIdx + i) % SCOPE_SAMPLES;
          const x = (i / SCOPE_SAMPLES) * w;
          const y = ((1 - scopeHistory[idx]) / 2) * h;
          if (i === 0) scopeCtx.moveTo(x, y); else scopeCtx.lineTo(x, y);
        }
        scopeCtx.stroke();
        scopeCtx.shadowBlur = 0;
      }

      // ── Room UI ────────────────────────────────────────────────

      ewObj.on("connected", () => {
        document.getElementById("room-input").value = ewObj.getOutputRoom();
      });
      document.getElementById("room-join-btn").addEventListener("click", () => {
        const name = document.getElementById("room-input").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32) || "default";
        location.search = `?room=${encodeURIComponent(name)}`;
      });
      document.getElementById("room-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("room-join-btn").click();
      });

      let roomPrivate = false;
      function updatePrivacyBtn() {
        const btn = document.getElementById("privacy-btn");
        btn.textContent = roomPrivate ? "PRIVATE" : "PUBLIC";
        btn.classList.toggle("active", roomPrivate);
      }
      document.getElementById("privacy-btn").addEventListener("click", () => {
        roomPrivate = !roomPrivate; ewObj.setPrivate(roomPrivate); updatePrivacyBtn();
      });
      ewObj.on("stateSync", (msg) => {
        roomPrivate = msg.private || false; updatePrivacyBtn();
        document.getElementById("room-input").value = msg.room || ewObj.getOutputRoom();
      });
      ewObj.on("roomPrivate", (msg) => { roomPrivate = msg.private; updatePrivacyBtn(); });
      ewObj.on("rooms", (msg) => {
        const el = document.getElementById("rooms-list");
        if (!el) return;
        const currentRoom = ewObj.getOutputRoom();
        const others = (msg.rooms || []).filter((r) => r.name !== currentRoom);
        if (!others.length) { el.innerHTML = '<span class="type-dim">NO OTHER S&H AVAILABLE</span>'; return; }
        el.innerHTML = "";
        for (const r of others) {
          const a = document.createElement("a");
          a.className = "room-entry";
          a.href = `?room=${encodeURIComponent(r.name)}`;
          const objs = r.objects && r.objects.length ? r.objects.join(", ").toUpperCase() : "";
          a.innerHTML = `<span class="room-entry-name">${r.name}</span><span class="room-entry-info">${r.clients} PLR${objs ? " · " + objs : ""}</span>`;
          el.appendChild(a);
        }
      });

      // ── Initialize ─────────────────────────────────────────────

      (() => {
        const urlRoom = new URLSearchParams(location.search).get("room");
        ewObj.connectOutput(urlRoom || undefined);
        resizeScope();
        drawScope();
      })();

      window.addEventListener("resize", resizeScope);
    </script>
  </body>
</html>
