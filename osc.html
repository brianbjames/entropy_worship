<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Oscillator</title>
</head>
<body>

<h1>JavaScript Oscillator</h1>

<button id="startButton">Start Oscillator</button>
<button id="stopButton">Stop Oscillator</button>

<script>
    // Create a new AudioContext
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // Declare an oscillator variable
    let oscillator;

    // Start the oscillator
    function startOscillator() {
        // Create an oscillator node
        oscillator = audioContext.createOscillator();
        
        // Set the frequency (in Hz) of the oscillator (e.g., 440 Hz for A4 note)
        oscillator.frequency.setValueAtTime(440, audioContext.currentTime);  // A4 note
        
        // Set the waveform type (sine wave in this case)
        oscillator.type = 'sine';
        
        // Connect the oscillator to the audio context's destination (the speakers)
        oscillator.connect(audioContext.destination);
        
        // Start the oscillator
        oscillator.start();
    }

    // Stop the oscillator
    function stopOscillator() {
        if (oscillator) {
            oscillator.stop();
            oscillator.disconnect();
        }
    }

    // Add event listeners to the buttons
    document.getElementById('startButton').addEventListener('click', startOscillator);
    document.getElementById('stopButton').addEventListener('click', stopOscillator);
</script>

</body>
</html>
