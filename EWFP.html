<script type="importmap">
  {

<body>




<script type="importmap">
  {
    "imports": {
      "three": "../build/three.module.js",
      "three/addons/": "./jsm/"
    }
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

<div id="container"></div>
<script type="module">

  import * as THREE from 'three';
  import Stats from 'three/addons/libs/stats.module.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { Octree } from 'three/addons/math/Octree.js';
  import { OctreeHelper } from 'three/addons/helpers/OctreeHelper.js';
  import { Capsule } from 'three/addons/math/Capsule.js';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

  const clock = new THREE.Clock();
  const scene = new THREE.Scene();
  scene.background = new THREE.Color( 0x330000 );
  scene.fog = new THREE.Fog( 0x88ccee, 0, 50 );

  const camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 1000 );
  camera.rotation.order = 'YXZ';

  const fillLight1 = new THREE.HemisphereLight( 0x8dc1de, 0x00668d, 1.5 );
  fillLight1.position.set( 2, 1, 1 );
  scene.add( fillLight1 );

  const directionalLight = new THREE.DirectionalLight( 0xffffff, 2.5 );
  directionalLight.position.set( - 5, 25, - 1 );
  directionalLight.castShadow = true;
  directionalLight.shadow.camera.near = 0.01;
  directionalLight.shadow.camera.far = 500;
  directionalLight.shadow.camera.right = 30;
  directionalLight.shadow.camera.left = - 30;
  directionalLight.shadow.camera.top	= 30;
  directionalLight.shadow.camera.bottom = - 30;
  directionalLight.shadow.mapSize.width = 1024;
  directionalLight.shadow.mapSize.height = 1024;
  directionalLight.shadow.radius = 4;
  directionalLight.shadow.bias = - 0.00006;
  scene.add( directionalLight );

  const container = document.getElementById( 'container' );

  const renderer = new THREE.WebGLRenderer( { antialias: true } );
  renderer.setPixelRatio( window.devicePixelRatio );
  renderer.setSize( window.innerWidth, window.innerHeight );
  renderer.setAnimationLoop( animate );
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.VSMShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  container.appendChild( renderer.domElement );

  const stats = new Stats();
  stats.domElement.style.position = 'absolute';
  stats.domElement.style.top = '0px';
  //container.appendChild( stats.domElement );

  const GRAVITY = 30;

  const NUM_SPHERES = 100;
  const SPHERE_RADIUS = 0.2;

  const STEPS_PER_FRAME = 5;

  const sphereGeometry = new THREE.IcosahedronGeometry( SPHERE_RADIUS, 5 );
  const sphereMaterial = new THREE.MeshLambertMaterial( { color: 0xdede8d } );

  const spheres = [];
  let sphereIdx = 0;

  for ( let i = 0; i < NUM_SPHERES; i ++ ) {

    const sphere = new THREE.Mesh( sphereGeometry, sphereMaterial );
    sphere.castShadow = true;
    sphere.receiveShadow = true;

    scene.add( sphere );

    spheres.push( {
      mesh: sphere,
      collider: new THREE.Sphere( new THREE.Vector3( 0, - 100, 0 ), SPHERE_RADIUS ),
      velocity: new THREE.Vector3()
    } );

  }

  const worldOctree = new Octree();

  const playerCollider = new Capsule( new THREE.Vector3( 0, 0.35, 0 ), new THREE.Vector3( 0, 1, 0 ), 0.35 );

  const playerVelocity = new THREE.Vector3();
  const playerDirection = new THREE.Vector3();

  let playerOnFloor = false;
  let mouseTime = 0;

  const keyStates = {};

  const vector1 = new THREE.Vector3();
  const vector2 = new THREE.Vector3();
  const vector3 = new THREE.Vector3();

  document.addEventListener( 'keydown', ( event ) => {

    keyStates[ event.code ] = true;

  } );

  document.addEventListener( 'keyup', ( event ) => {

    keyStates[ event.code ] = false;

  } );

  container.addEventListener('mousedown', () => {
  console.log('Mouse down detected, requesting pointer lock.');
  document.body.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === document.body) {
    console.log('Pointer lock activated.');
  } else {
    console.log('Pointer lock deactivated.');
  }
});

document.addEventListener('mouseup', () => {
    console.log('Mouse up detected');
    if (document.pointerLockElement !== null) throwBall();
});


document.body.addEventListener('mousemove', (event) => {
  if (document.pointerLockElement === document.body) {
    camera.rotation.y -= event.movementX / 500;
    camera.rotation.x -= event.movementY / 500;

    // Clamp vertical rotation
    camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
  } else {
    console.log('Pointer lock not active.');
  }
});








  window.addEventListener( 'resize', onWindowResize );

  function onWindowResize() {

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize( window.innerWidth, window.innerHeight );

  }

  function throwBall() {

    const sphere = spheres[ sphereIdx ];

    camera.getWorldDirection( playerDirection );

    sphere.collider.center.copy( playerCollider.end ).addScaledVector( playerDirection, playerCollider.radius * 1.5 );

    // throw the ball with more force if we hold the button longer, and if we move forward

    const impulse = 15 + 30 * ( 1 - Math.exp( ( mouseTime - performance.now() ) * 0.001 ) );

    sphere.velocity.copy( playerDirection ).multiplyScalar( impulse );
    sphere.velocity.addScaledVector( playerVelocity, 2 );

    sphereIdx = ( sphereIdx + 1 ) % spheres.length;

  }

  function playerCollisions() {

    const result = worldOctree.capsuleIntersect( playerCollider );

    playerOnFloor = false;

    if ( result ) {

      playerOnFloor = result.normal.y > 0;

      if ( ! playerOnFloor ) {

        playerVelocity.addScaledVector( result.normal, - result.normal.dot( playerVelocity ) );

      }

      if ( result.depth >= 1e-10 ) {

        playerCollider.translate( result.normal.multiplyScalar( result.depth ) );

      }

    }

  }

  function updatePlayer( deltaTime ) {

    let damping = Math.exp( - 4 * deltaTime ) - 1;

    if ( ! playerOnFloor ) {

      playerVelocity.y -= GRAVITY * deltaTime;

      // small air resistance
      damping *= 0.1;

    }

    playerVelocity.addScaledVector( playerVelocity, damping );

    const deltaPosition = playerVelocity.clone().multiplyScalar( deltaTime );
    playerCollider.translate( deltaPosition );

    playerCollisions();

    camera.position.copy( playerCollider.end );

  }

  function playerSphereCollision( sphere ) {

    const center = vector1.addVectors( playerCollider.start, playerCollider.end ).multiplyScalar( 0.5 );

    const sphere_center = sphere.collider.center;

    const r = playerCollider.radius + sphere.collider.radius;
    const r2 = r * r;

    // approximation: player = 3 spheres

    for ( const point of [ playerCollider.start, playerCollider.end, center ] ) {

      const d2 = point.distanceToSquared( sphere_center );

      if ( d2 < r2 ) {

        const normal = vector1.subVectors( point, sphere_center ).normalize();
        const v1 = vector2.copy( normal ).multiplyScalar( normal.dot( playerVelocity ) );
        const v2 = vector3.copy( normal ).multiplyScalar( normal.dot( sphere.velocity ) );

        playerVelocity.add( v2 ).sub( v1 );
        sphere.velocity.add( v1 ).sub( v2 );

        const d = ( r - Math.sqrt( d2 ) ) / 2;
        sphere_center.addScaledVector( normal, - d );

      }

    }

  }

  function spheresCollisions() {

    for ( let i = 0, length = spheres.length; i < length; i ++ ) {

      const s1 = spheres[ i ];

      for ( let j = i + 1; j < length; j ++ ) {

        const s2 = spheres[ j ];

        const d2 = s1.collider.center.distanceToSquared( s2.collider.center );
        const r = s1.collider.radius + s2.collider.radius;
        const r2 = r * r;

        if ( d2 < r2 ) {

          const normal = vector1.subVectors( s1.collider.center, s2.collider.center ).normalize();
          const v1 = vector2.copy( normal ).multiplyScalar( normal.dot( s1.velocity ) );
          const v2 = vector3.copy( normal ).multiplyScalar( normal.dot( s2.velocity ) );

          s1.velocity.add( v2 ).sub( v1 );
          s2.velocity.add( v1 ).sub( v2 );

          const d = ( r - Math.sqrt( d2 ) ) / 2;

          s1.collider.center.addScaledVector( normal, d );
          s2.collider.center.addScaledVector( normal, - d );

        }

      }

    }

  }

  function updateSpheres(deltaTime) {
    spheres.forEach((sphere, index) => {
        sphere.collider.center.addScaledVector(sphere.velocity, deltaTime);

        const result = worldOctree.sphereIntersect(sphere.collider);

        if (result) {
            // Trigger explosion at the point of collision
            createExplosion(sphere.collider.center);

            // Remove the ball by hiding it and resetting its position
            sphere.mesh.visible = false;
            sphere.collider.center.set(0, -100, 0); // Move it off-screen

            sphere.velocity.set(0, 0, 0); // Reset velocity
        } else {
            sphere.velocity.y -= GRAVITY * deltaTime;
        }

        const damping = Math.exp(-1.5 * deltaTime) - 1;
        sphere.velocity.addScaledVector(sphere.velocity, damping);

        playerSphereCollision(sphere);
    });

    spheresCollisions();

    spheres.forEach((sphere) => {
        sphere.mesh.position.copy(sphere.collider.center);
    });
}

// Create explosion effect
function createExplosion(position) {
    const explosionGeometry = new THREE.SphereGeometry(0.5, 32, 32);
    const explosionMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 });
    const explosion = new THREE.Mesh(explosionGeometry, explosionMaterial);
    
    explosion.position.copy(position);
    scene.add(explosion);

    // Animate explosion and remove it after a short duration
    const duration = 100; // Explosion duration in milliseconds
    setTimeout(() => {
        scene.remove(explosion);
    }, duration);
}


  function getForwardVector() {

    camera.getWorldDirection( playerDirection );
    playerDirection.y = 0;
    playerDirection.normalize();

    return playerDirection;

  }

  function getSideVector() {

    camera.getWorldDirection( playerDirection );
    playerDirection.y = 0;
    playerDirection.normalize();
    playerDirection.cross( camera.up );

    return playerDirection;

  }

  function controls( deltaTime ) {

    // gives a bit of air control
    const speedDelta = deltaTime * ( playerOnFloor ? 25 : 8 );

    if ( keyStates[ 'KeyW' ] ) {

      playerVelocity.add( getForwardVector().multiplyScalar( speedDelta ) );

    }

    if ( keyStates[ 'KeyS' ] ) {

      playerVelocity.add( getForwardVector().multiplyScalar( - speedDelta ) );

    }

    if ( keyStates[ 'KeyA' ] ) {

      playerVelocity.add( getSideVector().multiplyScalar( - speedDelta ) );

    }

    if ( keyStates[ 'KeyD' ] ) {

      playerVelocity.add( getSideVector().multiplyScalar( speedDelta ) );

    }

    if ( playerOnFloor ) {

      if ( keyStates[ 'Space' ] ) {

        playerVelocity.y = 14;

      }

    }

  }

  const loader = new GLTFLoader().setPath( './models/' );

  loader.load( 'maze.glb', ( gltf ) => {

    scene.add( gltf.scene );

    worldOctree.fromGraphNode( gltf.scene );

    gltf.scene.traverse( child => {

      if ( child.isMesh ) {

        child.castShadow = true;
        child.receiveShadow = true;

        if ( child.material.map ) {

          child.material.map.anisotropy = 4;

        }

      }

    } );

    // Controls and debuger
    const helper = new OctreeHelper( worldOctree );
    helper.visible = false;
    scene.add( helper );
    //const gui = new GUI( { width: 200 } );
    gui.add( { debug: false }, 'debug' )
      .onChange( function ( value ) {
        helper.visible = value;
      } );
    });

  function teleportPlayerIfOob() {

    if ( camera.position.y <= - 25 ) {

      playerCollider.start.set( 0, 0.35, 0 );
      playerCollider.end.set( 0, 1, 0 );
      playerCollider.radius = 0.35;
      camera.position.copy( playerCollider.end );
      camera.rotation.set( 0, 0, 0 );

    }

  }


  function animate() {

    const deltaTime = Math.min( 0.05, clock.getDelta() ) / STEPS_PER_FRAME;

    // we look for collisions in substeps to mitigate the risk of
    // an object traversing another too quickly for detection.

    for ( let i = 0; i < STEPS_PER_FRAME; i ++ ) {
      controls( deltaTime );
      updatePlayer( deltaTime );
      updateSpheres( deltaTime );
      teleportPlayerIfOob();
    }

    renderer.render( scene, camera );
    stats.update();

  }

  
  const leftJoystick = nipplejs.create({
    zone: document.getElementById('left-joystick'),
    mode: 'static',
    position: { left: '70px', bottom: '70px' },
    color: 'black',
  });

  const rightTouch = nipplejs.create({
      zone: document.getElementById('right-touch'),
      mode: 'static',
      position: { right: '70px', bottom: '70px' },
      color: 'black',
  });

  leftJoystick.on('move', (evt, data) => {
    if (data.direction) {
        const speedMultiplier = 0.11; // Slow down joystick movement
        const speed = 4.5 * speedMultiplier; // Adjust speed as needed
        switch (data.direction.angle) {
            case 'up':
                playerVelocity.add(getForwardVector().multiplyScalar(speed));
                break;
            case 'down':
                playerVelocity.add(getForwardVector().multiplyScalar(-speed));
                break;
            case 'left':
                playerVelocity.add(getSideVector().multiplyScalar(-speed));
                break;
            case 'right':
                playerVelocity.add(getSideVector().multiplyScalar(speed));
                break;
        }
    }
  });


  rightTouch.on('move', (evt, data) => {
    if (data.vector) {
        const cameraSensitivity = 3.5; // Increase this value for more sensitivity
        camera.rotation.y -= (data.vector.x / 100) * cameraSensitivity;
        camera.rotation.x -= (data.vector.y / 100) * cameraSensitivity;

        // Clamp vertical rotation
        camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
    }
  });


  document.getElementById('jump-button').addEventListener('click', () => {
    event.stopPropagation(); // Prevent the event from propagating
      if (playerOnFloor) {
          playerVelocity.y = 14; // Jump strength
      }
  });

  // Prevent 'mouseup' or 'touchend' on the jump button from triggering the ball throw
document.getElementById('jump-button').addEventListener('mouseup', (event) => {
    event.stopPropagation(); // Prevent the event from propagating
});
document.getElementById('jump-button').addEventListener('touchend', (event) => {
    event.stopPropagation(); // Prevent the event from propagating
});

  container.addEventListener('touchend', () => {
      throwBall();
  });

  let lastMove = Date.now();
  leftJoystick.on('move', (evt, data) => {
      if (Date.now() - lastMove < 16) return; // Throttle to ~60 FPS
      lastMove = Date.now();
      // Handle movement...
  });

  if (/Mobi|Android/i.test(navigator.userAgent)) {
      console.log('Mobile device detected: disabling pointer lock.');
      // Disable pointer lock for mobile or handle touch controls instead
  } else {
      container.addEventListener('mousedown', () => {
          document.body.requestPointerLock();
      });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);

    // Select joystick and jump button elements
    const leftJoystick = document.getElementById("left-joystick");
    const rightTouch = document.getElementById("right-touch");
    const jumpButton = document.getElementById("jump-button");

    if (!isMobile) {
        // Hide elements on non-mobile devices
        if (leftJoystick) leftJoystick.style.display = "none";
        if (rightTouch) rightTouch.style.display = "none";
        if (jumpButton) jumpButton.style.display = "none";
    } else {
        console.log("Mobile device detected: Showing touch controls.");
    }
  });


  // Prompt to rotate device
  // Function to detect if the device is a mobile device
function isMobileDevice() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

// Function to show a popup
function showRotatePopup() {
    // Create the popup container
    const popup = document.createElement('div');
    popup.id = 'rotate-popup';
    popup.style.position = 'fixed';
    popup.style.top = '0';
    popup.style.left = '0';
    popup.style.width = '100%';
    popup.style.height = '100%';
    popup.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
    popup.style.color = '#fff';
    popup.style.display = 'flex';
    popup.style.flexDirection = 'column';
    popup.style.justifyContent = 'center';
    popup.style.alignItems = 'center';
    popup.style.zIndex = '9999';

    // Add message to the popup
    const message = document.createElement('p');
    message.textContent = 'Please rotate your device to landscape mode.';
    message.style.fontSize = '28px';
    message.style.textAlign = 'center';
    message.style.margin = '0 20px';
    popup.appendChild(message);

    // Append the popup to the body
    document.body.appendChild(popup);
}

// Function to check orientation and handle popup
function handleOrientationChange() {
    const popup = document.getElementById('rotate-popup');

    if (window.innerWidth < window.innerHeight) {
        // Portrait mode
        if (!popup) {
            showRotatePopup();
        }
    } else {
        // Landscape mode
        if (popup) {
            popup.remove();
        }
    }
}

// Run on load if the device is mobile
if (isMobileDevice()) {
    window.addEventListener('resize', handleOrientationChange);
    handleOrientationChange();
}



</script>
