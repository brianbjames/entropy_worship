<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Theory Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
        <style>

        .sequencer-container {
            margin: 0px;
        width: 100%;                /* Set the width of the container */
        max-width: 800px;
        display: flex;             /* Use flexbox for layout */
        justify-content: flex-start; /* Align items to the start of the container */
        align-items: flex-start;   /* Vertically align items to the start (top) */
        flex-wrap: nowrap;         /* Prevent wrapping, force all items to stay on one line */
        overflow-x: auto;  
        }
        .step {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 5%;
            cursor: pointer;
            position: relative;
            padding: 1px;
            margin: 1px;
            font-size: 1.75rem;
            transition: background-color 0.3s ease, box-shadow 0.1s ease;
        }
        .step.active {
            background-color: rgb(51, 1, 1) !important; /* Green when active */
        }
        .step.triggered {
            background-color: yellow !important; /* Yellow when triggered */
        }
        .step.flashing {
            background-color: red !important;
            animation: flash 0.1s ease-in-out;
        }
        @keyframes flash {
            0% { background-color: red; }
            50% { background-color: blue; }
            100% { background-color: red; }
        }
.controls-container {
    display: flex;
    align-items: center;  /* Vertically aligns the items */
    gap: 10px;  /* Adds some space between the button and the input */
}

#tempo {
    padding: 5px 10px;  /* Adjusts input field size */
    width: 80px;  /* You can adjust the width of the input */
}
@font-face {
    font-family: 'ThirdParty';
    src: url('thirdpar.ttf') format('truetype'); /* Specify the path to the TTF file */
    font-weight: normal; /* Adjust as necessary */
    font-style: normal; /* Adjust as necessary */
        }
        @font-face {
    font-family: 'Heiko';
    src: url('heiko.ttf') format('truetype'); /* Specify the path to the TTF file */
    font-weight: normal; /* Adjust as necessary */
    font-style: normal; /* Adjust as necessary */
        }
        @font-face {
    font-family: 'Tomorrow';
    src: url('Tomorrow-Regular.ttf') format('truetype'); /* Specify the path to the TTF file */
    font-weight: normal; /* Adjust as necessary */
    font-style: normal; /* Adjust as necessary */
        }

        .heading {
            color: #e80f0fcc; 
            text-size-adjust: relative;

        }
        h1 {
            text-align: left;
            margin: 0;
            padding: 0;
            font-family: 'ThirdParty', sans-serif; /* Fallback to a generic font */
        }
        h2 {
            text-align: left;
            margin: 0;
            padding: 0;
            font-family: 'Heiko', sans-serif; /* Fallback to a generic font */
        }
        h3 {
            text-align: left;
            color: #e80f0fcc; 
            margin: 0;
            padding: 0;
            font-family: 'ThirdParty', sans-serif; /* Fallback to a generic font */
        }
        h4 {
            text-align: left;
            margin: 0;
            padding: 0;
            font-family: 'Heiko', sans-serif; /* Fallback to a generic font */
        }
        h5 {
            text-align: left;
            margin: 0;
            padding: 0;
            font-size: 1.0rem;
            font-family: 'Tomorrow', sans-serif; /* Fallback to a generic font */
        }
        body {
          position: relative;
          background-image: url('http://www.entropyworship.com/images/Iridescent-Nebula.jpg'); 
          background-size: cover;
          background-position: center;
          color: white;
          text-align: left;
          margin: 0;
          padding: 0;
          font-family: 'Tomorrow', sans-serif; 
          background-attachment: fixed; /* For desktop */
        }

        /* Landscape prompt styles */
        .landscape-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1000; /* Ensures it sits above other elements */
        }


        select { margin: 10px 0; }
        .results { margin-top: 20px; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .table th { background-color: #f2f2f2; }
        #volumeSlider { width: 10%; }
        .modal-content {
            background-color: black !important; /* Set the background to black */
            color: white; /* Make text color white for contrast */
            opacity: 75%;
        }

        .modal-header {
            border-bottom: 1px solid #444; /* Optional: Adjust the modal header's border */
        }

        .modal-body {
            color: white; /* Ensure text within the body is also white */
        }

        .modal-footer {
            border-top: 1px solid #444; /* Optional: Adjust the modal footer's border */
        }

        .btn-close {
            color: white; /* Change close button color to white */
        }
        .btn-primary {
            color: white; /* Change close button color to white */
        }
    </style>
</head>
<body>

<div class="container" style="width: 100%"><!--Main container-->
    <div class="card text-bg-danger border-danger mb-3" style="background-color: #7b9cb76c"><!--Header panel-->
        <div class="card-header border-danger">
            <h1 class="heading display-6" style="font-size: 1.5rem;">ENTROPY WORSHIP</h1>
            <h2 class="panel info shown" style="font-size: 1.5rem;">build 3.0.11.03.24</h2>
        </div>
        <div class="card-body">
            <h2>Calc</h2>
            

        </div>
    </div>
    
        <div class="row">
        <div class="form-group">
            <input type="range" class="form-range" id="volumeSlider" min="0" max="100" value="50">
            <p>Volume: <span id="volumeValue">50</span>%</p>
        </div>
    </div>
    <div class="form-group">
        <button class="btn btn-outline-light btn" id="stopAllButton">Stop</button>
    </div>
    <div class="form-group">
        <select id="noteroot" class="form-select btn-outline-light btn" onchange="updateResults()">
            <option value="C">C</option>
            <option value="C#">C#</option>
            <option value="D">D</option>
            <option value="D#">D#</option>
            <option value="E" selected>E</option>
            <option value="F">F</option>
            <option value="F#">F#</option>
            <option value="G">G</option>
            <option value="G#">G#</option>
            <option value="A">A</option>
            <option value="A#">A#</option>
            <option value="B">B</option>
        </select>
    </div>
    <div class="form-group">
        <select id="mode" class="form-select btn-outline-light btn" onchange="updateResults()">
            <option value="Ionian">Ionian</option>
            <option value="Dorian">Dorian</option>
            <option value="Phrygian" selected>Phrygian</option>
            <option value="Lydian">Lydian</option>
            <option value="Mixolydian">Mixolydian</option>
            <option value="Aeolian">Aeolian</option>
            <option value="Locrian">Locrian</option>
        </select>
    </div>
    <div class="results" id="results"></div>

    <!-- Modal for MIDI note information -->
    <div class="modal fade" id="midiModal" tabindex="-1" aria-labelledby="midiModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="midiModalLabel">MIDI Note Information</h5>
                    <button type="button" class="btn-close btn btn-dark" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="midiValue"></p>
                    <p id="frequency"></p>
                    <p id="octave"></p>
                    <button class="btn btn-dark" id="playButton">Play</button>
                </div>
            </div>
        </div>
    </div>
</div>    

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const modes = {
        "Ionian": [0, 2, 4, 5, 7, 9, 11],
        "Dorian": [0, 2, 3, 5, 7, 9, 10],
        "Phrygian": [0, 1, 3, 5, 7, 8, 10],
        "Lydian": [0, 2, 4, 6, 7, 9, 11],
        "Mixolydian": [0, 2, 4, 5, 7, 9, 10],
        "Aeolian": [0, 2, 3, 5, 7, 8, 10],
        "Locrian": [0, 1, 3, 5, 6, 8, 10]
    };

    const romanNumerals = {
        "Ionian": ["I", "ii", "iii", "IV", "V", "vi", "vii°"],
        "Dorian": ["i", "ii", "III", "IV", "v", "vi°", "VII"],
        "Phrygian": ["i", "II", "III", "iv", "v°", "VI", "vii"],
        "Lydian": ["I", "II", "iii", "iv°", "V", "vi", "vii"],
        "Mixolydian": ["I", "ii", "iii°", "IV", "v", "vi", "VII"],
        "Aeolian": ["i", "ii°", "III", "iv", "v", "VI", "VII"],
        "Locrian": ["i°", "II", "iii", "iv", "V", "VI", "vii"]
    };

    // Degree names for each scale degree
    const degreeNames = [
        "Tonic",           // 1st degree
        "Supertonic",      // 2nd degree
        "Mediant",         // 3rd degree
        "Subdominant",     // 4th degree
        "Dominant",        // 5th degree
        "Submediant",      // 6th degree
        "Leading Tone"     // 7th degree
    ];

    let currentVolume = 0.5;
    let audioContext;
    let oscillators = [];
    let gainNodes = [];
    let globalGainNode;
    let isPlaying = [];

    // Set up audio context and global gain node
    function setupAudioContext() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        globalGainNode = audioContext.createGain(); // Global gain node for volume control
        globalGainNode.connect(audioContext.destination); // Connect global gain to audio context output
        globalGainNode.gain.setValueAtTime(currentVolume, audioContext.currentTime); // Set initial volume
    }

    // Update results when inputs change
    function updateResults() {
        const noteroot = document.getElementById("noteroot").value;
        const mode = document.getElementById("mode").value;
        const octave = -1;  // Default octave set to -1

        const noteRootIndex = notes.indexOf(noteroot);
        const modeIntervals = modes[mode];
        const romanHeaders = romanNumerals[mode];

        // Calculate scale
        const scale = modeIntervals.map(interval => notes[(noteRootIndex + interval) % notes.length]);

        // Step 1: Calculate MIDI values for each note in the scale
        const midiValues = scale.map(note => getMidiValuesForNote(note, octave));

        // Generate table rows with Roman numeral chord names, note names, and MIDI data
        const diatonicChords = scale.map((_, i) => {
            const rootNote = scale[i]; // The root note for the chord is the corresponding scale note
            const rootMidi = midiValues[i].join(", ");
            return `<tr>
                <td>${degreeNames[i]}</td>  <!-- Degree name column -->
                <td>${rootNote}</td>
                <td>${romanHeaders[i]}</td>
                <td>${generateMidiLinks(rootMidi)}</td>
            </tr>`;
        }).join("");

        // Display results in table with dynamic Roman numeral headers, note names, and MIDI data
        document.getElementById("results").innerHTML = `
            <table class="table table-bordered mt-4 table-sm" style="color: white;">
                <tbody>
                    ${diatonicChords}
                </tbody>
            </table>
        `;
    }

    // Helper function to generate clickable MIDI links
    function generateMidiLinks(midi) {
        return midi.split(', ').map(midiValue => {
            const frequency = midiToFrequency(parseInt(midiValue));
            return `<a href="#" data-midi="${midiValue}" data-frequency="${frequency}" onclick="openModal('${midiValue}', '${frequency}')">${midiValue}</a>`;
        }).join(" ");
    }

    // Function to open the modal and show information, including octave
    function openModal(midiValue, frequency) {
        const octave = Math.floor(midiValue / 12) - 1; // Calculate octave based on MIDI value
        document.getElementById("midiValue").innerText = `MIDI Value: ${midiValue}`;
        document.getElementById("frequency").innerText = `Frequency: ${frequency} Hz`;
        document.getElementById("octave").innerText = `Octave: ${octave}`;

        const playButton = document.getElementById("playButton");

        // Add event listener to play button
        playButton.onclick = () => {
            if (isPlaying[midiValue]) {
                stopOscillator(midiValue);
                playButton.innerText = "Play";
                isPlaying[midiValue] = false;
            } else {
                startOscillator(frequency, midiValue);
                playButton.innerText = "Stop";
                isPlaying[midiValue] = true;
            }
        };

        // Show the modal
        const myModal = new bootstrap.Modal(document.getElementById('midiModal'));
        myModal.show();
    }

    // Convert MIDI value to frequency (A440 = 69 in MIDI)
    function midiToFrequency(midi) {
        return 440 * Math.pow(2, (midi - 69) / 12);
    }

    // Function to start playing the sound for the given frequency
    function startOscillator(frequency, midiValue) {
        const oscillator = audioContext.createOscillator();
        oscillator.type = 'sine'; // Sine wave
        oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);

        // Set volume using the global gain node
        oscillator.connect(globalGainNode); // Connect oscillator to the global gain node

        oscillator.start();

        // Store oscillator
        oscillators[midiValue] = oscillator;
    }

    // Function to stop the oscillator
    function stopOscillator(midiValue) {
        if (oscillators[midiValue]) {
            oscillators[midiValue].stop();
            oscillators[midiValue].disconnect();
        }
    }

    // Stop all oscillators
    function stopAllOscillators() {
        for (let midiValue in oscillators) {
            stopOscillator(midiValue);
        }
    }

    // Event listener to update the global volume when the slider is changed
    document.getElementById('volumeSlider').addEventListener('input', (e) => {
        currentVolume = e.target.value / 100;
        document.getElementById("volumeValue").innerText = e.target.value;
        globalGainNode.gain.setValueAtTime(currentVolume, audioContext.currentTime); // Update global volume
    });

    // Event listener for the Stop All button
    document.getElementById('stopAllButton').addEventListener('click', () => {
        stopAllOscillators();
    });

    // Calculate MIDI values for a given note
    function getMidiValuesForNote(note, octave) {
        const noteIndex = notes.indexOf(note);
        const midiValues = [];
        
        for (let i = -1; i <= 11; i++) {
            const midi = (octave + i) * 12 + noteIndex;
            if (midi >= 0 && midi <= 127) { // Valid MIDI range
                midiValues.push(midi);
            }
        }

        midiValues.sort((a, b) => a - b); // Sort MIDI values
        return midiValues;
    }

    // Initial call to setup audio context and display results
    setupAudioContext();
    updateResults();
</script>

</body>
</html>
