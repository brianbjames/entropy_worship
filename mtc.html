<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Theory Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        select { margin: 10px 0; }
        .results { margin-top: 20px; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .table th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<select id="noteroot" onchange="updateResults()">
    <option value="C">C</option>
    <option value="C#">C#</option>
    <option value="D">D</option>
    <option value="D#">D#</option>
    <option value="E">E</option>
    <option value="F">F</option>
    <option value="F#">F#</option>
    <option value="G">G</option>
    <option value="G#">G#</option>
    <option value="A">A</option>
    <option value="A#">A#</option>
    <option value="B">B</option>
</select>

<select id="mode" onchange="updateResults()">
    <option value="Ionian">Ionian</option>
    <option value="Dorian">Dorian</option>
    <option value="Phrygian">Phrygian</option>
    <option value="Lydian">Lydian</option>
    <option value="Mixolydian">Mixolydian</option>
    <option value="Aeolian">Aeolian</option>
    <option value="Locrian">Locrian</option>
</select>

<div class="results" id="results"></div>

<script>
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const modes = {
        "Ionian": [0, 2, 4, 5, 7, 9, 11],
        "Dorian": [0, 2, 3, 5, 7, 9, 10],
        "Phrygian": [0, 1, 3, 5, 7, 8, 10],
        "Lydian": [0, 2, 4, 6, 7, 9, 11],
        "Mixolydian": [0, 2, 4, 5, 7, 9, 10],
        "Aeolian": [0, 2, 3, 5, 7, 8, 10],
        "Locrian": [0, 1, 3, 5, 6, 8, 10]
    };

    const romanNumerals = {
    "Ionian": ["I", "ii", "iii", "IV", "V", "vi", "vii°"],
    "Dorian": ["i", "ii", "III", "IV", "v", "vi°", "VII"],
    "Phrygian": ["i", "II", "III", "iv", "v°", "VI", "vii"],
    "Lydian": ["I", "II", "iii", "iv°", "V", "vi", "vii"],
    "Mixolydian": ["I", "ii", "iii°", "IV", "v", "vi", "VII"],
    "Aeolian": ["i", "ii°", "III", "iv", "v", "VI", "VII"],
    "Locrian": ["i°", "II", "iii", "iv", "V", "VI", "vii"]
};

    function updateResults() {
        const noteroot = document.getElementById("noteroot").value;
        const octave = -1;  // Default octave set to -1
        const mode = document.getElementById("mode").value;

        const noteRootIndex = notes.indexOf(noteroot);
        const modeIntervals = modes[mode];
        const romanHeaders = romanNumerals[mode];

        // Calculate scale
        const scale = modeIntervals.map(interval => notes[(noteRootIndex + interval) % notes.length]);

        // Step 1: Calculate MIDI values for each chord
        const midiValues = scale.map(note => getMidiValuesForNote(note, octave));

        // Generate table rows with Roman numeral chord names, note names, and MIDI data
        const diatonicChords = scale.map((_, i) => {
            const chordRoot = scale[i];
            const second = scale[(i + 1) % scale.length];
            const third = scale[(i + 2) % scale.length];
            const fourth = scale[(i + 3) % scale.length];
            const fifth = scale[(i + 4) % scale.length];
            const sixth = scale[(i + 5) % scale.length];
            const seventh = scale[(i + 6) % scale.length];

            // Gather MIDI values for each chord
            const rootMidi = midiValues[i].join(", ");
            const secondMidi = midiValues[(i + 1) % scale.length].join(", ");
            const thirdMidi = midiValues[(i + 2) % scale.length].join(", ");
            const fourthMidi = midiValues[(i + 3) % scale.length].join(", ");
            const fifthMidi = midiValues[(i + 4) % scale.length].join(", ");
            const sixthMidi = midiValues[(i + 5) % scale.length].join(", ");
            const seventhMidi = midiValues[(i + 6) % scale.length].join(", ");

            // Gather note names for each chord
            const rootNote = scale[i];
            const secondNote = scale[(i + 1) % scale.length];
            const thirdNote = scale[(i + 2) % scale.length];
            const fourthNote = scale[(i + 3) % scale.length];
            const fifthNote = scale[(i + 4) % scale.length];
            const sixthNote = scale[(i + 5) % scale.length];
            const seventhNote = scale[(i + 6) % scale.length];

            return `<tr>
                <td>${romanHeaders[i]}</td>
                <td>${rootNote} (${rootMidi})</td>
                <td>${secondNote} (${secondMidi})</td>
                <td>${thirdNote} (${thirdMidi})</td>
                <td>${fourthNote} (${fourthMidi})</td>
                <td>${fifthNote} (${fifthMidi})</td>
                <td>${sixthNote} (${sixthMidi})</td>
                <td>${seventhNote} (${seventhMidi})</td>
            </tr>`;
        }).join("");

        // Display results in table with dynamic Roman numeral headers, note names, and MIDI data
        document.getElementById("results").innerHTML = `
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col"></th>
                        <th scope="col">${romanHeaders[0]}</th>
                        <th scope="col">${romanHeaders[1]}</th>
                        <th scope="col">${romanHeaders[2]}</th>
                        <th scope="col">${romanHeaders[3]}</th>
                        <th scope="col">${romanHeaders[4]}</th>
                        <th scope="col">${romanHeaders[5]}</th>
                        <th scope="col">${romanHeaders[6]}</th>
                    </tr>
                </thead>
                <tbody>
                    ${diatonicChords}
                </tbody>
            </table>
        `;
    }

    function getMidiValuesForNote(note, octave) {
        const noteIndex = notes.indexOf(note);
        const midiValues = [];
        
        // Generate all MIDI values for this note in different octaves (from octave 0 to 9)
        for (let i = -1; i <= 11; i++) {
            const midi = (octave + i) * 12 + noteIndex;
            if (midi >= 0 && midi <= 127) { // Only add if MIDI is in valid range (0 to 127)
                midiValues.push(midi);
            }
        }

        // Sort MIDI values from lowest to highest
        midiValues.sort((a, b) => a - b);

        return midiValues;
    }

    // Initial call to display results based on default selections
    updateResults();
</script>

</body>
</html>
